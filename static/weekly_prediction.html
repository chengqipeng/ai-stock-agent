<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周/月预测结果 - AI Stock Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#e8ecf4 0%,#d5dbe8 25%,#c9d6f0 50%,#ddd5ee 75%,#e8ecf4 100%);background-attachment:fixed;min-height:100vh;color:#1d1d1f}
.header{background:rgba(102,126,234,0.75);backdrop-filter:blur(20px) saturate(180%);color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.25);flex-wrap:wrap}
.header h1{font-size:15px;font-weight:600}
.header a{color:rgba(255,255,255,0.9);text-decoration:none;font-size:12px}
.header a:hover{color:white}
.header .stats{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.8)}
.tab-btn{padding:4px 14px;border:1px solid rgba(255,255,255,0.4);border-radius:6px;background:transparent;color:rgba(255,255,255,0.8);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.tab-btn:hover{background:rgba(255,255,255,0.15)}
.tab-btn.active{background:rgba(255,255,255,0.25);color:white;border-color:rgba(255,255,255,0.6)}
.container{max-width:1400px;margin:12px auto;padding:0 12px}

/* 汇总卡片 */
.summary-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:nowrap}
.summary-card{flex:1;min-width:0;background:rgba(255,255,255,0.65);backdrop-filter:blur(24px);border-radius:8px;padding:8px 10px;border:1px solid rgba(255,255,255,0.5);box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.summary-card.wide{flex:1.8}
.summary-card .label{font-size:9px;color:#8e8e93;letter-spacing:.3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.summary-card .value{font-size:16px;font-weight:700;color:#1d1d1f}
.summary-card .value.up{color:#e74c3c}
.summary-card .value.down{color:#2ecc71}
.summary-card .sub{font-size:9px;color:#8e8e93;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.summary-section{margin-bottom:10px}
.summary-label{font-size:11px;font-weight:600;color:#48484a;margin-bottom:4px;padding-left:2px;display:flex;align-items:center;gap:4px}

/* 工具栏 */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.toolbar select,.toolbar input{padding:5px 10px;border:1px solid rgba(0,0,0,0.1);border-radius:6px;font-size:12px;background:rgba(255,255,255,0.7);outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:#667eea}
.toolbar .btn{padding:5px 12px;background:rgba(102,126,234,0.85);color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.toolbar .btn:hover{background:rgba(102,126,234,1)}
.toolbar .info{font-size:11px;color:#666;margin-left:auto}
</style>
<style>
/* 表格 */
.pred-table{width:100%;border-collapse:separate;border-spacing:0;background:rgba(255,255,255,0.6);backdrop-filter:blur(24px);border-radius:10px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.06);border:1px solid rgba(255,255,255,0.5)}
.pred-table thead tr{background:linear-gradient(135deg,rgba(102,126,234,0.12) 0%,rgba(118,75,162,0.08) 100%)}
.pred-table th{padding:8px 10px;font-size:11px;font-weight:600;color:#48484a;border-bottom:2px solid rgba(102,126,234,0.2);text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
.pred-table th:hover{color:#667eea}
.pred-table th.sa::after{content:" ▲";font-size:9px;color:#667eea}
.pred-table th.sd::after{content:" ▼";font-size:9px;color:#667eea}
.pred-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid rgba(0,0,0,0.04);white-space:nowrap}
.pred-table tbody tr{cursor:pointer}
.pred-table tbody tr:hover{background:rgba(102,126,234,0.06)}
.pred-table tbody tr.row-nw{background:rgba(255,152,0,0.03)}
.pred-table tbody tr.row-nw:hover{background:rgba(255,152,0,0.08)}

.pred-table tbody tr.row-tw{border-top:2px solid rgba(102,126,234,0.12)}
.pred-table tbody tr.row-v20{background:rgba(0,150,136,0.03)}
.pred-table tbody tr.row-v20:hover{background:rgba(0,150,136,0.08)}
.pred-table tbody tr.row-v30{background:rgba(121,85,72,0.03)}
.pred-table tbody tr.row-v30:hover{background:rgba(121,85,72,0.08)}

/* 方向/置信度标签 */
.dir-up{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(231,76,60,0.12);color:#e74c3c}
.dir-down{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(46,204,113,0.12);color:#2ecc71}
.conf-high{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(102,126,234,0.15);color:#667eea}
.conf-medium{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(240,173,78,0.15);color:#d4a017}
.conf-low{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(0,0,0,0.06);color:#8e8e93}
.conf-reference{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,152,0,0.12);color:#e67e22}
.chg-val{font-family:'SF Mono',Menlo,monospace;font-size:12px}
.chg-pos{color:#e74c3c}
.chg-neg{color:#2ecc71}

/* 分页 */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:10px}
.page-btn{padding:4px 12px;border:1px solid rgba(102,126,234,0.25);border-radius:6px;background:rgba(255,255,255,0.6);cursor:pointer;font-size:11px;color:#48484a}
.page-btn:hover{background:rgba(102,126,234,0.08)}
.page-btn.active{background:rgba(102,126,234,0.15);color:#667eea;font-weight:600}
.page-btn:disabled{opacity:0.4;cursor:not-allowed}
.csig-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.csig-buy{background:rgba(231,76,60,0.13);color:#e74c3c}
.csig-sell{background:rgba(46,204,113,0.13);color:#2ecc71}
.csig-neutral{background:rgba(0,0,0,0.06);color:#8e8e93}
.csig-detail{font-size:9px;color:#999;white-space:nowrap}

/* 指标提示 */
.th-wrap{display:flex;align-items:center;gap:4px}
.tip-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:rgba(102,126,234,0.15);color:#667eea;font-size:9px;font-weight:700;cursor:pointer;flex-shrink:0;line-height:1}
.tip-icon:hover{background:rgba(102,126,234,0.3)}

/* 指标说明弹窗 */
.tip-modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center}
.tip-modal-overlay.visible{display:flex}
.tip-modal{background:#fff;border-radius:12px;width:520px;max-width:90vw;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.18)}
.tip-modal-head{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center}
.tip-modal-head h3{font-size:14px;color:#1d1d1f;flex:1}
.tip-modal-head .close-btn{width:26px;height:26px;border:none;border-radius:6px;background:rgba(0,0,0,0.06);color:#666;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.tip-modal-head .close-btn:hover{background:rgba(0,0,0,0.1)}
.tip-modal-body{padding:14px 16px;overflow-y:auto;font-size:13px;line-height:1.7;color:#333}
.tip-modal-body .tip-section{margin-bottom:12px}
.tip-modal-body .tip-section h4{font-size:12px;color:#667eea;margin-bottom:4px;font-weight:600}
.tip-modal-body .tip-section p{margin:0;color:#555}
.tip-modal-body .tip-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:4px}
.tip-modal-body .tip-tag.high{background:rgba(102,126,234,0.12);color:#667eea}
.tip-modal-body .tip-tag.medium{background:rgba(240,173,78,0.12);color:#d4a017}
.tip-modal-body .tip-tag.low{background:rgba(0,0,0,0.06);color:#8e8e93}
</style>
<style>
/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:#fff;border-radius:12px;width:950px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-head{padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;gap:10px}
.modal-head h3{font-size:14px;color:#1d1d1f;flex:1}
.modal-head .close-btn{width:28px;height:28px;border:none;border-radius:6px;background:rgba(0,0,0,0.06);color:#666;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-head .close-btn:hover{background:rgba(0,0,0,0.1)}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px}
.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{padding:7px 8px;text-align:left;font-weight:600;color:#48484a;border-bottom:2px solid rgba(102,126,234,0.15);font-size:11px;white-space:nowrap}
.hist-table td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,0.04);white-space:nowrap}
.hist-table tr:hover{background:rgba(102,126,234,0.04)}
.correct-yes{color:#2ecc71;font-weight:600}
.correct-no{color:#e74c3c;font-weight:600}
</style>
</head>
<body>
<div class="header">
    <h1>📊 周/月预测结果</h1>
    <a href="/">← 返回主页</a>
    <span style="margin-left:12px;display:flex;gap:4px">
        <button class="tab-btn active" id="tabWeekly" onclick="switchTab('weekly')">周预测</button>
        <button class="tab-btn" id="tabVerify" onclick="switchTab('verify')" style="border-color:rgba(255,200,50,0.7);color:rgba(255,230,150,0.95)">🔍 预测验证</button>
        <button class="tab-btn" id="tabMonthly" onclick="switchTab('monthly')">月预测</button>
    </span>
    <span class="stats" id="headerStats">加载中...</span>
</div>
<div class="container">
    <!-- 周预测内容 -->
    <div id="weeklyContent">
    <div class="summary-section" id="summarySection">
        <div class="summary-label">📈 本周预测</div>
        <div class="summary-row" id="summaryRowThisWeek"></div>
        <div class="summary-label" style="margin-top:8px">📅 下周预测</div>
        <div class="summary-row" id="summaryRowNextWeek"></div>
    </div>
    <div class="toolbar">
        <select id="filterDirection" onchange="loadList()">
            <option value="">全部方向</option>
            <option value="UP">预测涨 ↑</option>
            <option value="DOWN">预测跌 ↓</option>
        </select>
        <select id="filterConfidence" onchange="loadList()">
            <option value="">全部置信度</option>
            <option value="high">高置信</option>
            <option value="medium">中置信</option>
            <option value="low">低置信</option>
            <option value="reference">参考</option>
        </select>
        <select id="filterNwDirection" onchange="loadList()">
            <option value="">下周预测: 全部</option>
            <option value="UP">下周预测涨 ↑</option>
            <option value="DOWN">下周预测跌 ↓</option>
            <option value="UNCERTAIN">下周不确定</option>
            <option value="HAS_SIGNAL">下周有信号</option>
        </select>
        <select id="filterV20Direction" onchange="loadList()">
            <option value="">V20量价: 全部</option>
            <option value="UP">V20有信号 ↑</option>
            <option value="NO_SIGNAL">V20无信号</option>
        </select>
        <select id="filterV30Direction" onchange="loadList()">
            <option value="">V30情绪: 全部</option>
            <option value="UP">V30有信号 ↑</option>
            <option value="NO_SIGNAL">V30无信号</option>
        </select>
        <input id="searchInput" type="text" placeholder="搜索代码/名称（逗号/空格分隔可搜多只）..." style="width:260px" oninput="debounceSearch()" onkeydown="handleSearchEnter(event)" onpaste="handleSearchPaste(event)">
        <span id="searchClear" onclick="clearSearch()" style="cursor:pointer;color:#999;font-size:14px;display:none" title="清空搜索">&times;</span>
        <button class="btn" onclick="loadList()">刷新</button>
        <button class="btn" style="background:rgba(231,76,60,0.85)" id="btnRecompute" onclick="triggerRecompute()">全部重新计算</button>
        <button class="btn" style="background:rgba(52,152,219,0.85)" id="btnThisWeek" onclick="triggerThisWeekPredict()">本周d3/d4预测</button>
        <button class="btn" style="background:rgba(255,152,0,0.85)" id="btnNextWeek" onclick="triggerNextWeekPredict()">下周预测V11+回测</button>
        <button class="btn" style="background:rgba(0,150,136,0.85)" id="btnV20Predict" onclick="triggerV20Predict()">V20量价预测</button>
        <button class="btn" style="background:rgba(121,85,72,0.85)" id="btnV30Predict" onclick="triggerV30Predict()">V30情绪预测</button>
        <span class="info" id="listInfo"></span>
    </div>
    <div id="tableWrap"></div>
    <div class="pagination" id="pagination"></div>
    </div>

    <!-- 预测验证内容 -->
    <div id="verifyContent" style="display:none">
    <!-- 子Tab切换 -->
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
        <button class="tab-btn active" id="subTabTw" onclick="switchVerifySubTab('tw')" style="font-size:11px;padding:3px 12px">本周预测验证</button>
        <button class="tab-btn" id="subTabNw" onclick="switchVerifySubTab('nw')" style="font-size:11px;padding:3px 12px">V11下周预测验证</button>
        <button class="tab-btn" id="subTabV20" onclick="switchVerifySubTab('v20')" style="font-size:11px;padding:3px 12px;border-color:rgba(0,150,136,0.5);color:rgba(0,150,136,0.9)">V20量价验证</button>
        <button class="tab-btn" id="subTabV30" onclick="switchVerifySubTab('v30')" style="font-size:11px;padding:3px 12px;border-color:rgba(121,85,72,0.5);color:rgba(121,85,72,0.9)">V30情绪验证</button>
        <span style="margin-left:auto;display:flex;gap:6px">
            <button class="btn" style="background:rgba(46,204,113,0.85);font-size:11px;padding:4px 12px" id="btnVerifyAll" onclick="triggerVerifyAll()">回填全部待验证</button>
            <button class="btn" style="background:rgba(52,152,219,0.85);font-size:11px;padding:4px 12px" id="btnVerifyWeek" onclick="triggerVerifyWeek()">回填当前选中周</button>
        </span>
    </div>

    <!-- 本周预测验证 -->
    <div id="verifyTwContent">
    <div class="summary-section" id="verifySummarySection">
        <div class="summary-label">🔍 本周预测验证 — 预测方向 vs 实际方向</div>
        <div class="summary-row" id="verifySummaryRow"></div>
    </div>
    <div class="toolbar">
        <select id="verifyWeekSelect" onchange="loadVerifyList()">
            <option value="">加载中...</option>
        </select>
        <select id="verifyFilterDirection" onchange="loadVerifyList()">
            <option value="">全部方向</option>
            <option value="UP">预测涨 ↑</option>
            <option value="DOWN">预测跌 ↓</option>
        </select>
        <select id="verifyFilterResult" onchange="loadVerifyList()">
            <option value="">全部结果</option>
            <option value="correct">✓ 预测正确</option>
            <option value="wrong">✗ 预测错误</option>
            <option value="pending">- 待验证</option>
        </select>
        <input id="verifySearchInput" type="text" placeholder="搜索代码/名称..." style="width:220px" oninput="debounceVerifySearch()">
        <button class="btn" onclick="loadVerifyList()">刷新</button>
        <span class="info" id="verifyListInfo"></span>
    </div>
    <div id="verifyTableWrap"></div>
    <div class="pagination" id="verifyPagination"></div>
    </div>

    <!-- V11下周预测验证 -->
    <div id="verifyNwContent" style="display:none">
    <div class="summary-section">
        <div class="summary-label">📅 V11下周预测验证 — W周的下周预测 vs W+1周实际结果</div>
        <div class="summary-row" id="nwVerifySummaryRow"></div>
    </div>
    <div class="toolbar">
        <select id="nwVerifyWeekSelect" onchange="loadNwVerifyList()">
            <option value="">加载中...</option>
        </select>
        <select id="nwVerifyFilterDirection" onchange="loadNwVerifyList()">
            <option value="">全部方向</option>
            <option value="UP">预测涨 ↑</option>
            <option value="DOWN">预测跌 ↓</option>
        </select>
        <select id="nwVerifyFilterResult" onchange="loadNwVerifyList()">
            <option value="">全部结果</option>
            <option value="correct">✓ 预测正确</option>
            <option value="wrong">✗ 预测错误</option>
            <option value="pending">- 待验证</option>
        </select>
        <input id="nwVerifySearchInput" type="text" placeholder="搜索代码/名称..." style="width:220px" oninput="debounceNwVerifySearch()">
        <button class="btn" onclick="loadNwVerifyList()">刷新</button>
        <span class="info" id="nwVerifyListInfo"></span>
    </div>
    <div id="nwVerifyTableWrap"></div>
    <div class="pagination" id="nwVerifyPagination"></div>
    </div>

    <!-- V20量价预测验证 -->
    <div id="verifyV20Content" style="display:none">
    <div class="summary-section">
        <div class="summary-label">📊 V20量价预测验证 — 超跌反弹信号 vs 实际5日涨跌</div>
        <div class="summary-row" id="v20VerifySummaryRow"></div>
    </div>
    <div class="toolbar">
        <select id="v20VerifyWeekSelect" onchange="loadV20VerifyList()">
            <option value="">加载中...</option>
        </select>
        <select id="v20VerifyFilterResult" onchange="loadV20VerifyList()">
            <option value="">全部结果</option>
            <option value="correct">✓ 预测正确</option>
            <option value="wrong">✗ 预测错误</option>
            <option value="pending">- 待验证</option>
        </select>
        <input id="v20VerifySearchInput" type="text" placeholder="搜索代码/名称..." style="width:220px" oninput="debounceV20VerifySearch()">
        <button class="btn" onclick="loadV20VerifyList()">刷新</button>
        <span class="info" id="v20VerifyListInfo"></span>
    </div>
    <div id="v20VerifyTableWrap"></div>
    <div class="pagination" id="v20VerifyPagination"></div>
    </div>

    <!-- V30情绪预测验证 -->
    <div id="verifyV30Content" style="display:none">
    <div class="summary-section">
        <div class="summary-label">🧠 V30情绪预测验证 — 情绪+技术因子 vs 实际5日涨跌</div>
        <div class="summary-row" id="v30VerifySummaryRow"></div>
    </div>
    <div class="toolbar">
        <select id="v30VerifyWeekSelect" onchange="loadV30VerifyList()">
            <option value="">加载中...</option>
        </select>
        <select id="v30VerifyFilterResult" onchange="loadV30VerifyList()">
            <option value="">全部结果</option>
            <option value="correct">✓ 预测正确</option>
            <option value="wrong">✗ 预测错误</option>
            <option value="pending">- 待验证</option>
        </select>
        <input id="v30VerifySearchInput" type="text" placeholder="搜索代码/名称..." style="width:220px" oninput="debounceV30VerifySearch()">
        <button class="btn" onclick="loadV30VerifyList()">刷新</button>
        <span class="info" id="v30VerifyListInfo"></span>
    </div>
    <div id="v30VerifyTableWrap"></div>
    <div class="pagination" id="v30VerifyPagination"></div>
    </div>

    </div>

    <!-- 月预测内容 -->
    <div id="monthlyContent" style="display:none">
    <div class="summary-row" id="nmSummaryRow"></div>
    <div class="toolbar">
        <select id="nmFilterConfidence" onchange="loadMonthlyList()">
            <option value="">全部置信度</option>
            <option value="high">高置信</option>
            <option value="medium">中置信</option>
            <option value="low">低置信</option>
        </select>
        <input id="nmSearchInput" type="text" placeholder="搜索代码/名称..." style="width:260px" oninput="debounceMonthlySearch()">
        <button class="btn" onclick="loadMonthlyList()">刷新</button>
        <button class="btn" style="background:rgba(231,76,60,0.85)" id="btnMonthlyRecompute" onclick="triggerMonthlyRecompute()">重新计算</button>
        <span class="info" id="nmListInfo"></span>
    </div>
    <div id="nmTableWrap"></div>
    <div class="pagination" id="nmPagination"></div>
    </div>

</div>

<!-- 指标说明弹窗 -->
<div class="tip-modal-overlay" id="tipModal">
    <div class="tip-modal">
        <div class="tip-modal-head">
            <h3 id="tipTitle">指标说明</h3>
            <button class="close-btn" onclick="closeTip()">×</button>

function showTip(key, event) {
    if (event) { event.stopPropagation(); event.preventDefault(); }
    const tip = INDICATOR_TIPS[key];
    if (!tip) return;
    document.getElementById('tipTitle').textContent = tip.title + ' — 指标说明';
    let html = '';
    if (tip.desc) {
        html += '<div class="tip-section"><p>' + tip.desc + '</p></div>';
    }
    if (tip.sections) {
        for (const s of tip.sections) {
            html += '<div class="tip-section">';
            html += '<h4>' + (s.tag ? '<span class="tip-tag ' + s.tag + '">' + s.h + '</span>' : s.h) + '</h4>';
            html += '<p>' + s.p + '</p></div>';
        }
    }
    document.getElementById('tipBody').innerHTML = html;
    document.getElementById('tipModal').classList.add('visible');
}

function closeTip() {
    document.getElementById('tipModal').classList.remove('visible');
}

document.getElementById('tipModal').addEventListener('click', function(e) {
    if (e.target === this) closeTip();
});

function debounceSearch() {
    clearTimeout(_searchTimer);
    const val = document.getElementById('searchInput').value;
    document.getElementById('searchClear').style.display = val ? 'inline' : 'none';
    _searchTimer = setTimeout(() => { currentPage = 1; loadList(); }, 300);
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').style.display = 'none';
    currentPage = 1;
    loadList();
}

function handleSearchEnter(event) {
    if (event.key !== 'Enter') return;
    clearTimeout(_searchTimer);
    currentPage = 1;
    loadList();
}

function handleSearchPaste(event) {
    const text = (event.clipboardData || window.clipboardData).getData('text');
    if (!text) return;
    // 将粘贴的多行/多分隔符文本统一为逗号分隔
    const terms = text.split(/[,，、;；。\s\n\r]+/).filter(Boolean);
    if (terms.length > 1) {
        event.preventDefault();
        const input = document.getElementById('searchInput');
        const existing = input.value.trim();
        const merged = existing ? existing + ',' + terms.join(',') : terms.join(',');
        input.value = merged;
        document.getElementById('searchClear').style.display = 'inline';
        clearTimeout(_searchTimer);
        currentPage = 1;
        loadList();
    }
}


function computeSignal(r) {
    var b=0,s=0;
    if(r.pred_direction==='UP')b+=(r.confidence==='high'?2:1);else if(r.pred_direction==='DOWN')s+=(r.confidence==='high'?2:1);
    if(r.nw_pred_direction==='UP')b+=2;else if(r.nw_pred_direction==='DOWN')s+=2;
    if(r.v20_pred_direction==='UP'){if(r.v20_confidence==='high')b+=1.5;else b+=1;}
    if(r.v30_pred_direction==='UP'){if(r.v30_confidence==='high')b+=2;else if(r.v30_confidence==='medium')b+=1;else b+=0.5;}
    if(r.fund_flow_signal!=null){if(r.fund_flow_signal>0.3)b+=1;else if(r.fund_flow_signal<-0.3)s+=1;}
    if(r.finance_score!=null){if(r.finance_score>0.3)b+=0.5;else if(r.finance_score<-0.3)s+=0.5;}
    if(r.board_momentum!=null){if(r.board_momentum>0.3)b+=0.5;else if(r.board_momentum<-0.3)s+=0.5;}
    if(r.vol_trend==='expanding'&&r.pred_direction==='UP')b+=0.5;
    var n=b-s,act,cls;
    if(n>=2){act='建议买入';cls='buy'}else if(n<=-2){act='建议卖出';cls='sell'}
    else if(n>0){act='偏多观望';cls='neutral'}else if(n<0){act='偏空观望';cls='neutral'}
    else{act='中性观望';cls='neutral'}
    return{act:act,cls:cls,b:b.toFixed(1),s:s.toFixed(1),n:n.toFixed(1)};
}

function fmtSignalHtml(sig) {
    return '<span class="csig-badge csig-' + sig.cls + '">' + sig.act + '</span>' +
           '<br><span class="csig-detail">多' + sig.b + ' | 空' + sig.s + ' | 净' + sig.n + '</span>';
}

function fmtChg(v) {
    if (v == null) return '-';
    const n = parseFloat(v);
    const cls = n > 0 ? 'chg-pos' : n < 0 ? 'chg-neg' : '';
    return '<span class="chg-val ' + cls + '">' + (n > 0 ? '+' : '') + n.toFixed(2) + '%</span>';
}

function fmtDateRange(range) {
    if (!range) return '';
    // "2025-03-10~2025-03-13" → "03-10~03-13"
    return range.replace(/\d{4}-/g, '');
}

function getWeekRange(predictDate) {
    // 根据 predict_date 计算所在周的周一~周五日期范围
    if (!predictDate) return '';
    const d = new Date(predictDate + 'T00:00:00');
    const day = d.getDay(); // 0=周日, 1=周一, ..., 6=周六
    const diffToMon = day === 0 ? -6 : 1 - day;
    const mon = new Date(d.getTime() + diffToMon * 86400000);
    const fri = new Date(mon.getTime() + 4 * 86400000);
    const fmt = dt => String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    return fmt(mon) + '~' + fmt(fri);
}

function dirBadge(d) {
    return d === 'UP' ? '<span class="dir-up">↑ 涨</span>' : '<span class="dir-down">↓ 跌</span>';
}

function confBadge(c) {
    const m = {high: '高', medium: '中', low: '低', reference: '参考'};
    return '<span class="conf-' + c + '">' + (m[c] || c) + '</span>';
}

async function loadSummary() {
    try {
        const resp = await fetch('/api/weekly_prediction/summary');
        const json = await resp.json();
        if (!json.success || !json.data) return;
        const d = json.data;
        const weekRange = getWeekRange(d.predict_date);
        document.getElementById('headerStats').textContent =
            '预测日期: ' + (d.predict_date || '-') + '  Y' + (d.iso_year || '') + '-W' + String(d.iso_week || '').padStart(2, '0') +
            (weekRange ? ' (' + weekRange + ')' : '') +
            '  共' + (d.total || 0) + '只  方向回测' + (d.avg_backtest_accuracy || 0) + '%' +
            '  涨跌幅MAE:' + (d.avg_pred_chg_mae || '-') + '%' +
            '  下周预测' + (d.nw_total || 0) + '只 回测' + (d.nw_avg_backtest_accuracy || '-') + '%';

        // ── 本周预测行 ──
        let twHtml = '';
        twHtml += card('总股票数', d.total || 0, '', weekRange || '');
        twHtml += card('预测涨', d.up_count || 0, 'up', '占比 ' + pct(d.up_count, d.total));
        twHtml += card('预测跌', d.down_count || 0, 'down', '占比 ' + pct(d.down_count, d.total));
        twHtml += card('高置信', d.high_count || 0, '', 'd4强信号 + 停牌');
        twHtml += card('中置信', d.medium_count || 0, '', 'd4中等信号');
        twHtml += card('低置信', d.low_count || 0, '', 'd4/d3模糊信号');
        twHtml += card('回测准确率', (d.avg_backtest_accuracy || 0) + '%', '', 'LOWO: ' + (d.avg_lowo_accuracy || 0) + '%');
        const predChgMae = d.avg_pred_chg_mae != null ? d.avg_pred_chg_mae + '%' : '-';
        const predChgHit = d.avg_pred_chg_hit_rate != null ? d.avg_pred_chg_hit_rate + '%' : '-';
        const predChgCnt = d.pred_chg_count || 0;
        twHtml += card('涨跌幅预测误差', predChgMae, '', '区间命中率: ' + predChgHit + '  有预测: ' + predChgCnt + '只', 'wide');
        document.getElementById('summaryRowThisWeek').innerHTML = twHtml;

        // ── 下周预测行 ──
        let nwHtml = '';
        const nwTotal = d.nw_total || 0;
        const nwUp = d.nw_up_count || 0;
        const nwDown = d.nw_down_count || 0;
        const nwUncertain = d.nw_uncertain_count || 0;
        const nwReference = d.nw_reference_count || 0;
        const nwHigh = d.nw_high_count || 0;
        const nwDateRange = d.nw_date_range ? fmtDateRange(d.nw_date_range) : '';
        const nwBtAcc = d.nw_avg_backtest_accuracy != null ? d.nw_avg_backtest_accuracy + '%' : '-';
        const nwMae = d.nw_avg_pred_chg_mae != null ? d.nw_avg_pred_chg_mae + '%' : '-';
        const nwCoverage = nwTotal + nwUncertain > 0 ? Math.round(nwTotal / (nwTotal + nwUncertain) * 100) + '%' : '-';
        if (nwTotal === 0 && nwUncertain > 0) {
            nwHtml += card('预测总数', '无信号', '', '本周无满足条件的个股');
            nwHtml += card('预测涨', 0, 'up', nwDateRange || '');
            nwHtml += card('预测跌', 0, 'down', nwDateRange || '');
            nwHtml += card('不确定', nwUncertain, '', '');
            nwHtml += card('回测准确率', nwBtAcc, '', '等待触发条件');
        } else if (nwHigh === 0 && nwReference > 0) {
            nwHtml += card('预测总数', nwTotal + '只', '', '均为参考信号(~57%)' + (nwDateRange ? '  ' + nwDateRange : ''));
            nwHtml += card('预测涨', nwUp, 'up', '占比 ' + pct(nwUp, nwTotal + nwUncertain));
            nwHtml += card('预测跌', nwDown, 'down', '占比 ' + pct(nwDown, nwTotal + nwUncertain));
            nwHtml += card('不确定', nwUncertain, '', '');
            nwHtml += card('回测准确率', nwBtAcc, '', '参考级  覆盖率: ' + nwCoverage);
            nwHtml += card('涨跌幅预测误差', nwMae, '', '', 'wide');
        } else {
            const highLabel = nwHigh > 0 ? '高置信' + nwHigh : '';
            const refLabel = nwReference > 0 ? '参考' + nwReference : '';
            const tierInfo = [highLabel, refLabel].filter(Boolean).join(' ');
            nwHtml += card('预测总数', nwTotal + '只', '', (tierInfo || '') + (nwDateRange ? '  ' + nwDateRange : ''));
            nwHtml += card('预测涨', nwUp, 'up', '占比 ' + pct(nwUp, nwTotal + nwUncertain));
            nwHtml += card('预测跌', nwDown, 'down', '占比 ' + pct(nwDown, nwTotal + nwUncertain));
            nwHtml += card('不确定', nwUncertain, '', '');
            nwHtml += card('回测准确率', nwBtAcc, '', '覆盖率: ' + nwCoverage);
            nwHtml += card('涨跌幅预测误差', nwMae, '', '', 'wide');
        }
        document.getElementById('summaryRowNextWeek').innerHTML = nwHtml;
    } catch (e) { console.error('loadSummary error:', e); }
}

function card(label, value, cls, sub, extraCls) {
    return '<div class="summary-card ' + (extraCls||'') + '"><div class="label">' + label + '</div><div class="value ' + (cls||'') + '">' + value + '</div>' + (sub ? '<div class="sub">' + sub + '</div>' : '') + '</div>';
}

function pct(a, b) {
    if (!b) return '0%';
    return (a / b * 100).toFixed(1) + '%';
}

async function loadList() {
    const direction = document.getElementById('filterDirection').value;
    const confidence = document.getElementById('filterConfidence').value;
    const nwDirection = document.getElementById('filterNwDirection').value;
    const v20Direction = document.getElementById('filterV20Direction').value;
    const v30Direction = document.getElementById('filterV30Direction').value;
    const keyword = document.getElementById('searchInput').value.trim();
    const offset = (currentPage - 1) * PAGE_SIZE;

    let url = '/api/weekly_prediction/list?limit=' + PAGE_SIZE + '&offset=' + offset +
              '&sort_by=' + currentSort + '&sort_dir=' + currentSortDir;
    if (direction) url += '&direction=' + direction;
    if (confidence) url += '&confidence=' + confidence;
    if (nwDirection) url += '&nw_direction=' + encodeURIComponent(nwDirection);
    if (v20Direction) url += '&v20_direction=' + encodeURIComponent(v20Direction);
    if (v30Direction) url += '&v30_direction=' + encodeURIComponent(v30Direction);
    if (keyword) url += '&keyword=' + encodeURIComponent(keyword);

    try {
        const resp = await fetch(url);
        const json = await resp.json();
        if (!json.success) {
            document.getElementById('tableWrap').innerHTML = '<p style="color:red;padding:20px;">加载失败: ' + (json.error || '未知错误') + '</p>';
            return;
        }
        totalCount = json.total;
        document.getElementById('listInfo').textContent = '共 ' + totalCount + ' 条';
        renderTable(json.data);
        renderPagination();
    } catch (e) {
        document.getElementById('tableWrap').innerHTML = '<p style="color:red;padding:20px;">加载失败: ' + e.message + '</p>';
    }
}

function renderTable(rows) {
    // 四行布局：本周 + 下周V11 + V20量价 + V30情绪
    let html = '<table class="pred-table"><thead><tr>';
    // 共享列
    html += '<th rowspan="4" onclick="toggleSort(\'stock_code\')"><span class="th-wrap">代码 <span class="tip-icon" onclick="showTip(\'stock_code\',event)" title="点击查看说明">?</span></span></th>';
    html += '<th rowspan="4" onclick="toggleSort(\'stock_name\')"><span class="th-wrap">名称 <span class="tip-icon" onclick="showTip(\'stock_name\',event)" title="点击查看说明">?</span></span></th>';
    html += '<th rowspan="4" style="min-width:70px;text-align:center;cursor:default">综合信号</th>';
    html += '<th rowspan="4" style="width:28px;font-size:10px;color:#8e8e93;text-align:center;cursor:default">周期</th>';
    // 对比列
    const compareCols = [
        {key:'pred_direction', label:'方向'},
        {key:'confidence', label:'置信度'},
        {key:'strategy', label:'策略'},
        {key:'d4_chg', label:'d4涨跌%'},
        {key:'d3_chg', label:'d3涨跌%'},
        {key:'pred_weekly_chg', label:'预测涨跌幅'},
        {key:'week_realized_chg', label:'已实现/剩余'},
        {key:'backtest_accuracy', label:'回测准确率'},
        {key:'suggested_buy_date', label:'买入建议'},
    ];
    for (const c of compareCols) {
        let cls = '';
        if (c.key === currentSort) cls = currentSortDir === 'asc' ? 'sa' : 'sd';
        const hasTip = INDICATOR_TIPS[c.key];
        html += '<th class="' + cls + '" onclick="toggleSort(\'' + c.key + '\')">';
        html += '<span class="th-wrap">' + c.label;
        if (hasTip) html += ' <span class="tip-icon" onclick="showTip(\'' + c.key + '\',event)" title="点击查看说明">?</span>';
        html += '</span></th>';
    }
    // 共享列
    html += '<th rowspan="4"><span class="th-wrap">概念板块 <span class="tip-icon" onclick="showTip(\'concept_boards\',event)" title="点击查看说明">?</span></span></th>';
    html += '</tr></thead><tbody>';

    if (rows.length === 0) {
        html += '<tr><td colspan="14" style="text-align:center;color:#999;padding:20px;">暂无数据</td></tr>';
    }
    for (const r of rows) {
        // ── 本周行 ──
        html += '<tr class="row-tw" onclick="showHistory(\'' + r.stock_code + '\',\'' + (r.stock_name||'') + '\')">';
        html += '<td rowspan="4" style="font-family:\'SF Mono\',Menlo,monospace;font-weight:600;vertical-align:middle"><a href="/stock_detail?code=' + encodeURIComponent(r.stock_code) + '" onclick="event.stopPropagation()" style="color:#667eea;text-decoration:none" title="查看个股详情">' + r.stock_code + '</a></td>';
        html += '<td rowspan="4" style="vertical-align:middle">' + (r.stock_name || '-') + '</td>';
        var sig = computeSignal(r);
        html += '<td rowspan="4" style="vertical-align:middle;text-align:center">' + fmtSignalHtml(sig) + '</td>';
        html += '<td style="font-size:9px;color:#667eea;font-weight:600;text-align:center">本周</td>';
        html += '<td>' + dirBadge(r.pred_direction) + '<br><span style="font-size:10px;color:#aaa">' + getWeekRange(r.predict_date) + '</span></td>';
        html += '<td>' + confBadge(r.confidence) + '</td>';
        html += '<td><span style="font-size:11px;color:#666">' + (r.strategy || '-') + '</span></td>';
        // d4
        const d4DateRange = r.d4_date_range || '';
        html += '<td>' + fmtChg(r.d4_chg) + (d4DateRange ? '<br><span style="font-size:10px;color:#aaa">' + fmtDateRange(d4DateRange) + '</span>' : '') + '</td>';
        // d3
        const d3DateRange = r.d3_date_range || '';
        html += '<td>' + fmtChg(r.d3_chg) + (d3DateRange ? '<br><span style="font-size:10px;color:#aaa">' + fmtDateRange(d3DateRange) + '</span>' : '') + '</td>';
        // 本周预测涨跌幅
        let predChgHtml = '-';
        if (r.pred_weekly_chg != null) {
            const n = parseFloat(r.pred_weekly_chg);
            const cls = n > 0 ? 'chg-pos' : n < 0 ? 'chg-neg' : '';
            predChgHtml = '<span class="chg-val ' + cls + '" style="font-weight:600">' + (n > 0 ? '+' : '') + n.toFixed(2) + '%</span>';
            const predWeekRange = getWeekRange(r.predict_date);
            if (predWeekRange) predChgHtml += ' <span style="font-size:10px;color:#aaa">(' + predWeekRange + ')</span>';
            if (r.pred_chg_low != null && r.pred_chg_high != null) {
                predChgHtml += '<br><span style="font-size:10px;color:#aaa">' + parseFloat(r.pred_chg_low).toFixed(1) + '~' + parseFloat(r.pred_chg_high).toFixed(1) + '%</span>';
            }
            let metaParts = [];
            if (r.pred_chg_mae != null) metaParts.push('MAE:' + parseFloat(r.pred_chg_mae).toFixed(1) + '%');
            if (r.pred_chg_hit_rate != null) metaParts.push('命中:' + parseFloat(r.pred_chg_hit_rate).toFixed(0) + '%');
            if (r.pred_chg_samples != null) metaParts.push(r.pred_chg_samples + '条');
            if (metaParts.length) predChgHtml += '<br><span style="font-size:9px;color:#bbb">' + metaParts.join(' ') + '</span>';
        }
        html += '<td>' + predChgHtml + '</td>';
        // 已实现/剩余
        let realizedHtml = '-';
        if (r.week_realized_chg != null) {
            const rn = parseFloat(r.week_realized_chg);
            const rcls = rn > 0 ? 'chg-pos' : rn < 0 ? 'chg-neg' : '';
            realizedHtml = '<span style="font-size:10px;color:#888">已:</span><span class="chg-val ' + rcls + '">' + (rn > 0 ? '+' : '') + rn.toFixed(2) + '%</span>';
            if (r.pred_remaining_chg != null) {
                const rmn = parseFloat(r.pred_remaining_chg);
                const rmcls = rmn > 0 ? 'chg-pos' : rmn < 0 ? 'chg-neg' : '';
                realizedHtml += '<br><span style="font-size:10px;color:#888">余:</span><span class="chg-val ' + rmcls + '" style="font-weight:600">' + (rmn > 0 ? '+' : '') + rmn.toFixed(2) + '%</span>';
            }
            if (r.week_day_count != null) {
                realizedHtml += '<br><span style="font-size:9px;color:#bbb">' + r.week_day_count + '天/剩' + (5 - r.week_day_count) + '天</span>';
            }
        }
        html += '<td>' + realizedHtml + '</td>';
        // 回测准确率
        const btAcc = r.backtest_accuracy != null ? r.backtest_accuracy.toFixed(1) + '%' : '-';
        const btSamples = r.backtest_samples != null ? r.backtest_samples : null;
        const btStart = r.backtest_start_date || '';
        const btEnd = r.backtest_end_date || '';
        let btDetail = btAcc;
        if (btSamples != null && btStart) {
            btDetail = btAcc + ' <span style="font-size:10px;color:#999">(' + btStart.slice(5) + '~' + btEnd.slice(5) + ', ' + btSamples + '条)</span>';
        } else if (r.backtest_accuracy != null && r.predict_date) {
            const pd = new Date(r.predict_date);
            const sd = new Date(pd.getTime() - 29 * 7 * 86400000 - 7 * 86400000);
            const fmtMD = d => String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            btDetail = btAcc + ' <span style="font-size:10px;color:#999">(~29周 ' + fmtMD(sd) + '~' + fmtMD(pd) + ')</span>';
        }
        const isWeakStrategy = r.strategy && (/weak|uncertain|conflict|partial/.test(r.strategy) || /early_direction_d[12]/.test(r.strategy));
        if (isWeakStrategy) {
            btDetail += '<br><span style="font-size:9px;color:#d4a017;font-weight:500" title="弱信号策略">⚠ 弱信号</span>';
        }
        html += '<td>' + btDetail + '</td>';
        // 买入建议
        let buyHtml = '-';
        if (r.suggested_buy_date && r.pred_direction === 'UP') {
            const buyPrice = r.suggested_buy_price != null ? '¥' + r.suggested_buy_price.toFixed(2) : '';
            const buyDate = r.suggested_buy_date.slice(5);
            const buyReason = r.suggested_buy_reason || '';
            buyHtml = '<span style="color:#e74c3c;font-weight:600;font-size:11px">' + buyDate + '</span>';
            if (buyPrice) buyHtml += '<br><span style="font-size:11px;color:#667eea;font-weight:600">' + buyPrice + '</span>';
            if (buyReason) buyHtml = '<span title="' + buyReason + '">' + buyHtml + '</span>';
        }
        html += '<td>' + buyHtml + '</td>';
        // 概念板块 (rowspan)
        const boards = r.concept_boards ? r.concept_boards.split(',').slice(0, 3).join(', ') : '-';
        const boardsFull = r.concept_boards || '';
        html += '<td rowspan="4" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:#888;vertical-align:middle" title="' + boardsFull + '">' + boards + '</td>';
        html += '</tr>';

        // ── 下周行 ──
        html += '<tr class="row-nw" onclick="showHistory(\'' + r.stock_code + '\',\'' + (r.stock_name||'') + '\')">';
        html += '<td style="font-size:9px;color:#e67e22;font-weight:600;text-align:center">V11<br>下周</td>';
        // 下周方向
        let nwDirHtml = '-';
        if (r.nw_pred_direction) {
            nwDirHtml = dirBadge(r.nw_pred_direction);
            if (r.nw_date_range) nwDirHtml += '<br><span style="font-size:10px;color:#aaa">' + fmtDateRange(r.nw_date_range) + '</span>';
        } else if (r.nw_date_range) {
            nwDirHtml = '<span style="color:#999;font-size:11px">不确定</span>';
            if (r.nw_reason) nwDirHtml += '<br><span style="font-size:9px;color:#bbb">' + r.nw_reason + '</span>';
            nwDirHtml += '<br><span style="font-size:10px;color:#aaa">' + fmtDateRange(r.nw_date_range) + '</span>';
        }
        html += '<td>' + nwDirHtml + '</td>';
        // 下周置信度
        html += '<td>' + (r.nw_confidence ? confBadge(r.nw_confidence) : '-') + '</td>';
        // 策略/d4/d3 留空
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        // 下周预测涨跌幅
        let nwChgHtml = '-';
        if (r.nw_pred_chg != null) {
            const nwn = parseFloat(r.nw_pred_chg);
            const nwcls = nwn > 0 ? 'chg-pos' : nwn < 0 ? 'chg-neg' : '';
            nwChgHtml = '<span class="chg-val ' + nwcls + '" style="font-weight:600">' + (nwn > 0 ? '+' : '') + nwn.toFixed(2) + '%</span>';
            if (r.nw_pred_chg_low != null && r.nw_pred_chg_high != null) {
                nwChgHtml += '<br><span style="font-size:10px;color:#aaa">' + parseFloat(r.nw_pred_chg_low).toFixed(1) + '~' + parseFloat(r.nw_pred_chg_high).toFixed(1) + '%</span>';
            }
            let nwMeta = [];
            if (r.nw_pred_chg_mae != null) nwMeta.push('MAE:' + parseFloat(r.nw_pred_chg_mae).toFixed(1) + '%');
            if (r.nw_pred_chg_samples != null) nwMeta.push(r.nw_pred_chg_samples + '条');
            if (nwMeta.length) nwChgHtml += '<br><span style="font-size:9px;color:#bbb">' + nwMeta.join(' ') + '</span>';
        } else if (r.nw_pred_direction) {
            nwChgHtml = '<span style="font-size:10px;color:#aaa">数据不足</span>';
        }
        html += '<td>' + nwChgHtml + '</td>';
        // 已实现/剩余 留空
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        // 下周回测准确率
        let nwBtHtml = '-';
        if (r.nw_backtest_accuracy != null) {
            nwBtHtml = parseFloat(r.nw_backtest_accuracy).toFixed(0) + '%';
            if (r.nw_backtest_samples != null) {
                nwBtHtml += ' <span style="font-size:9px;color:#bbb">(' + r.nw_backtest_samples + '条)</span>';
            }
        }
        html += '<td>' + nwBtHtml + '</td>';
        // 买入建议 留空
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        html += '</tr>';

        // ── V20量价5日行 ──
        html += '<tr class="row-v20" onclick="showHistory(\'' + r.stock_code + '\',\'' + (r.stock_name||'') + '\')">'; 
        html += '<td style="font-size:9px;color:#009688;font-weight:600;text-align:center">V20<br>5日</td>';
        // V20方向
        if (r.v20_pred_direction) {
            html += '<td>' + dirBadge(r.v20_pred_direction) + '</td>';
        } else {
            html += '<td style="color:#ddd;font-size:10px">-</td>';
        }
        // V20置信度
        html += '<td>' + (r.v20_confidence ? confBadge(r.v20_confidence) : '<span style="color:#ddd;font-size:10px">-</span>') + '</td>';
        // V20规则
        if (r.v20_rule_name) {
            html += '<td><span style="font-size:11px;color:#009688">' + r.v20_rule_name + '</span>';
            if (r.v20_matched_count) html += '<br><span style="font-size:10px;color:#888">' + r.v20_matched_count + '条规则</span>';
            html += '</td>';
        } else {
            html += '<td style="color:#ddd;font-size:10px">-</td>';
        }
        // d4/d3 留空
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        html += '<td style="color:#ddd;font-size:10px">-</td>';
        // 预测涨跌幅 留空

function toggleSort(key) {

        currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort = key;
        currentSortDir = 'asc';
    }

}

function renderPagination() {
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    let html = '<span style="font-size:11px;color:#666;margin-right:8px;">共 ' + totalCount + ' 条  ' + totalPages + ' 页  每页 ' + PAGE_SIZE + ' 条</span>';
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = html; return; }
    html += '<button class="page-btn" onclick="goPage(1)" ' + (currentPage===1?'disabled':'') + '>首页</button>';
    html += '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>上一页</button>';
    const start = Math.max(1, currentPage - 3);
    const end = Math.min(totalPages, currentPage + 3);
    for (let i = start; i <= end; i++) {
        html += '<button class="page-btn' + (i===currentPage?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    html += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>下一页</button>';
    html += '<button class="page-btn" onclick="goPage(' + totalPages + ')" ' + (currentPage===totalPages?'disabled':'') + '>末页</button>';
    document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    loadList();
}

                        const sStart = r.backtest_start_date.slice(5);

                    }
                }
                html += '<td>' + hBtAcc + '</td>';
                let hBuy = '-';
                if (r.suggested_buy_date && r.pred_direction === 'UP') {
                    hBuy = '<span style="color:#e74c3c;font-size:11px">' + r.suggested_buy_date.slice(5) + '</span>';
                    if (r.suggested_buy_price != null) hBuy += ' ¥' + r.suggested_buy_price.toFixed(2);
                    if (r.suggested_buy_reason) hBuy = '<span title="' + r.suggested_buy_reason + '">' + hBuy + '</span>';
                }
                html += '<td style="font-size:11px">' + hBuy + '</td>';
                html += '<td>' + (r.actual_direction ? dirBadge(r.actual_direction) : '<span style="color:#ccc">-</span>') + '</td>';
                html += '<td>' + (r.actual_weekly_chg != null ? fmtChg(r.actual_weekly_chg) : '-') + '</td>';
                if (r.is_correct === 1) html += '<td class="correct-yes">✓</td>';
                else if (r.is_correct === 0) html += '<td class="correct-no">✗</td>';
                else html += '<td style="color:#ccc">-</td>';

                html += '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:#888" title="' + (r.concept_boards || '') + '">' + hBoards + '</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('historyBody').innerHTML = html;
    } catch (e) {
        document.getElementById('historyBody').innerHTML = '<p style="color:red;">加载失败: ' + e.message + '</p>';
    }

function renderMonthlyTable(rows) {
    let html = '<table class="pred-table"><thead><tr>';
    html += '<th>代码</th><th>名称</th><th>预测方向</th><th>置信度</th>';
    html += '<th>CANSLIM综合分</th><th>C/A/N/S/L/I/M</th>';
    html += '<th>杯柄形态</th><th>技术因子</th>';
    html += '<th>本月涨跌%</th><th>目标月</th><th>回测准确率</th>';
    html += '</tr></thead><tbody>';

    if (rows.length === 0) {
        html += '<tr><td colspan="11" style="text-align:center;color:#999;padding:20px;">暂无月度预测数据（请先点击"重新计算"）</td></tr>';
    }
    for (const r of rows) {
        html += '<tr onclick="showMonthlyHistory(\'' + r.stock_code + '\',\'' + (r.stock_name||'') + '\')">';
        html += '<td style="font-family:\'SF Mono\',Menlo,monospace;font-weight:600"><a href="/stock_detail?code=' + encodeURIComponent(r.stock_code) + '" onclick="event.stopPropagation()" style="color:#667eea;text-decoration:none" title="查看个股详情">' + r.stock_code + '</a></td>';
        html += '<td>' + (r.stock_name || '-') + '</td>';
        html += '<td>' + dirBadge('UP') + '<br><span style="font-size:10px;color:#aaa">' + (r.date_range ? fmtDateRange(r.date_range) : '') + '</span></td>';
        html += '<td>' + confBadge(r.confidence || 'medium') + '</td>';
        // CANSLIM综合分
        const score = r.composite_score != null ? parseFloat(r.composite_score).toFixed(1) : '-';
        const scoreCls = r.composite_score >= 70 ? 'chg-pos' : '';
        html += '<td><span class="chg-val ' + scoreCls + '" style="font-weight:700;font-size:15px">' + score + '</span></td>';
        // C/A/N/S/L/I/M 维度评分
        let dimHtml = '-';
        if (r.dim_scores) {
            try {
                const dims = typeof r.dim_scores === 'string' ? JSON.parse(r.dim_scores) : r.dim_scores;
                const dimKeys = ['C','A','N','S','L','I','M'];
                const parts = [];
                for (const k of dimKeys) {
                    const v = dims[k];
                    if (v == null) continue;
                    const cls = v >= 60 ? 'chg-pos' : v < 30 ? 'chg-neg' : '';
                    parts.push('<span class="' + cls + '" style="font-size:10px">' + k + ':' + v + '</span>');
                }
                dimHtml = parts.join(' ');
            } catch(e) { dimHtml = '-'; }
        }
        html += '<td style="max-width:200px;white-space:normal;line-height:1.6">' + dimHtml + '</td>';
        // 杯柄形态
        let chHtml = '-';
        if (r.dim_scores) {
            try {
                const dims = typeof r.dim_scores === 'string' ? JSON.parse(r.dim_scores) : r.dim_scores;
                const chScore = dims.cup_handle_score;
                if (chScore != null) {
                    const chParts = ['杯柄=' + chScore + '分'];
                    if (dims.cup_depth) chParts.push('深度=' + dims.cup_depth + '%');
                    if (dims.cup_days) chParts.push(dims.cup_days + '天');
                    if (dims.cup_handle_breakout) chParts.push('<span class="chg-pos">已突破</span>');
                    if (dims.cup_handle_vol_confirm) chParts.push('<span class="chg-pos">放量</span>');
                    chHtml = '<span style="font-size:10px">' + chParts.join(', ') + '</span>';
                }
            } catch(e) {}
        }
        html += '<td style="max-width:180px;white-space:normal;line-height:1.6">' + chHtml + '</td>';
        // 技术因子
        let techHtml = '-';
        if (r.dim_scores) {
            try {
                const dims = typeof r.dim_scores === 'string' ? JSON.parse(r.dim_scores) : r.dim_scores;
                const techParts = [];
                if (dims.vol_20 != null) techParts.push('波动=' + dims.vol_20 + '%');
                if (dims.rsi != null) techParts.push('RSI=' + dims.rsi);
                if (dims.avg_hand_5 != null) techParts.push('换手=' + dims.avg_hand_5 + '%');
                techHtml = '<span style="font-size:10px">' + techParts.join(', ') + '</span>';
            } catch(e) {}
        }
        html += '<td style="max-width:160px;white-space:normal;line-height:1.6">' + techHtml + '</td>';
        // 本月涨跌
        html += '<td>' + fmtChg(r.this_month_chg) + '</td>';
        // 预测目标月
        const targetMonth = r.target_year && r.target_month
            ? r.target_year + '-' + String(r.target_month).padStart(2, '0') : '-';
        html += '<td style="color:#666">' + targetMonth + '</td>';
        // 回测准确率
        const btAcc = r.backtest_accuracy != null ? parseFloat(r.backtest_accuracy).toFixed(1) + '%' : '-';
        const btSamples = r.backtest_samples || '-';
        html += '<td>' + btAcc + '<br><span style="font-size:10px;color:#aaa">' + btSamples + '样本</span></td>';
        html += '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('nmTableWrap').innerHTML = html;
}

async function showMonthlyHistory(code, name) {
    document.getElementById('historyTitle').innerHTML = '<a href="/stock_detail?code=' + encodeURIComponent(code) + '" style="color:#667eea;text-decoration:none" title="查看个股详情">' + code + '</a> ' + name + ' - 月度预测历史';
    document.getElementById('historyBody').innerHTML = '<p style="color:#999;text-align:center;padding:20px;">加载中...</p>';
    document.getElementById('historyModal').classList.add('visible');

    try {
        const resp = await fetch('/api/monthly_prediction/history?stock_code=' + encodeURIComponent(code) + '&limit=50');
        const json = await resp.json();
        if (!json.success || !json.data) {
            document.getElementById('historyBody').innerHTML = '<p style="color:red;">加载失败</p>';
            return;
        }
        const rows = json.data;
        if (rows.length === 0) {
            document.getElementById('historyBody').innerHTML = '<p style="color:#999;text-align:center;">暂无月度预测历史记录</p>';
            return;
        }

        let html = '<table class="hist-table"><thead><tr>';
        html += '<th>目标月</th><th>预测日期</th><th>方向</th><th>置信度</th>';
        html += '<th>CANSLIM综合分</th><th>C/A/N/S/L/I/M</th>';
        html += '<th>杯柄形态</th><th>技术因子</th>';
        html += '<th>当月涨跌%</th><th>回测准确率</th>';
        html += '<th>实际涨跌%</th><th>结果</th>';
        html += '</tr></thead><tbody>';

        for (const r of rows) {
            html += '<tr>';
            // 目标月
            const tm = r.target_year && r.target_month
                ? r.target_year + '-' + String(r.target_month).padStart(2, '0') : '-';
            html += '<td style="font-weight:600;color:#667eea">' + tm + '</td>';
            // 预测日期
            html += '<td style="font-size:11px;color:#666">' + (r.predict_date || '-') + '</td>';
            // 方向
            html += '<td>' + dirBadge(r.pred_direction || 'UP') + '</td>';
            // 置信度
            html += '<td>' + confBadge(r.confidence || 'medium') + '</td>';
            // CANSLIM综合分
            const cs = r.composite_score != null ? parseFloat(r.composite_score).toFixed(1) : '-';
            const csCls = r.composite_score >= 70 ? 'chg-pos' : '';
            html += '<td><span class="chg-val ' + csCls + '" style="font-weight:700">' + cs + '</span></td>';
            // C/A/N/S/L/I/M
            let dimHtml = '-';
            if (r.dim_scores) {
                try {
                    const dims = typeof r.dim_scores === 'string' ? JSON.parse(r.dim_scores) : r.dim_scores;
                    const parts = [];
                    for (const k of ['C','A','N','S','L','I','M']) {
                        const v = dims[k];
                        if (v == null) continue;
                        const cls = v >= 60 ? 'chg-pos' : v < 30 ? 'chg-neg' : '';
                        parts.push('<span class="' + cls + '" style="font-size:10px">' + k + ':' + v + '</span>');
                    }
                    dimHtml = parts.join(' ');
                } catch(e) {}
            }
            html += '<td style="max-width:180px;white-space:normal;line-height:1.6">' + dimHtml + '</td>';
            // 杯柄形态
            let chHtml = '-';
            if (r.dim_scores) {
                try {
                    const dims = typeof r.dim_scores === 'string' ? JSON.parse(r.dim_scores) : r.dim_scores;
                    if (dims.cup_handle_score != null) {
                        const chParts = ['杯柄=' + dims.cup_handle_score + '分'];
                        if (dims.cup_depth) chParts.push('深度=' + dims.cup_depth + '%');
                        if (dims.cup_days) chParts.push(dims.cup_days + '天');
                        if (dims.cup_handle_breakout) chParts.push('<span class="chg-pos">突破</span>');
                        if (dims.cup_handle_vol_confirm) chParts.push('<span class="chg-pos">放量</span>');
                        chHtml = '<span style="font-size:10px">' + chParts.join(', ') + '</span>';
                    }
                } catch(e) {}
            }
            html += '<td style="max-width:160px;white-space:normal;line-height:1.6">' + chHtml + '</td>';
            // 技术因子
            let techHtml = '-';
            if (r.dim_scores) {
                try {
                    const dims = typeof r.dim_scores === 'string' ? JSON.parse(r.dim_scores) : r.dim_scores;
                    const tp = [];
                    if (dims.vol_20 != null) tp.push('波动=' + dims.vol_20 + '%');
                    if (dims.rsi != null) tp.push('RSI=' + dims.rsi);
                    if (dims.avg_hand_5 != null) tp.push('换手=' + dims.avg_hand_5 + '%');
                    techHtml = '<span style="font-size:10px">' + tp.join(', ') + '</span>';
                } catch(e) {}
            }
            html += '<td style="max-width:140px;white-space:normal;line-height:1.6">' + techHtml + '</td>';
            // 当月涨跌
            html += '<td>' + fmtChg(r.this_month_chg) + '</td>';
            // 回测准确率
            const ba = r.backtest_accuracy != null ? parseFloat(r.backtest_accuracy).toFixed(1) + '%' : '-';
            html += '<td>' + ba + '</td>';
            // 实际涨跌
            if (r.actual_next_month_chg != null) {
                const an = parseFloat(r.actual_next_month_chg);
                const acls = an > 0 ? 'chg-pos' : an < 0 ? 'chg-neg' : '';
                html += '<td><span class="chg-val ' + acls + '" style="font-weight:600">' + (an > 0 ? '+' : '') + an.toFixed(2) + '%</span></td>';
            } else {
                html += '<td><span style="color:#ccc">待验证</span></td>';
            }
            // 结果
            if (r.is_correct === 1 || r.is_correct === '1') {
                html += '<td><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(46,204,113,0.15);color:#2ecc71">✓ 正确</span></td>';
            } else if (r.is_correct === 0 || r.is_correct === '0') {
                html += '<td><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(231,76,60,0.15);color:#e74c3c">✗ 错误</span></td>';
            } else {
                html += '<td><span style="color:#ccc">-</span></td>';
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('historyBody').innerHTML = html;
    } catch (e) {
        document.getElementById('historyBody').innerHTML = '<p style="color:red;">加载失败: ' + e.message + '</p>';
    }
}

/**
 * 通用按钮进度轮询。
 * @param {string} btnId - 按钮DOM id
 * @param {string} label - 按钮原始文字
 * @param {string} statusUrl - 状态API地址
 * @param {function} isRunning - (data) => bool
 * @param {function} progressText - (data) => '150/5233'
 * @param {function} isSuccess - (data) => bool
 * @param {function} [onComplete] - 完成后自定义刷新回调
 */
function pollBtnProgress(btnId, label, statusUrl, isRunning, progressText, isSuccess, onComplete) {
    const btn = document.getElementById(btnId);
    const origText = btn.textContent;
    btn.disabled = true;
    btn.style.opacity = '0.85';
    let pollCount = 0;
    const timer = setInterval(async () => {
        pollCount++;
        try {
            const resp = await fetch(statusUrl);
            const json = await resp.json();
            if (json.success && json.data) {
                const s = json.data;
                if (isRunning(s)) {
                    const prog = progressText(s);
                    btn.textContent = `⏳ ${label} (${prog})`;
                } else {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    if (isSuccess(s)) {
                        btn.textContent = `✅ ${label} 完成`;
                        if (onComplete) { onComplete(); }
                        else { loadSummary(); loadList(); }
                        setTimeout(() => { btn.textContent = origText; }, 3000);
                    } else {
                        btn.textContent = `❌ ${label} 失败`;
                        setTimeout(() => { btn.textContent = origText; }, 5000);
                    }
                }
            }
        } catch (e) { /* ignore */ }
        if (pollCount > 600) {
            clearInterval(timer);
            btn.textContent = origText;
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    }, 1000);
}

async function loadVerifyWeeks() {
    try {
        const resp = await fetch('/api/weekly_prediction/weeks?limit=20');
        const json = await resp.json();
        if (!json.success || !json.data) return;
        const sel = document.getElementById('verifyWeekSelect');
        sel.innerHTML = '';
        // 默认选第二个（上一周），第一个是本周
        for (let i = 0; i < json.data.length; i++) {
            const w = json.data[i];
            const acc = w.accuracy != null ? ' 准确率:' + w.accuracy + '%' : '';
            const verified = parseInt(w.verified_count) || 0;
            const weekRange = w.predict_date ? getWeekRange(w.predict_date) : '';

            opt.value = w.iso_year + '-' + w.iso_week;
            opt.textContent = 'Y' + w.iso_year + '-W' + String(w.iso_week).padStart(2,'0') +
                (weekRange ? ' (' + weekRange + ')' : '') +
                ' ' + (w.stock_count||0) + '只' +
                (verified > 0 ? ' 已验证' + verified + '只' + acc : ' 待验证');
            if (i === 1) opt.selected = true;  // 默认选上一周
            sel.appendChild(opt);
        }
        loadVerifyList();
    } catch (e) { console.error('loadVerifyWeeks error:', e); }

async function loadVerifyList() {

function renderVerifySummary(s) {
    if (!s || !s.total) {
        document.getElementById('verifySummaryRow').innerHTML = '<div class="summary-card"><div class="label">暂无数据</div><div class="value">-</div></div>';
        return;
    }
    let html = '';
    const total = parseInt(s.total) || 0;
    const correct = parseInt(s.correct) || 0;
    const wrong = parseInt(s.wrong) || 0;
    const pending = parseInt(s.pending) || 0;
    const accuracy = s.accuracy != null ? s.accuracy + '%' : '-';
    const predUp = parseInt(s.pred_up) || 0;
    const predDown = parseInt(s.pred_down) || 0;
    const weekRange = s.predict_date ? getWeekRange(s.predict_date) : '';

    html += card('验证周', 'Y' + s.iso_year + '-W' + String(s.iso_week).padStart(2,'0'), '',
        (weekRange ? weekRange + '  ' : '') + '共' + total + '只股票');

    // 实际准确率（核心指标）
    const accVal = s.accuracy != null ? parseFloat(s.accuracy) : null;
    const accCls = accVal !== null && accVal >= 50 ? 'up' : 'down';
    html += card('实际准确率', accuracy, accCls,
        '正确' + correct + ' 错误' + wrong + (pending > 0 ? ' 待验证' + pending : ''));

    // 回测准确率 vs 实际准确率对比
    const avgBt = s.avg_backtest_accuracy != null ? parseFloat(s.avg_backtest_accuracy) : null;
    const avgBtStr = avgBt != null ? avgBt.toFixed(1) + '%' : '-';
    let diffStr = '';
    if (accVal !== null && avgBt !== null) {
        const diff = accVal - avgBt;
        const diffCls = diff >= 0 ? 'chg-pos' : 'chg-neg';
        diffStr = '偏差: <span class="' + diffCls + '">' + (diff >= 0 ? '+' : '') + diff.toFixed(1) + '%</span>';
    }
    html += card('回测准确率', avgBtStr, '', diffStr || '对比实际准确率');

    html += card('预测涨', predUp, 'up', '占比 ' + pct(predUp, total));
    html += card('预测跌', predDown, 'down', '占比 ' + pct(predDown, total));

    // 分置信度准确率
    const highTotal = parseInt(s.high_total) || 0;
    const highCorrect = parseInt(s.high_correct) || 0;
    const highAcc = highTotal > 0 ? (highCorrect / highTotal * 100).toFixed(1) + '%' : '-';
    html += card('高置信准确率', highAcc, '', highCorrect + '/' + highTotal);

    const medTotal = parseInt(s.med_total) || 0;
    const medCorrect = parseInt(s.med_correct) || 0;
    const medAcc = medTotal > 0 ? (medCorrect / medTotal * 100).toFixed(1) + '%' : '-';
    html += card('中置信准确率', medAcc, '', medCorrect + '/' + medTotal);

    const lowTotal = parseInt(s.low_total) || 0;
    const lowCorrect = parseInt(s.low_correct) || 0;
    const lowAcc = lowTotal > 0 ? (lowCorrect / lowTotal * 100).toFixed(1) + '%' : '-';
    html += card('低置信准确率', lowAcc, '', lowCorrect + '/' + lowTotal);

    const avgActual = s.avg_actual_chg != null ? parseFloat(s.avg_actual_chg).toFixed(2) + '%' : '-';
    const avgPred = s.avg_pred_chg != null ? parseFloat(s.avg_pred_chg).toFixed(2) + '%' : '-';
    html += card('平均实际涨跌', avgActual, '', '预测均值: ' + avgPred, 'wide');

    document.getElementById('verifySummaryRow').innerHTML = html;
}

            const pn = parseFloat(r.pred_weekly_chg);
            const pcls = pn > 0 ? 'chg-pos' : pn < 0 ? 'chg-neg' : '';
            predHtml = '<span class="chg-val ' + pcls + '">' + (pn > 0 ? '+' : '') + pn.toFixed(2) + '%</span>';
            if (r.pred_chg_low != null && r.pred_chg_high != null) {
                predHtml += '<br><span style="font-size:10px;color:#aaa">' + parseFloat(r.pred_chg_low).toFixed(1) + '~' + parseFloat(r.pred_chg_high).toFixed(1) + '%</span>';
            }
        }
        html += '<td>' + predHtml + '</td>';
        // 实际涨跌幅
        let actualHtml = '<span style="color:#ccc">待验证</span>';
        if (r.actual_weekly_chg != null) {
            const an = parseFloat(r.actual_weekly_chg);
            const acls = an > 0 ? 'chg-pos' : an < 0 ? 'chg-neg' : '';
            actualHtml = '<span class="chg-val ' + acls + '" style="font-weight:600">' + (an > 0 ? '+' : '') + an.toFixed(2) + '%</span>';
            if (r.actual_direction) actualHtml += '<br>' + dirBadge(r.actual_direction);
        }
        html += '<td>' + actualHtml + '</td>';
        // 结果
        if (r.is_correct === 1 || r.is_correct === '1') {
            html += '<td><span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(46,204,113,0.15);color:#2ecc71">✓ 正确</span></td>';
        } else if (r.is_correct === 0 || r.is_correct === '0') {
            html += '<td><span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(231,76,60,0.15);color:#e74c3c">✗ 错误</span></td>';
        } else {
            html += '<td><span style="color:#ccc;font-size:11px">-</span></td>';
        }
        // 回测准确率
        const btAcc = r.backtest_accuracy != null ? parseFloat(r.backtest_accuracy).toFixed(1) + '%' : '-';
        const btSamples = r.backtest_samples != null ? r.backtest_samples + '条' : '';
        html += '<td>' + btAcc + (btSamples ? '<br><span style="font-size:10px;color:#aaa">' + btSamples + '</span>' : '') + '</td>';
        // 下周预测
        let nwHtml = '-';
        if (r.nw_pred_direction) {
            nwHtml = dirBadge(r.nw_pred_direction);
            if (r.nw_confidence) nwHtml += ' ' + confBadge(r.nw_confidence);
            if (r.nw_date_range) nwHtml += '<br><span style="font-size:10px;color:#aaa">' + fmtDateRange(r.nw_date_range) + '</span>';
        }
        html += '<td>' + nwHtml + '</td>';
        // 概念板块
        const boards = r.concept_boards ? r.concept_boards.split(',').slice(0, 3).join(', ') : '-';
        html += '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:#888" title="' + (r.concept_boards || '') + '">' + boards + '</td>';
        html += '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('verifyTableWrap').innerHTML = html;
}

function toggleVerifySort(key) {
    if (verifyCurrentSort === key) {
        verifyCurrentSortDir = verifyCurrentSortDir === 'asc' ? 'desc' : 'asc';
    } else {
        verifyCurrentSort = key;
        verifyCurrentSortDir = key === 'actual_weekly_chg' || key === 'is_correct' ? 'desc' : 'asc';
    }
    verifyCurrentPage = 1;
    loadVerifyList();
}

function renderVerifyPagination() {
    const totalPages = Math.ceil(verifyTotalCount / PAGE_SIZE);
    let html = '<span style="font-size:11px;color:#666;margin-right:8px;">共 ' + verifyTotalCount + ' 条  ' + totalPages + ' 页</span>';
    if (totalPages <= 1) { document.getElementById('verifyPagination').innerHTML = html; return; }
    html += '<button class="page-btn" onclick="goVerifyPage(1)" ' + (verifyCurrentPage===1?'disabled':'') + '>首页</button>';
    html += '<button class="page-btn" onclick="goVerifyPage(' + (verifyCurrentPage-1) + ')" ' + (verifyCurrentPage===1?'disabled':'') + '>上一页</button>';
    const start = Math.max(1, verifyCurrentPage - 3);
    const end = Math.min(totalPages, verifyCurrentPage + 3);
    for (let i = start; i <= end; i++) {
        html += '<button class="page-btn' + (i===verifyCurrentPage?' active':'') + '" onclick="goVerifyPage(' + i + ')">' + i + '</button>';
    }
    html += '<button class="page-btn" onclick="goVerifyPage(' + (verifyCurrentPage+1) + ')" ' + (verifyCurrentPage===totalPages?'disabled':'') + '>下一页</button>';
    document.getElementById('verifyPagination').innerHTML = html;
}

function goVerifyPage(p) {
    const totalPages = Math.ceil(verifyTotalCount / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    verifyCurrentPage = p;
    loadVerifyList();
}

// ── 回填验证按钮 ──

async function triggerVerifyAll() {
    if (!await checkAutoJobEnabled()) return;
    if (!confirm('确认回填全部待验证周的实际结果？\n将从K线数据计算每周实际涨跌幅，并与预测方向对比标记正确/错误。')) return;
    const btn = document.getElementById('btnVerifyAll');
    btn.disabled = true;
    btn.textContent = '回填中...';
    try {
        const resp = await fetch('/api/weekly_prediction/verify_all', {method: 'POST'});
        const json = await resp.json();
        if (json.success) {
            const s = json.summary || {};
            let msg = '回填完成！\n处理 ' + (s.weeks_processed||0) + ' 周\n验证 ' + (s.total_verified||0) + ' 只\n准确率: ' + (s.accuracy != null ? s.accuracy + '%' : '-');
            if (s.nw_weeks_processed > 0) {
                msg += '\n\n[V11下周预测] 额外回填 ' + s.nw_weeks_processed + ' 周, ' + (s.nw_verified||0) + ' 只';
            }
            if (s.v20_verified > 0) {
                msg += '\n\n[V20量价预测] 回填 ' + s.v20_verified + ' 只, 准确率: ' + (s.v20_accuracy != null ? s.v20_accuracy + '%' : '-');
            }
            if (s.v30_verified > 0) {
                msg += '\n\n[V30情绪预测] 回填 ' + s.v30_verified + ' 只, 准确率: ' + (s.v30_accuracy != null ? s.v30_accuracy + '%' : '-');
            }
            alert(msg);
            // 刷新当前页面数据
            loadVerifyList();
            if (nwVerifyLoaded) loadNwVerifyList();
            if (v20VerifyLoaded) loadV20VerifyList();
            if (v30VerifyLoaded) loadV30VerifyList();
            loadVerifyWeeks();
            if (nwVerifyLoaded) loadNwVerifyWeeks();
            if (v20VerifyLoaded) loadV20VerifyWeeks();
            if (v30VerifyLoaded) loadV30VerifyWeeks();
        } else {
            alert('回填失败: ' + (json.error || '未知错误'));
        }
    } catch (e) {
        alert('回填失败: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '回填全部待验证';
    }
}

async function triggerVerifyWeek() {
    if (!await checkAutoJobEnabled()) return;
    // 根据当前子Tab选择对应的周选择器
    const selId = verifySubTab === 'nw' ? 'nwVerifyWeekSelect' : verifySubTab === 'v20' ? 'v20VerifyWeekSelect' : verifySubTab === 'v30' ? 'v30VerifyWeekSelect' : 'verifyWeekSelect';
    const weekVal = document.getElementById(selId).value;
    if (!weekVal) { alert('请先选择一个周'); return; }
    const [y, w] = weekVal.split('-');
    const isNw = verifySubTab === 'nw';
    const isV20 = verifySubTab === 'v20';
    const isV30 = verifySubTab === 'v30';
    const label = isV30 ? 'V30情绪预测' : isV20 ? 'V20量价预测' : isNw ? 'V11下周预测' : '本周预测';
    if (!confirm('确认回填 Y' + y + '-W' + String(w).padStart(2,'0') + ' 的' + label + '实际结果？')) return;
    const btn = document.getElementById('btnVerifyWeek');
    btn.disabled = true;
    btn.textContent = '回填中...';
    try {
        const url = isNw
            ? '/api/weekly_prediction/verify_nw_week?iso_year=' + y + '&iso_week=' + w
            : '/api/weekly_prediction/verify_week?iso_year=' + y + '&iso_week=' + w;
        const resp = await fetch(url, {method: 'POST'});
        const json = await resp.json();
        if (json.success) {
            const d = json.data || {};
            const msg = 'Y' + y + '-W' + String(w).padStart(2,'0') + ' ' + label + '回填完成！\n' +
                '验证: ' + (d.verified||0) + ' 只  正确: ' + (d.correct||0) + '  错误: ' + (d.wrong||0) +
                '  跳过: ' + (d.skipped||0) + '\n准确率: ' + (d.accuracy != null ? d.accuracy + '%' : '-');
            alert(msg);
            loadVerifyList();
            if (nwVerifyLoaded) loadNwVerifyList();
            if (v20VerifyLoaded) loadV20VerifyList();
            if (v30VerifyLoaded) loadV30VerifyList();
        } else {
            alert('回填失败: ' + (json.error || '未知错误'));
        }
    } catch (e) {
        alert('回填失败: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '回填当前选中周';
    }
}

let nwVerifyCurrentPage = 1;
let nwVerifyTotalCount = 0;
let nwVerifyCurrentSort = 'stock_code';
let nwVerifyCurrentSortDir = 'asc';
let _nwVerifySearchTimer = null;

function debounceNwVerifySearch() {
    clearTimeout(_nwVerifySearchTimer);
    _nwVerifySearchTimer = setTimeout(() => { nwVerifyCurrentPage = 1; loadNwVerifyList(); }, 300);
}

async function loadNwVerifyWeeks() {
    try {
        const resp = await fetch('/api/weekly_prediction/weeks?limit=20');
        const json = await resp.json();
        if (!json.success || !json.data) return;
        const sel = document.getElementById('nwVerifyWeekSelect');
        sel.innerHTML = '';
        // 默认选第二个（上周），nw实际结果直接存在W周记录上
        for (let i = 0; i < json.data.length; i++) {
            const w = json.data[i];
            const weekRange = w.predict_date ? getWeekRange(w.predict_date) : '';
            const opt = document.createElement('option');
            opt.value = w.iso_year + '-' + w.iso_week;
            opt.textContent = 'Y' + w.iso_year + '-W' + String(w.iso_week).padStart(2,'0') +
                (weekRange ? ' (' + weekRange + ')' : '') +
                ' ' + (w.stock_count||0) + '只';
            if (i === 1) opt.selected = true;  // 默认选上周
            sel.appendChild(opt);
        }
        loadNwVerifyList();
    } catch (e) { console.error('loadNwVerifyWeeks error:', e); }
}

async function loadNwVerifyList() {
    const weekVal = document.getElementById('nwVerifyWeekSelect').value;
    const direction = document.getElementById('nwVerifyFilterDirection').value;
    const result = document.getElementById('nwVerifyFilterResult').value;
    const keyword = document.getElementById('nwVerifySearchInput').value.trim();
    const offset = (nwVerifyCurrentPage - 1) * PAGE_SIZE;

    let url = '/api/weekly_prediction/nw_verification?limit=' + PAGE_SIZE + '&offset=' + offset +
              '&sort_by=' + nwVerifyCurrentSort + '&sort_dir=' + nwVerifyCurrentSortDir;
    if (weekVal) {
        const [y, w] = weekVal.split('-');
        url += '&iso_year=' + y + '&iso_week=' + w;
    }
    if (direction) url += '&direction=' + direction;
    if (result) url += '&result=' + result;
    if (keyword) url += '&keyword=' + encodeURIComponent(keyword);

    try {
        const resp = await fetch(url);
        const json = await resp.json();
        if (!json.success) {
            document.getElementById('nwVerifyTableWrap').innerHTML = '<p style="color:red;padding:20px;">加载失败: ' + (json.error || '') + '</p>';
            return;
        }
        nwVerifyTotalCount = json.total;
        document.getElementById('nwVerifyListInfo').textContent = '共 ' + nwVerifyTotalCount + ' 条';
        renderNwVerifySummary(json.summary);
        renderNwVerifyTable(json.data);
        renderNwVerifyPagination();
    } catch (e) {
        document.getElementById('nwVerifyTableWrap').innerHTML = '<p style="color:red;padding:20px;">加载失败: ' + e.message + '</p>';
    }
}

function renderNwVerifySummary(s) {
    if (!s || !s.total) {
        document.getElementById('nwVerifySummaryRow').innerHTML = '<div class="summary-card"><div class="label">暂无数据</div><div class="value">-</div></div>';
        return;
    }
    let html = '';
    const total = parseInt(s.total) || 0;
    const correct = parseInt(s.correct) || 0;
    const wrong = parseInt(s.wrong) || 0;
    const pending = parseInt(s.pending) || 0;
    const accuracy = s.accuracy != null ? s.accuracy + '%' : '-';
    const predUp = parseInt(s.pred_up) || 0;
    const predDown = parseInt(s.pred_down) || 0;
    const weekRange = s.predict_date ? getWeekRange(s.predict_date) : '';
    const nwDateRange = s.nw_date_range ? fmtDateRange(s.nw_date_range) : '';

    html += card('预测发起周', 'Y' + s.iso_year + '-W' + String(s.iso_week).padStart(2,'0'), '',
        (weekRange ? '发起: ' + weekRange : '') + (nwDateRange ? '  验证: ' + nwDateRange : ''));

    // 实际准确率
    const accVal = s.accuracy != null ? parseFloat(s.accuracy) : null;
    const accCls = accVal !== null && accVal >= 50 ? 'up' : 'down';
    html += card('实际准确率', accuracy, accCls,
        '正确' + correct + ' 错误' + wrong + (pending > 0 ? ' 待验证' + pending : ''));

    // 回测准确率对比
    const avgBt = s.avg_backtest_accuracy != null ? parseFloat(s.avg_backtest_accuracy) : null;
    const avgBtStr = avgBt != null ? avgBt.toFixed(1) + '%' : '-';
    let diffStr = '';
    if (accVal !== null && avgBt !== null) {
        const diff = accVal - avgBt;
        const diffCls = diff >= 0 ? 'chg-pos' : 'chg-neg';
        diffStr = '偏差: <span class="' + diffCls + '">' + (diff >= 0 ? '+' : '') + diff.toFixed(1) + '%</span>';
    }
    html += card('回测准确率', avgBtStr, '', diffStr || '对比实际准确率');

    html += card('预测涨', predUp, 'up', '占比 ' + pct(predUp, total));
    html += card('预测跌', predDown, 'down', '占比 ' + pct(predDown, total));

    // 分置信度准确率
    const highTotal = parseInt(s.high_total) || 0;
    const highCorrect = parseInt(s.high_correct) || 0;
    const highAcc = highTotal > 0 ? (highCorrect / highTotal * 100).toFixed(1) + '%' : '-';
    html += card('高置信准确率', highAcc, '', highCorrect + '/' + highTotal);

    const refTotal = parseInt(s.ref_total) || 0;
    const refCorrect = parseInt(s.ref_correct) || 0;
    const refAcc = refTotal > 0 ? (refCorrect / refTotal * 100).toFixed(1) + '%' : '-';
    html += card('参考级准确率', refAcc, '', refCorrect + '/' + refTotal);

    const avgActual = s.avg_actual_chg != null ? parseFloat(s.avg_actual_chg).toFixed(2) + '%' : '-';
    const avgPred = s.avg_pred_chg != null ? parseFloat(s.avg_pred_chg).toFixed(2) + '%' : '-';
    html += card('平均实际涨跌', avgActual, '', '预测均值: ' + avgPred, 'wide');

    document.getElementById('nwVerifySummaryRow').innerHTML = html;
}

function renderV20VerifySummary(s) {
    if (!s || !s.total) {

        return;
    }
    let html = '';
    const total = parseInt(s.total) || 0;
    const correct = parseInt(s.correct) || 0;
    const wrong = parseInt(s.wrong) || 0;
    const pending = parseInt(s.pending) || 0;
    const accuracy = s.accuracy != null ? s.accuracy + '%' : '-';

    html += card('预测周', 'Y' + s.iso_year + '-W' + String(s.iso_week).padStart(2,'0'), '',
        (s.predict_date ? getWeekRange(s.predict_date) : '') + ' 信号数: ' + total + '只');

    const accVal = s.accuracy != null ? parseFloat(s.accuracy) : null;
    const accCls = accVal !== null && accVal >= 50 ? 'up' : 'down';

        '正确' + correct + ' 错误' + wrong + (pending > 0 ? ' 待验证' + pending : ''));

    html += card('平均5日涨跌', avgActual, '', '信号日后5个交易日', 'wide');

    document.getElementById('v20VerifySummaryRow').innerHTML = html;
}



function renderV20VerifyTable(rows) {
    let html = '<table class="pred-table"><thead><tr>';
    const cols = [
        {key:'stock_code', label:'代码'},
        {key:'stock_name', label:'名称'},

        {key:'v20_confidence', label:'置信度'},
        {key:'v20_rule_name', label:'规则'},
        {key:'v20_backtest_acc', label:'回测准确率'},
        {key:'v20_actual_5d_chg', label:'实际5日涨跌'},
        {key:'v20_is_correct', label:'结果'},
    ];

        let cls = '';
        if (c.key === v20VerifyCurrentSort) cls = v20VerifyCurrentSortDir === 'asc' ? 'sa' : 'sd';

        html += '<tr><td colspan="11" style="text-align:center;color:#999;padding:20px;">暂无数据（仅显示有V20信号的股票）</td></tr>';
    }
    for (const r of rows) {
        html += '<tr onclick="showHistory(\'' + r.stock_code + '\',\'' + (r.stock_name||'') + '\')">';
        html += '<td style="font-family:\'SF Mono\',Menlo,monospace;font-weight:600"><a href="/stock_detail?code=' + encodeURIComponent(r.stock_code) + '" onclick="event.stopPropagation()" style="color:#667eea;text-decoration:none">' + r.stock_code + '</a></td>';

        html += '<td>' + dirBadge(r.v20_pred_direction) + '</td>';

        html += '<td>' + btAcc + '</td>';
        let actualHtml = '<span style="color:#ccc">待验证</span>';
        if (r.v20_actual_5d_chg != null) {
            const an = parseFloat(r.v20_actual_5d_chg);
            const acls = an > 0 ? 'chg-pos' : an < 0 ? 'chg-neg' : '';
            actualHtml = '<span class="chg-val ' + acls + '" style="font-weight:600">' + (an > 0 ? '+' : '') + an.toFixed(2) + '%</span>';
            if (r.v20_actual_direction) actualHtml += '<br>' + dirBadge(r.v20_actual_direction);
        }
        html += '<td>' + actualHtml + '</td>';
        const isCorrect = r.v20_is_correct;
        if (isCorrect === 1 || isCorrect === '1') {
            html += '<td><span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(46,204,113,0.15);color:#2ecc71">✓ 正确</span></td>';
        } else if (isCorrect === 0 || isCorrect === '0') {
            html += '<td><span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(231,76,60,0.15);color:#e74c3c">✗ 错误</span></td>';
        } else {
            html += '<td><span style="color:#ccc;font-size:11px">-</span></td>';
        }
        const reason = r.v20_reason || '-';
        html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:#888" title="' + reason.replace(/"/g,'&quot;') + '">' + reason + '</td>';

function toggleV20VerifySort(key) {
