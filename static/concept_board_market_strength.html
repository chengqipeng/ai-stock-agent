<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念板块大盘强弱势分析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a 0%,#0d1b2a 100%);padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.header h1{font-size:18px;font-weight:600;color:#fff}
.header a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px}
.header a:hover{color:#fff}
.container{max-width:1400px;margin:0 auto;padding:20px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar select,.toolbar input{padding:7px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:#667eea}
.toolbar .spacer{flex:1}
</style>
<style>
.btn{padding:7px 16px;border:1px solid rgba(102,126,234,0.4);border-radius:8px;background:rgba(102,126,234,0.15);color:#667eea;font-size:13px;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(102,126,234,0.25);border-color:#667eea}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:#667eea;color:#fff;border-color:#667eea}
.btn-primary:hover{background:#5a6fd6}
.summary-bar{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.summary-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 18px;min-width:140px}
.summary-card .label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px}
.summary-card .value{font-size:20px;font-weight:700}
.up{color:#f75555}.down{color:#4ecdc4}
table{width:100%;border-collapse:collapse;font-size:13px}
th{position:sticky;top:0;background:#1a2a3a;padding:10px 12px;text-align:left;font-weight:600;color:rgba(255,255,255,0.7);border-bottom:2px solid rgba(255,255,255,0.1);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#fff}
th.sorted-asc::after{content:" ▲";font-size:10px}
th.sorted-desc::after{content:" ▼";font-size:10px}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap}
tr:hover{background:rgba(102,126,234,0.08)}
tr.strong-row{background:rgba(247,85,85,0.04)}
tr.weak-row{background:rgba(78,205,196,0.04)}
.score-cell{display:flex;align-items:center;gap:8px}
.score-bar-bg{width:80px;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.tag{padding:2px 8px;border-radius:4px;font-size:12px;display:inline-block}
.tag-strong{background:rgba(247,85,85,0.15);color:#f75555}
.tag-neutral{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
.tag-weak{background:rgba(78,205,196,0.15);color:#4ecdc4}
.table-wrap{overflow:auto;max-height:calc(100vh - 240px);border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,0.4)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:8px}
.detail-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:8px 10px}
.detail-item .dl{font-size:10px;color:rgba(255,255,255,0.35)}
.detail-item .dv{font-size:14px;font-weight:600;margin-top:2px}
/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:#1a2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;width:680px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center}
.modal-head h3{font-size:15px;color:#fff;flex:1}
.modal-head .close-btn{width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-head .close-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
</style>
</head>
<body>
<div class="header">
    <a href="/">← 首页</a>
    <a href="/concept_board">板块浏览</a>
    <a href="/concept_board/strength">个股强弱</a>
    <h1>📊 概念板块大盘强弱势分析</h1>
</div>
<div class="container">
    <div class="toolbar">
        <div style="font-size:13px;color:rgba(255,255,255,0.5)">搜索</div>
        <input type="text" id="searchInput" placeholder="搜索板块名称..." style="width:200px">
        <div style="font-size:13px;color:rgba(255,255,255,0.5)">筛选</div>
        <select id="levelFilter">
            <option value="">全部</option>
            <option value="strong">强势(≥70)</option>
            <option value="neutral">中性(40-70)</option>
            <option value="weak">弱势(<40)</option>
        </select>
        <div class="spacer"></div>
        <select id="daysSelect">
            <option value="20">20日</option>
            <option value="40">40日</option>
            <option value="60" selected>60日</option>
            <option value="120">120日</option>
        </select>
        <button class="btn btn-primary" id="computeBtn" onclick="computeAll()">重新计算全部</button>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="table-wrap" id="tableWrap">
        <div class="loading">加载中...</div>
    </div>
</div>
<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-head">
            <h3 id="modalTitle">板块强弱详情</h3>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>
<script>
let allData=[], sortCol='score', sortDir='desc';

async function loadRanking(){
    document.getElementById('tableWrap').innerHTML='<div class="loading">加载中...</div>';
    try{
        const r=await fetch('/api/concept_board/market_strength/ranking?limit=500');
        const j=await r.json();
        if(!j.success||!j.data.length){
            document.getElementById('tableWrap').innerHTML='<div class="empty-state">暂无数据，请先点击"重新计算全部"</div>';
            document.getElementById('summaryBar').innerHTML='';
            return;
        }
        allData=j.data;
        renderSummary();
        renderTable();
    }catch(e){
        document.getElementById('tableWrap').innerHTML='<div class="empty-state">请求失败: '+e.message+'</div>';
    }
}

function renderSummary(){
    const bar=document.getElementById('summaryBar');
    if(!allData.length){bar.innerHTML='';return;}
    const total=allData.length;
    const strong=allData.filter(d=>d.score>=70).length;
    const weak=allData.filter(d=>d.score<40).length;
    const neutral=total-strong-weak;
    const avgScore=(allData.reduce((s,d)=>s+d.score,0)/total).toFixed(1);
    const avgExcess=(allData.reduce((s,d)=>s+d.excess_return,0)/total).toFixed(2);
    bar.innerHTML=
        card('板块总数',total,'')+
        card('平均评分',avgScore,parseFloat(avgScore)>=50?'up':'down')+
        card('平均超额',avgExcess+'%',parseFloat(avgExcess)>=0?'up':'down')+
        card('强势板块',strong,'up')+
        card('中性板块',neutral,'')+
        card('弱势板块',weak,'down');
}
function card(label,value,cls){
    return '<div class="summary-card"><div class="label">'+label+'</div><div class="value '+cls+'">'+value+'</div></div>';
}

function getFiltered(){
    let data=[...allData];
    const kw=document.getElementById('searchInput').value.trim().toLowerCase();
    const level=document.getElementById('levelFilter').value;
    if(kw) data=data.filter(d=>d.board_name.toLowerCase().includes(kw)||d.board_code.includes(kw));
    if(level==='strong') data=data.filter(d=>d.score>=70);
    else if(level==='neutral') data=data.filter(d=>d.score>=40&&d.score<70);
    else if(level==='weak') data=data.filter(d=>d.score<40);
    data.sort((a,b)=>{
        let va=a[sortCol],vb=b[sortCol];
        if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
        return sortDir==='asc'?(va-vb):(vb-va);
    });
    return data;
}
</script>
<script>
function renderTable(){
    const data=getFiltered();
    if(!data.length){document.getElementById('tableWrap').innerHTML='<div class="empty-state">无匹配数据</div>';return;}
    const cols=[
        {key:'_rank',label:'#',w:'50px'},
        {key:'board_code',label:'代码',w:'80px'},
        {key:'board_name',label:'板块名称',w:'140px'},
        {key:'score',label:'强弱评分',w:'160px'},
        {key:'_level',label:'强弱',w:'70px'},
        {key:'excess_return',label:'超额收益%',w:'100px'},
        {key:'board_return',label:'板块涨幅%',w:'100px'},
        {key:'stock_count',label:'成分股',w:'70px'},
    ];
    let html='<table><thead><tr>';
    cols.forEach(c=>{
        let cls='';
        if(c.key===sortCol) cls=sortDir==='asc'?'sorted-asc':'sorted-desc';
        const onclick=c.key.startsWith('_')?'':'onclick="doSort(\''+c.key+'\')"';
        html+='<th class="'+cls+'" style="width:'+c.w+'" '+onclick+'>'+c.label+'</th>';
    });
    html+='</tr></thead><tbody>';
    data.forEach((d,i)=>{
        const level=d.score>=70?'strong':d.score<40?'weak':'neutral';
        const levelText=d.score>=70?'强势':d.score<40?'弱势':'中性';
        const tagCls=level==='strong'?'tag-strong':level==='weak'?'tag-weak':'tag-neutral';
        const rowCls=level==='strong'?'strong-row':level==='weak'?'weak-row':'';
        const exCls=d.excess_return>=0?'up':'down';
        const brCls=d.board_return>=0?'up':'down';
        const scoreColor=d.score>=70?'#f75555':d.score<40?'#4ecdc4':'#667eea';
        html+='<tr class="'+rowCls+'" onclick="showDetail(\''+d.board_code+'\',\''+esc(d.board_name)+'\')" style="cursor:pointer">'
            +'<td>'+(i+1)+'</td>'
            +'<td style="font-family:monospace;color:#667eea">'+d.board_code+'</td>'
            +'<td>'+esc(d.board_name)+'</td>'
            +'<td><div class="score-cell"><span style="color:'+scoreColor+';font-weight:600;min-width:36px">'+d.score+'</span>'
            +'<div class="score-bar-bg"><div class="score-bar-fill" style="width:'+d.score+'%;background:'+scoreColor+'"></div></div></div></td>'
            +'<td><span class="tag '+tagCls+'">'+levelText+'</span></td>'
            +'<td class="'+exCls+'">'+(d.excess_return>0?'+':'')+d.excess_return+'%</td>'
            +'<td class="'+brCls+'">'+(d.board_return>0?'+':'')+d.board_return+'%</td>'
            +'<td>'+d.stock_count+'</td>'
            +'</tr>';
    });
    html+='</tbody></table>';
    document.getElementById('tableWrap').innerHTML=html;
}

function doSort(col){
    if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
    else{sortCol=col;sortDir='desc';}
    renderTable();
}

async function showDetail(code,name){
    document.getElementById('modalTitle').textContent=code+' '+name+' 大盘强弱详情';
    document.getElementById('modalBody').innerHTML='<div class="loading">计算中...</div>';
    document.getElementById('modalOverlay').classList.add('visible');
    try{
        const days=document.getElementById('daysSelect').value;
        const r=await fetch('/api/concept_board/market_strength/detail?board_code='+code+'&days='+days);
        const j=await r.json();
        if(!j.success){document.getElementById('modalBody').innerHTML='<div class="empty-state">'+(j.error||'失败')+'</div>';return;}
        renderDetailModal(j.data);
    }catch(e){
        document.getElementById('modalBody').innerHTML='<div class="empty-state">请求失败</div>';
    }
}
</script>
<script>
function renderDetailModal(d){
    const ds=d.detail_scores;
    const scoreColor=d.score>=70?'#f75555':d.score<40?'#4ecdc4':'#667eea';
    let html='<div style="text-align:center;margin-bottom:16px">'
        +'<div style="font-size:48px;font-weight:700;color:'+scoreColor+'">'+d.score+'</div>'
        +'<div style="font-size:13px;color:rgba(255,255,255,0.4)">综合强弱评分（满分100）</div></div>';

    // 评分维度柱状图
    const dims=[
        {label:'超额收益(30)',score:ds.excess_return_score,max:30,color:'#f75555'},
        {label:'短期动量(25)',score:ds.short_momentum_score,max:25,color:'#ff9f43'},
        {label:'中期趋势(20)',score:ds.mid_trend_score,max:20,color:'#667eea'},
        {label:'胜率(15)',score:ds.win_rate_score,max:15,color:'#54a0ff'},
        {label:'回撤控制(10)',score:ds.drawdown_score,max:10,color:'#5f27cd'},
    ];
    html+='<div style="margin:16px 0">';
    dims.forEach(dm=>{
        const pct=dm.score/dm.max*100;
        html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
            +'<div style="width:110px;font-size:12px;color:rgba(255,255,255,0.5);text-align:right">'+dm.label+'</div>'
            +'<div style="flex:1;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden">'
            +'<div style="width:'+pct+'%;height:100%;background:'+dm.color+';border-radius:5px"></div></div>'
            +'<div style="width:40px;font-size:13px;font-weight:600;color:'+dm.color+'">'+dm.score+'</div></div>';
    });
    html+='</div>';

    // 数据指标
    html+='<div class="detail-grid">';
    const items=[
        {l:'板块涨幅',v:(d.board_return>0?'+':'')+d.board_return+'%',c:d.board_return>=0?'up':'down'},
        {l:'大盘涨幅',v:(d.market_return>0?'+':'')+d.market_return+'%',c:d.market_return>=0?'up':'down'},
        {l:'超额收益',v:(d.excess_return>0?'+':'')+d.excess_return+'%',c:d.excess_return>=0?'up':'down'},
        {l:'5日超额',v:(d.excess_5d>0?'+':'')+d.excess_5d+'%',c:d.excess_5d>=0?'up':'down'},
        {l:'20日超额',v:(d.excess_20d>0?'+':'')+d.excess_20d+'%',c:d.excess_20d>=0?'up':'down'},
        {l:'跑赢胜率',v:(d.win_rate*100).toFixed(1)+'%',c:d.win_rate>=0.5?'up':'down'},
        {l:'有效交易日',v:d.trade_days+'天',c:''},
    ];
    items.forEach(it=>{
        html+='<div class="detail-item"><div class="dl">'+it.l+'</div><div class="dv '+it.c+'">'+it.v+'</div></div>';
    });
    html+='</div>';
    document.getElementById('modalBody').innerHTML=html;
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('visible');}
document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)closeModal();};

async function computeAll(){
    const btn=document.getElementById('computeBtn');
    btn.disabled=true;btn.textContent='计算中...';
    try{
        const days=document.getElementById('daysSelect').value;
        const r=await fetch('/api/concept_board/market_strength/compute?days='+days);
        const j=await r.json();
        if(j.success){
            btn.textContent='计算完成 ✓';
            setTimeout(()=>{btn.textContent='重新计算全部';btn.disabled=false;},2000);
            loadRanking();
        }else{
            btn.textContent='计算失败';btn.disabled=false;
        }
    }catch(e){btn.textContent='请求失败';btn.disabled=false;}
}

let _st;
document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(_st);_st=setTimeout(renderTable,200);});
document.getElementById('levelFilter').addEventListener('change',renderTable);

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

loadRanking();
</script>
</body>
</html>
