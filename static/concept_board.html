<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念板块浏览器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a 0%,#0d1b2a 100%);padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.header h1{font-size:18px;font-weight:600;color:#fff}
.header a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px}
.header a:hover{color:#fff}
.header .stats{margin-left:auto;font-size:13px;color:rgba(255,255,255,0.5)}
.container{display:flex;height:calc(100vh - 57px)}
.board-panel{width:340px;min-width:280px;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;background:rgba(255,255,255,0.02)}
.search-box{padding:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.search-box input{width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none}
.search-box input:focus{border-color:#667eea}
.search-box input::placeholder{color:rgba(255,255,255,0.3)}
.board-list{flex:1;overflow-y:auto;padding:6px}
.board-item{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;gap:10px;margin-bottom:2px}
.board-item:hover{background:rgba(102,126,234,0.1)}
.board-item.active{background:rgba(102,126,234,0.2);border:1px solid rgba(102,126,234,0.3)}
.board-item .name{flex:1;font-size:13px;color:#e0e6ed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-item .count{font-size:12px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:10px;white-space:nowrap}
.board-item.active .name{color:#fff}
.board-item.active .count{color:#667eea;background:rgba(102,126,234,0.15)}
.stock-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.stock-header{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stock-header h2{font-size:16px;font-weight:600;color:#fff}
.stock-header .badge{font-size:12px;color:#667eea;background:rgba(102,126,234,0.15);padding:3px 10px;border-radius:10px}
.stock-header .search-stock{padding:6px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none;margin-left:auto;width:180px}
.stock-header .search-stock:focus{border-color:#667eea}
</style>
