<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念板块浏览器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a 0%,#0d1b2a 100%);padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.header h1{font-size:18px;font-weight:600;color:#fff}
.header a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px}
.header a:hover{color:#fff}
.header .stats{margin-left:auto;font-size:13px;color:rgba(255,255,255,0.5)}
.container{display:flex;height:calc(100vh - 57px)}
/* 左侧板块列表 */
.board-panel{width:340px;min-width:280px;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;background:rgba(255,255,255,0.02)}
.search-box{padding:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.search-box input{width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none}
.search-box input:focus{border-color:#667eea}
.search-box input::placeholder{color:rgba(255,255,255,0.3)}
.board-list{flex:1;overflow-y:auto;padding:6px}
.board-item{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;gap:10px;margin-bottom:2px}
.board-item:hover{background:rgba(102,126,234,0.1)}
.board-item.active{background:rgba(102,126,234,0.2);border:1px solid rgba(102,126,234,0.3)}
.board-item .name{flex:1;font-size:13px;color:#e0e6ed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-item .count{font-size:12px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:10px;white-space:nowrap}
.board-item.active .name{color:#fff}
.board-item.active .count{color:#667eea;background:rgba(102,126,234,0.15)}
/* 右侧成分股 */
.stock-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.stock-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stock-header h2{font-size:16px;font-weight:600;color:#fff}
.stock-header .badge{font-size:12px;color:#667eea;background:rgba(102,126,234,0.15);padding:3px 10px;border-radius:10px}
.stock-header .search-stock{padding:6px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none;margin-left:auto;width:180px}
.stock-header .search-stock:focus{border-color:#667eea}
.stock-grid{flex:1;overflow-y:auto;padding:16px 20px}
.stock-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.stock-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;transition:all .15s}
.stock-card:hover{background:rgba(102,126,234,0.1);border-color:rgba(102,126,234,0.3);transform:translateY(-1px)}
.stock-card .code{font-size:14px;font-weight:600;color:#667eea;font-family:'SF Mono',Menlo,monospace}
.stock-card .sname{font-size:13px;color:#e0e6ed;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,0.3);font-size:14px;gap:8px}
.empty-state .icon{font-size:48px;opacity:0.3}
/* 股票所属板块弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:#1a2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.modal-head h3{font-size:15px;color:#fff;flex:1}
.modal-head .close-btn{width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-head .close-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:12px 20px}
.modal-board-item{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;gap:10px;margin-bottom:4px}
.modal-board-item:hover{background:rgba(102,126,234,0.12)}
.modal-board-item .bname{flex:1;font-size:13px;color:#e0e6ed}
.modal-board-item .bcount{font-size:12px;color:rgba(255,255,255,0.4)}
/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="header">
    <a href="/">← 首页</a>
    <h1>🧩 概念板块浏览器</h1>
    <div class="stats" id="globalStats"></div>
</div>
<div class="container">
    <div class="board-panel">
        <div class="search-box">
            <input type="text" id="boardSearch" placeholder="搜索概念板块..." autocomplete="off">
        </div>
        <div class="board-list" id="boardList"></div>
    </div>
    <div class="stock-panel">
        <div class="stock-header" id="stockHeader" style="display:none">
            <h2 id="boardTitle"></h2>
            <span class="badge" id="boardBadge"></span>
            <input type="text" class="search-stock" id="stockSearch" placeholder="搜索股票代码/名称..." autocomplete="off">
        </div>
        <div class="stock-grid" id="stockGrid">
            <div class="empty-state"><div class="icon">🧩</div><div>请从左侧选择一个概念板块</div></div>
        </div>
    </div>
</div>
<!-- 股票所属板块弹窗 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-head">
            <h3 id="modalTitle">所属概念板块</h3>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>
<script>
let allBoards = [];
let currentBoard = null;
let allStocks = [];

async function loadBoards(keyword) {
    try {
        const url = '/api/concept_board/list' + (keyword ? '?keyword=' + encodeURIComponent(keyword) : '');
        const resp = await fetch(url);
        const json = await resp.json();
        if (!json.success) return;
        allBoards = json.data;
        renderBoards(allBoards);
        const totalStocks = allBoards.reduce((a, b) => a + (b.stock_count || 0), 0);
        document.getElementById('globalStats').textContent =
            json.total + ' 个板块 · ' + totalStocks.toLocaleString() + ' 条关联记录';
    } catch (e) { console.error(e); }
}

function renderBoards(boards) {
    const wrap = document.getElementById('boardList');
    wrap.innerHTML = '';
    boards.forEach(b => {
        const div = document.createElement('div');
        div.className = 'board-item' + (currentBoard && currentBoard.board_code === b.board_code ? ' active' : '');
        div.innerHTML = '<span class="name">' + esc(b.board_name) + '</span>'
            + '<span class="count">' + (b.stock_count || 0) + '只</span>';
        div.onclick = () => selectBoard(b);
        wrap.appendChild(div);
    });
}

async function selectBoard(board) {
    currentBoard = board;
    renderBoards(allBoards.filter(b => matchBoard(b)));
    document.getElementById('stockHeader').style.display = 'flex';
    document.getElementById('boardTitle').textContent = board.board_name;
    document.getElementById('boardBadge').textContent = board.board_code;
    document.getElementById('stockSearch').value = '';
    document.getElementById('stockGrid').innerHTML = '<div class="empty-state">加载中...</div>';
    try {
        const resp = await fetch('/api/concept_board/stocks?board_code=' + board.board_code);
        const json = await resp.json();
        if (!json.success) { document.getElementById('stockGrid').innerHTML = '<div class="empty-state">加载失败</div>'; return; }
        allStocks = json.data;
        document.getElementById('boardBadge').textContent = board.board_code + ' · ' + json.total + '只';
        renderStocks(allStocks);
    } catch (e) {
        document.getElementById('stockGrid').innerHTML = '<div class="empty-state">请求失败</div>';
    }
}

function renderStocks(stocks) {
    const wrap = document.getElementById('stockGrid');
    if (!stocks.length) { wrap.innerHTML = '<div class="empty-state">暂无成分股数据</div>'; return; }
    wrap.innerHTML = '<div class="stock-cards" id="stockCards"></div>';
    const cards = document.getElementById('stockCards');
    stocks.forEach(s => {
        const div = document.createElement('div');
        div.className = 'stock-card';
        div.innerHTML = '<span class="code">' + esc(s.stock_code) + '</span>'
            + '<span class="sname">' + esc(s.stock_name) + '</span>';
        div.onclick = () => showStockBoards(s.stock_code, s.stock_name);
        cards.appendChild(div);
    });
}

async function showStockBoards(code, name) {
    document.getElementById('modalTitle').textContent = code + ' ' + name + ' 所属概念板块';
    document.getElementById('modalBody').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4)">加载中...</div>';
    document.getElementById('modalOverlay').classList.add('visible');
    try {
        const resp = await fetch('/api/concept_board/stock_boards?stock_code=' + code);
        const json = await resp.json();
        if (!json.success || !json.data.length) {
            document.getElementById('modalBody').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4)">暂无数据</div>';
            return;
        }
        const body = document.getElementById('modalBody');
        body.innerHTML = '';
        json.data.forEach(b => {
            const div = document.createElement('div');
            div.className = 'modal-board-item';
            div.innerHTML = '<span class="bname">' + esc(b.board_name) + '</span>'
                + '<span class="bcount">' + (b.stock_count || 0) + '只</span>';
            div.onclick = () => { closeModal(); selectBoard({board_code: b.board_code, board_name: b.board_name, stock_count: b.stock_count}); };
            body.appendChild(div);
        });
    } catch (e) {
        document.getElementById('modalBody').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4)">请求失败</div>';
    }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); }
document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };

function matchBoard(b) {
    const kw = document.getElementById('boardSearch').value.trim().toLowerCase();
    if (!kw) return true;
    return b.board_name.toLowerCase().includes(kw) || b.board_code.includes(kw);
}

// 板块搜索
let _boardTimer;
document.getElementById('boardSearch').addEventListener('input', function() {
    clearTimeout(_boardTimer);
    _boardTimer = setTimeout(() => {
        const kw = this.value.trim();
        if (kw) {
            renderBoards(allBoards.filter(b => matchBoard(b)));
        } else {
            renderBoards(allBoards);
        }
    }, 200);
});

// 股票搜索
let _stockTimer;
document.getElementById('stockSearch').addEventListener('input', function() {
    clearTimeout(_stockTimer);
    _stockTimer = setTimeout(() => {
        const kw = this.value.trim().toLowerCase();
        if (!kw) { renderStocks(allStocks); return; }
        renderStocks(allStocks.filter(s =>
            s.stock_code.includes(kw) || s.stock_name.toLowerCase().includes(kw)
        ));
    }, 200);
});

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadBoards();
</script>
</body>
</html>
