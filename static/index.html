        async function batchDeepAnalysis() {
            if (batchSelectedStockIds.size === 0) {
                alert('请至少选择一只股票');
                return;
            }

            const useDeepThinking = confirm('是否使用深度思考模式？\n\n点击"确定"使用深度思考模式（更准确但更慢）\n点击"取消"使用普通模式');

            showProgressModal('正在执行CAN SLIM深度分析...');
            disableUI();
            document.getElementById('deepAnalysisStockList').style.display = 'block';

            const stockIds = Array.from(batchSelectedStockIds);
            const total = stockIds.length;

            try {
                const url = `/api/stock/deep_analysis${useDeepThinking ? '?deep_thinking=true' : ''}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(stockIds)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, {stream: true});
                    const lines = buf.split('\n\n');
                    buf = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const evt = JSON.parse(line.slice(6));
                        updateProgressModal(evt.completed_dims, evt.total_dims,
                            `正在分析... ${evt.completed_stocks}/${evt.total_stocks}个股票（${evt.completed_dims}/${evt.total_dims}个维度）`);

                        // 更新股票列表
                        const listEl = document.getElementById('deepAnalysisStockList');
                        const allDims = ['C','A','N','S','L','I','M','overall'];
                        const dimLabel = {C:'季度盈利',A:'年度盈利',N:'新高点',S:'供需',L:'领军股',I:'机构',M:'市场',overall:'整体分析'};
                        listEl.innerHTML = (evt.stocks || []).map(s => {
                            const dimHtml = allDims.map(d => {
                                const st = s.dims[d];
                                const icon = st === 'done' ? '✅' : st === 'running' ? '🔄' : st === 'error' ? '❌' : '⏳';
                                return `<span style="margin:0 3px;font-size:11px;" title="${dimLabel[d]}">${icon}${d === 'overall' ? '整体' : d}</span>`;
                            }).join('');
                            return `<div style="padding:4px 0;border-bottom:1px solid #eee;font-size:12px;">
                                <b>${s.stock_name}</b> ${dimHtml}
                            </div>`;
                        }).join('');

                        if (evt.stage === 'done') break;
                    }
                }

                batchSelectedStockIds.clear();
                document.querySelectorAll('.stock-checkbox').forEach(cb => cb.checked = false);
                document.getElementById('selectAllStocks').checked = false;
                updateBatchSelection();
                if (currentBatchId) await loadBatchStocks(currentBatchId);
            } catch (error) {
                alert('CAN SLIM深度分析失败: ' + error.message);
            } finally {
                document.getElementById('deepAnalysisStockList').style.display = 'none';
                hideProgressModal();
                enableUI();
            }
        }

        async function batchPrescreeningUpdate() {
            if (!currentBatchId || batchSelectedStockIds.size === 0) {
                alert('请先选择批次并勾选股票');
                return;
            }
            showProgressModal('正在执行涨跌初筛更新...');
            disableUI();
            try {
                const resp = await fetch(`/api/batch/${currentBatchId}/prescreening_update`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(Array.from(batchSelectedStockIds))
                });
                const data = await resp.json();
                if (data.success) {
                    updateProgressModal(data.data.updated_count, data.data.updated_count, `✅ 涨跌初筛完成，更新 ${data.data.updated_count} 只股票`);
                    await loadBatchStocks(currentBatchId);
                } else {
                    updateProgressModal(0, 100, '❌ 失败: ' + (data.detail || '未知错误'));
                }
            } catch(e) {
                updateProgressModal(0, 100, '❌ 失败: ' + e.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        async function batchKlineUpdate() {
            if (!currentBatchId || batchSelectedStockIds.size === 0) {
                alert('请先选择批次并勾选股票');
                return;
            }
            showProgressModal('正在执行K线初筛更新...');
            disableUI();
            try {
                const ids = Array.from(batchSelectedStockIds).join(',');
                await new Promise((resolve, reject) => {
                    const url = `/api/batch/${currentBatchId}/kline_execute_update?stock_ids=${ids}`;
                    const eventSource = new EventSource(url);
                    eventSource.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.stage === 'start') {
                                updateProgressModal(data.completed, data.total, '开始K线初筛...');
                            } else if (data.stage === 'progress') {
                                const info = data.error
                                    ? `❌ ${data.stock_name} 失败`
                                    : `✅ ${data.stock_name} 完成 (${data.score})`;
                                updateProgressModal(data.completed, data.total, info);
                            } else if (data.stage === 'done') {
                                eventSource.close();
                                updateProgressModal(data.completed, data.total, '✅ K线初筛全部完成');
                                resolve();
                            } else if (data.stage === 'error') {
                                eventSource.close();
                                reject(new Error(data.message));
                            }
                        } catch(e) { console.error('解析事件失败:', e); }
                    };
                    eventSource.onerror = () => { eventSource.close(); reject(new Error('连接失败')); };
                });
                await loadBatchStocks(currentBatchId);
            } catch(e) {
                updateProgressModal(0, 100, '❌ 失败: ' + e.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        async function clearHistory_dim(stockName) {
            if (!confirm(`确定要清空「${stockName}」的所有历史执行记录？`)) return;
            await fetch(`/api/stock/history/${encodeURIComponent(stockName)}`, { method: 'DELETE' });
            showHistory(stockName);
        }

        async function showHistory(stockName) {
            document.getElementById('historyModalTitle').textContent = stockName + ' - 深度分析历史记录';
            document.getElementById('historyModalTitle').innerHTML = `${stockName} - 深度分析历史记录 <button onclick="clearHistory_dim('${stockName}')" style="margin-left:12px;padding:3px 10px;background:#f44;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">清空记录</button>`;
            document.getElementById('historyModalContent').innerHTML = '加载中...';
            document.getElementById('historyModal').classList.add('show');
            try {
                const resp = await fetch(`/api/stock/history/${encodeURIComponent(stockName)}`);
                const data = await resp.json();
                if (!data.success || data.data.length === 0) {
                    document.getElementById('historyModalContent').innerHTML = '<p style="color:#999;text-align:center;">暂无历史记录</p>';
                    return;
                }
                // 按 execution_id 分组
                const groups = {};
                const groupOrder = [];
                data.data.forEach(r => {
                    const key = r.execution_id || `${r.batch_id}_${r.created_at}`;
                    if (!groups[key]) {
                        groups[key] = { execution_id: key, batch_id: r.batch_id, is_deep_thinking: r.is_deep_thinking, created_at: r.created_at, overall_grade: r.overall_grade, dims: [] };
                        groupOrder.push(key);
                    } else if (r.created_at && r.created_at < groups[key].created_at) {
                        groups[key].created_at = r.created_at;
                    }
                    if (r.overall_grade && !groups[key].overall_grade) groups[key].overall_grade = r.overall_grade;
                    groups[key].dims.push(r);
                });
                groupOrder.sort((a, b) => (groups[b].created_at || '').localeCompare(groups[a].created_at || ''));
                const dimColor = { done: '#4caf50', error: '#f44336' };
                const DIM_ORDER = ['C','A','N','S','L','I','M'];
                document.getElementById('historyModalContent').innerHTML = groupOrder.map(key => {
                    const g = groups[key];
                    g.dims.sort((a, b) => {
                        const ai = DIM_ORDER.indexOf(a.dimension?.charAt(0).toUpperCase());
                        const bi = DIM_ORDER.indexOf(b.dimension?.charAt(0).toUpperCase());
                        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
                    });
                    const dimsHtml = g.dims.map(r => {
                        const color = dimColor[r.status] || '#999';
                        const scoreText = r.score != null ? ` ${r.score}分` : '';
                        return `<div style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;margin:2px;border-radius:3px;background:${r.status==='error'?'#fff0f0':'#f0fff0'};border:1px solid ${color};font-size:11px;">
                            <span style="font-weight:600;color:${color};">${r.dimension}${scoreText}</span>
                            <span>${r.status==='error'?'❌':'✅'}</span>
                            ${r.error_message ? `<span style="color:#f44336;" title="${r.error_message}">⚠️</span>` : ''}
                        </div>`;
                    }).join('');
                    const summaries = g.dims.filter(r => r.summary).map(r =>
                        `<div style="font-size:11px;color:#555;padding:2px 0;"><b>${r.dimension}:</b> ${r.summary}</div>`
                    ).join('');
                    const gradeColors = {'强烈买入':'#e53935','列入核心观察名单':'#fb8c00','保持观望':'#1e88e5','坚决规避':'#757575'};
                    const gradeHtml = g.overall_grade ? `<span style="font-size:11px;font-weight:600;color:${gradeColors[g.overall_grade]||'#333'};margin-left:6px;">${g.overall_grade}</span>` : '';
                    return `<div style="border:1px solid #667eea;border-radius:6px;padding:12px;margin-bottom:10px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span style="font-weight:600;font-size:12px;">批次 #${g.batch_id} ${g.is_deep_thinking?'🧠 深度思考':''}${gradeHtml}</span>
                            <span style="font-size:10px;color:#999;">${formatLocalTime(g.created_at)}</span>
                        </div>
                        <div style="margin-bottom:6px;">${dimsHtml}</div>
                        ${summaries ? `<details><summary style="cursor:pointer;font-size:11px;color:#667eea;">查看摘要</summary><div style="margin-top:6px;">${summaries}</div></details>` : ''}
                    </div>`;
                }).join('');
            } catch(e) {
                document.getElementById('historyModalContent').innerHTML = '<p style="color:red;">加载失败: ' + e.message + '</p>';
            }
        }

        // 初筛相关逻辑
        let prescreeningData = [];
        let prescreeningSelected = new Set();

        async function openPrescreening() {
            closePrescreening();
            showProgressModal('正在获取涨跌初筛数据...');
            const stock_codes = Array.from(selectedStocks).map(k => k.replace(/ \(.*\)$/, ''));
            try {
                const resp = await fetch('/api/prescreening_batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({stock_codes})
                });
                const data = await resp.json();
                if (!data.success) throw new Error(data.detail || '失败');
                updateProgressModal(stock_codes.length, stock_codes.length, `✅ 初筛完成，共 ${data.data.stocks.length} 只股票`);
                await loadBatchStocks(data.data.batch_id);
                loadBatchList();
                hideProgressModal();
            } catch(e) {
                updateProgressModal(0, 100, '❌ 失败: ' + e.message);
            }
        }

        function closePrescreening() {
            document.getElementById('prescreeningModal').classList.remove('show');
        }

        function renderPrescreeningTable() {
            const tbody = document.getElementById('prescreeningTableBody');
            tbody.innerHTML = prescreeningData.map((s, i) => {
                const pct = s['涨跌幅(%)'];
                const color = pct == null ? '#999' : pct >= 0 ? '#e53935' : '#4caf50';
                const checked = prescreeningSelected.has(i);
                return `<tr style="border-bottom:1px solid #eee;">
                    <td style="padding:5px;text-align:center;"><input type="checkbox" class="ps-cb" data-idx="${i}" ${checked?'checked':''} onchange="updatePrescreeningSelection()"></td>
                    <td style="padding:5px;font-weight:600;">${s.name}</td>
                    <td style="padding:5px;color:#999;">${s.code}</td>
                    <td style="padding:5px;text-align:right;">${s.score}</td>
                    <td style="padding:5px;text-align:right;">${s['最高价'] ?? s['120天最高价'] ?? '-'}</td>
                    <td style="padding:5px;text-align:right;color:#999;font-size:11px;">${s['120天最高价日期'] ?? '-'}</td>
                    <td style="padding:5px;text-align:right;">${s['最新收盘价'] ?? '-'}</td>
                    <td style="padding:5px;text-align:right;font-weight:600;color:${color};">${pct != null ? pct + '%' : '-'}</td>
                </tr>`;
            }).join('');
        }

        function updatePrescreeningSelection() {
            prescreeningSelected.clear();
            document.querySelectorAll('.ps-cb:checked').forEach(cb => prescreeningSelected.add(parseInt(cb.dataset.idx)));
            document.getElementById('prescreeningSelectedCount').textContent = prescreeningSelected.size;
            const total = document.querySelectorAll('.ps-cb').length;
            const sel = prescreeningSelected.size;
            const allCb = document.getElementById('prescreeningSelectAll');
            allCb.checked = total > 0 && sel === total;
            allCb.indeterminate = sel > 0 && sel < total;
        }

        function prescreeningToggleAll() {
            const checked = document.getElementById('prescreeningSelectAll').checked;
            document.querySelectorAll('.ps-cb').forEach(cb => {
                cb.checked = checked;
                const idx = parseInt(cb.dataset.idx);
                checked ? prescreeningSelected.add(idx) : prescreeningSelected.delete(idx);
            });
            document.getElementById('prescreeningSelectedCount').textContent = prescreeningSelected.size;
        }

        function prescreeningSelectAll() {
            document.getElementById('prescreeningSelectAll').checked = true;
            prescreeningToggleAll();
        }

        function prescreeningDeselectAll() {
            document.getElementById('prescreeningSelectAll').checked = false;
            prescreeningToggleAll();
        }

        async function startPrescreeningAnalysis() {
            if (prescreeningSelected.size === 0) { alert('请至少选择一只股票'); return; }
            const stocks = Array.from(prescreeningSelected).map(i => prescreeningData[i]);
            const stockKeys = stocks.map(s => `${s.name} (${s.code})`);
            closePrescreening();
            showProgressModal('正在获取涨跌初筛数据...');
            disableUI();
            try {
                const resp = await fetch('/api/prescreening_batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_codes: stockKeys })
                });
                const data = await resp.json();
                if (data.success) {
                    updateProgressModal(100, 100, `✅ 初筛完成，共 ${data.data.stocks.length} 只股票`);
                    await loadBatchStocks(data.data.batch_id);
                    loadBatchList();
                }
            } catch(e) {
                alert('初筛失败: ' + e.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        async function startCanslimPrescreening() {
            if (selectedStocks.size === 0) {
                alert('请至少选择一只股票');
                return;
            }
            showProgressModal('正在执行CAN SLIM初筛...');
            disableUI();
            try {
                const response = await fetch('/api/batch_analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_codes: Array.from(selectedStocks) })
                });
                const data = await response.json();
                if (data.success) {
                    const batchId = data.data.batch_id;
                    await executeCanslimPrescreening(batchId);
                    loadBatchList();
                }
            } catch (error) {
                alert('CAN SLIM初筛失败: ' + error.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        async function executeCanslimPrescreening(batchId) {
            return new Promise((resolve, reject) => {
                const url = `/api/batch_canslim_prescreening/${batchId}`;
                const eventSource = new EventSource(url);
                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.stage === 'start') {
                            updateProgressModal(data.completed, data.total, '开始CAN SLIM初筛...');
                        } else if (data.stage === 'progress') {
                            const info = data.error
                                ? `❌ ${data.stock_name} 失败`
                                : `✅ ${data.stock_name} 完成 (${data.score})`;
                            updateProgressModal(data.completed, data.total, info);
                        } else if (data.stage === 'done') {
                            eventSource.close();
                            updateProgressModal(data.completed, data.total, '✅ CAN SLIM初筛全部完成');
                            resolve();
                        } else if (data.stage === 'error') {
                            eventSource.close();
                            updateProgressModal(0, 100, '❌ 执行失败: ' + data.message);
                            reject(new Error(data.message));
                        }
                    } catch (e) { console.error('解析事件失败:', e); }
                };
                eventSource.onerror = () => { eventSource.close(); reject(new Error('连接失败')); };
            });
        }

        async function batchCanslimPrescreening() {
            if (!currentBatchId || batchSelectedStockIds.size === 0) {
                alert('请先选择批次并勾选股票');
                return;
            }
            showProgressModal('正在执行CAN SLIM初筛更新...');
            disableUI();
            try {
                await executeCanslimPrescreening(currentBatchId);
                await loadBatchStocks(currentBatchId);
            } catch(e) {
                updateProgressModal(0, 100, '❌ 失败: ' + e.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        function toggleSidebar() {
            const container = document.getElementById('mainContainer');
            const btn = document.getElementById('sidebarToggle');
            const collapsed = container.classList.toggle('sidebar-collapsed');
            btn.textContent = collapsed ? '▶' : '◀';
            btn.title = collapsed ? '展开侧栏' : '折叠侧栏';
        }

        // 排序相关
        let currentSortField = null;
        let currentSortOrder = null; // 'asc' or 'desc'
        let currentBatchStocks = []; // 保存当前批次股票数据

        function toggleSort(field) {
            if (currentSortField === field) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortField = field;
                currentSortOrder = 'desc'; // 默认降序（高分在前）
            }
            updateSortButtons();
            applySortAndRender();
        }

        function clearSort() {
            currentSortField = null;
            currentSortOrder = null;
            updateSortButtons();
            applySortAndRender();
        }

        function updateSortButtons() {
            document.querySelectorAll('.sort-btn').forEach(btn => {
                const onclick = btn.getAttribute('onclick');
                if (!onclick || onclick.includes('clearSort')) return;
                const match = onclick.match(/toggleSort\('(.+?)'\)/);
                if (!match) return;
                const field = match[1];
                const arrow = btn.querySelector('.sort-arrow');
                if (field === currentSortField) {
                    btn.classList.add('active');
                    arrow.textContent = currentSortOrder === 'asc' ? '↑' : '↓';
                } else {
                    btn.classList.remove('active');
                    arrow.textContent = '';
                }
            });
        }

        function getCanslimTotal(stock) {
            let sum = 0;
            ['c','a','n','s','l','i','m'].forEach(k => {
                const v = parseFloat(stock[`${k}_score`]);
                if (!isNaN(v)) sum += v;
                const dv = parseFloat(stock[`${k}_deep_score`]);
                if (!isNaN(dv)) sum += dv;
            });
            return sum;
        }

        const GRADE_SCORE_MAP = {
            '积极买入': 95, '逢低建仓': 75, '持股待涨': 60,
            '逢高减仓': 40, '清仓离场': 20, '保持观望': 50
        };

        function getScoreColor(score) {
            if (score == null) return '#c7c7cc';
            if (score >= 70) return '#e53935';
            if (score >= 55) return '#ff9800';
            if (score >= 40) return '#48484a';
            return '#2e7d32';
        }

        function getSortValue(stock, field) {
            if (field === 'canslim_total') return getCanslimTotal(stock);
            if (field === 'kline_total_score') {
                const val = stock.kline_total_score;
                return (val != null && val !== '') ? Number(val) : -Infinity;
            }
            const val = stock[field];
            if (val == null || val === '' || val === '-') return -Infinity;
            if (field === 'kline_score' || field === 'kline_hold_score') {
                const trimmed = String(val).trim();
                return GRADE_SCORE_MAP[trimmed] ?? -Infinity;
            }
            const num = parseFloat(val);
            return isNaN(num) ? -Infinity : num;
        }

        function applySortAndRender() {
            if (!currentBatchStocks.length) return;
            let sorted = [...currentBatchStocks];
            if (currentSortField && currentSortOrder) {
                sorted.sort((a, b) => {
                    const va = getSortValue(a, currentSortField);
                    const vb = getSortValue(b, currentSortField);
                    return currentSortOrder === 'asc' ? va - vb : vb - va;
                });
            }
            renderBatchStocksInner(sorted);
        }

        // 添加股票到批次相关
        let addStockSelectedKeys = new Set();
        let currentBatchStockCodes = new Set(); // 当前批次已有的股票代码

        function openAddStockPanel() {
            if (!currentBatchId) { alert('请先选择一个批次'); return; }
            // 收集当前批次已有的股票代码
            currentBatchStockCodes.clear();
            (currentBatchStocks || []).forEach(s => {
                currentBatchStockCodes.add(s.stock_code);
            });
            addStockSelectedKeys.clear();
            document.getElementById('addStockSearch').value = '';
            document.getElementById('addStockSelectedCount').textContent = '0';
            filterAddStockList();
            document.getElementById('addStockModal').classList.add('show');
            document.getElementById('addStockSearch').focus();
        }

        function closeAddStockPanel() {
            document.getElementById('addStockModal').classList.remove('show');
        }

        function filterAddStockList() {
            const searchTerm = (document.getElementById('addStockSearch').value || '').trim().toLowerCase();
            const container = document.getElementById('addStockList');
            // 过滤掉已在批次中的股票
            let filtered = stockList.filter(s => !currentBatchStockCodes.has(s.code));
            if (searchTerm) {
                filtered = filtered.filter(s =>
                    s.name.toLowerCase().includes(searchTerm) || s.code.toLowerCase().includes(searchTerm)
                );
            }
            // 选中的排前面
            filtered.sort((a, b) => {
                const aKey = `${a.name} (${a.code})`;
                const bKey = `${b.name} (${b.code})`;
                const aS = addStockSelectedKeys.has(aKey);
                const bS = addStockSelectedKeys.has(bKey);
                if (aS && !bS) return -1;
                if (!aS && bS) return 1;
                return 0;
            });
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;padding:10px;">没有可添加的股票</p>';
                return;
            }
            container.innerHTML = filtered.map(s => {
                const key = `${s.name} (${s.code})`;
                const checked = addStockSelectedKeys.has(key);
                return `<div class="stock-item">
                    <input type="checkbox" id="add_${s.code}" ${checked ? 'checked' : ''} onchange="updateAddStockSelection(this, '${key.replace(/'/g, "\\'")}')">
                    <label for="add_${s.code}" style="cursor:pointer;flex:1;">${s.name} (${s.code})</label>
                </div>`;
            }).join('');
        }

        function updateAddStockSelection(cb, key) {
            if (cb.checked) addStockSelectedKeys.add(key);
            else addStockSelectedKeys.delete(key);
            document.getElementById('addStockSelectedCount').textContent = addStockSelectedKeys.size;
        }

        function addStockSelectAll() {
            document.querySelectorAll('#addStockList input[type="checkbox"]').forEach(cb => {
                cb.checked = true;
                const label = cb.nextElementSibling;
                if (label) addStockSelectedKeys.add(label.textContent.trim());
            });
            document.getElementById('addStockSelectedCount').textContent = addStockSelectedKeys.size;
        }

        function addStockDeselectAll() {
            addStockSelectedKeys.clear();
            document.querySelectorAll('#addStockList input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('addStockSelectedCount').textContent = '0';
        }

        function handleAddStockEnter(event) {
            if (event.key !== 'Enter') return;
            const raw = document.getElementById('addStockSearch').value.trim();
            if (!raw) return;
            const terms = raw.split(/[,，、;;。\s]+/).filter(Boolean);
            const notFound = [];
            terms.forEach(term => {
                const match = fuzzyMatchStock(term);
                if (match && !currentBatchStockCodes.has(match.code)) {
                    addStockSelectedKeys.add(`${match.name} (${match.code})`);
                } else if (!match) {
                    notFound.push(term);
                }
            });
            document.getElementById('addStockSearch').value = '';
            document.getElementById('addStockSelectedCount').textContent = addStockSelectedKeys.size;
            filterAddStockList();
            if (notFound.length) alert(`以下股票未找到：\n${notFound.join('、')}`);
        }

        async function confirmAddStocks() {
            if (addStockSelectedKeys.size === 0) { alert('请至少选择一只股票'); return; }
            if (!currentBatchId) { alert('请先选择一个批次'); return; }
            try {
                const resp = await fetch(`/api/batch/${currentBatchId}/add_stocks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_codes: Array.from(addStockSelectedKeys) })
                });
                const data = await resp.json();
                if (data.success) {
                    const total = addStockSelectedKeys.size;
                    const added = data.data.added_count;
                    const skipped = total - added;
                    closeAddStockPanel();
                    await loadBatchStocks(currentBatchId);
                    loadBatchList();
                    if (skipped > 0) {
                        alert(`已添加 ${added} 只股票，${skipped} 只已存在被忽略`);
                    }
                } else {
                    alert('添加失败: ' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('添加失败: ' + e.message);
            }
        }

        // 初始化
        loadStockList();
        loadBatchList();
        
        // 定时刷新批次列表
        setInterval(loadBatchList, 5000);
    </script>
</body>
