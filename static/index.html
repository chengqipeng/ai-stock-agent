<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI Stock Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#e8ecf4 0%,#d5dbe8 25%,#c9d6f0 50%,#ddd5ee 75%,#e8ecf4 100%);background-attachment:fixed;min-height:100vh;color:#1d1d1f;font-size:13px}
@keyframes bannerPulse{0%,100%{background:rgba(240,173,78,0.18)}50%{background:rgba(240,173,78,0.38)}}
@keyframes iconSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes progressStripe{0%{background-position:0 0}100%{background-position:30px 0}}
@keyframes dotBlink{0%,20%{opacity:0}40%{opacity:1}}
.banner-running{animation:bannerPulse 2s ease-in-out infinite;border-color:rgba(240,173,78,0.4)!important}
.banner-running .job-icon{display:inline-block;animation:iconSpin 1.2s linear infinite}
.job-progress-bar{display:none;height:3px;border-radius:2px;background:rgba(0,0,0,0.06);overflow:hidden;position:absolute;bottom:0;left:0;right:0}
.banner-running .job-progress-bar{display:block}
.job-progress-fill{height:100%;border-radius:2px;background:repeating-linear-gradient(-45deg,rgba(102,126,234,0.6),rgba(102,126,234,0.6) 4px,rgba(102,126,234,0.3) 4px,rgba(102,126,234,0.3) 8px);background-size:30px 30px;animation:progressStripe .8s linear infinite;transition:width .5s ease}
.job-elapsed{display:none;font-size:9px;opacity:.7;white-space:nowrap;flex-shrink:0}
.banner-running .job-elapsed{display:inline}
.job-dots::after{content:''}
.banner-running .job-dots::after{content:'...';animation:dotBlink 1.5s steps(1) infinite}
.header{background:rgba(102,126,234,0.75);backdrop-filter:blur(20px);color:white;padding:10px 20px;display:flex;align-items:center;gap:16px}
.header h1{font-size:16px;font-weight:700}
.container{max-width:1200px;margin:12px auto;padding:0 12px}
.sec-title{font-size:13px;font-weight:700;color:#48484a;margin:16px 0 8px;padding-left:2px}
.nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.nav-card{background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,0.45);box-shadow:0 1px 8px rgba(0,0,0,0.03);text-decoration:none;color:#1d1d1f;transition:all .2s;display:block}
.nav-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.07);border-color:rgba(102,126,234,0.3)}
.nav-card .icon{font-size:20px;margin-bottom:4px}
.nav-card .title{font-size:12px;font-weight:700;margin-bottom:2px}
.nav-card .desc{font-size:10px;color:#8e8e93;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.job-grid{display:flex;flex-wrap:wrap;gap:8px}
.job-wrap{background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);border-radius:8px;font-size:11px;color:#48484a;position:relative;border:1px solid rgba(0,0,0,0.05);overflow:hidden;min-width:280px;flex:1 1 280px;max-width:100%}.job-row{display:grid;grid-template-columns:18px 1fr auto;align-items:center;gap:8px;padding:8px 12px;min-height:36px}
.job-banner .job-icon{font-size:13px;text-align:center}
.job-banner .job-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.job-banner .job-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.job-banner button{padding:3px 8px;background:rgba(102,126,234,0.12);border:1px solid rgba(102,126,234,0.18);border-radius:5px;color:#667eea;cursor:pointer;font-size:10px;white-space:nowrap}
.job-banner button:hover{background:rgba(102,126,234,0.22)}
.job-banner a{padding:3px 8px;background:rgba(102,126,234,0.06);border-radius:5px;color:#667eea;font-size:10px;text-decoration:none;white-space:nowrap}
.job-banner a:hover{background:rgba(102,126,234,0.14)}
.group-label{grid-column:1/-1;font-size:11px;font-weight:700;color:#667eea;padding:8px 4px 4px;margin:0}.cv-card{background:rgba(255,255,255,0.55);border-radius:8px;padding:10px 12px;border:1px solid rgba(0,0,0,0.04)}
.job-detail{font-size:10px;color:#6e6e73;line-height:1.6;padding:0 12px 8px;display:none}

</style>
</head>
<body>
<div class="header"><h1>📊 AI Stock Agent</h1><span style="font-size:11px;opacity:.7">控制台</span></div>
<div class="container">
<div class="sec-title">📌 功能入口</div>
<div class="nav-grid">
  <a class="nav-card" href="/batch_analysis"><div class="icon">📋</div><div class="title">批量股票分析</div><div class="desc">股票列表、涨跌初筛、CAN SLIM、深度分析</div></a>
  <a class="nav-card" href="/stock_detail"><div class="icon">📈</div><div class="title">个股深度分析</div><div class="desc">K线量价、主力资金、财报、预测、新闻</div></a>
  <a class="nav-card" href="/weekly_prediction"><div class="icon">🔮</div><div class="title">周/月预测</div><div class="desc">V11/V20/V30预测、验证回测、多模型叠加</div></a>
  <a class="nav-card" href="/undervalued"><div class="icon">🔍</div><div class="title">低估值筛选</div><div class="desc">科技/制造低估值筛选、历史追踪</div></a>
  <a class="nav-card" href="/concept_board"><div class="icon">🧩</div><div class="title">概念板块</div><div class="desc">板块强弱势、个股归属、轮动分析</div></a>
  <a class="nav-card" href="/data_browser"><div class="icon">📂</div><div class="title">数据浏览</div><div class="desc">K线、资金流、龙虎榜、盘口数据</div></a>
  <a class="nav-card" href="/scheduler_logs"><div class="icon">📝</div><div class="title">调度日志</div><div class="desc">定时任务执行记录和状态</div></a>
</div>
<div class="sec-title">⏱️ 调度任务状态</div>
<div class="sched-grid" id="schedGrid"></div>
<div class="sec-title">🔬 数据交叉验证结果</div>
<div id="cvResult" style="background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);border-radius:10px;padding:14px;border:1px solid rgba(0,0,0,0.05);font-size:12px;color:#48484a">
  <div id="cvLoading">加载中...</div>
  <div id="cvContent" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div id="cvMeta" style="font-size:11px;color:#8e8e93"></div>
      <button onclick="triggerCV()" id="cvBtn" style="padding:4px 12px;background:rgba(102,126,234,0.12);border:1px solid rgba(102,126,234,0.18);border-radius:5px;color:#667eea;cursor:pointer;font-size:11px">▶ 立即验证</button>
    </div>
    <div id="cvGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px"></div>
  </div>
  <div id="cvEmpty" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;color:#8e8e93">
      <span>暂无验证数据</span>
      <button onclick="triggerCV()" style="padding:4px 12px;background:rgba(102,126,234,0.12);border:1px solid rgba(102,126,234,0.18);border-radius:5px;color:#667eea;cursor:pointer;font-size:11px">▶ 立即验证</button>
    </div>
  </div>
</div>
</div>
<script>
var _jobs=[
  {id:'kline',label:'日线数据',api:'/api/kline_job_status',trigger:'/api/trigger_kline_job',log:'日线数据',group:'fetch',
   dims:function(d){return[
     _dim('K线',d.kline_success,d.kline_total,d.kline_failed),
     _dim('财报',d.finance_success,d.finance_total,d.finance_failed)
   ]}},
  {id:'price',label:'最高最低价',api:'/api/price_job_status',trigger:'/api/trigger_price_job',log:'最高最低价',group:'fetch',
   dims:function(d){return[_dim('价格数据',d.price_success,d.price_total,d.price_failed)]}},
  {id:'market_data',label:'盘后数据',api:'/api/market_data_job_status',trigger:'/api/trigger_market_data_job',log:'盘后数据',group:'fetch',
   dims:function(d){return[
     _dim('分时数据',d.time_data_success,d.time_data_total,d.time_data_failed),
     _dim('盘口数据',d.order_book_success,d.order_book_total,d.order_book_failed),
     _dimCnt('龙虎榜',d.dragon_tiger_count)
   ]}},
  {id:'us_market',label:'海外数据',api:'/api/us_market_job_status',trigger:'/api/trigger_us_market_job',log:'海外数据',group:'fetch',
   dims:function(d){return[
     _dimCnt('指数K线',d.kline_count),_dimCnt('全球指数',d.index_realtime_count),
     _dimCnt('排行榜',d.ranking_count),_dimCnt('美股K线',d.us_stock_kline_count)
   ]}},
  {id:'fund_flow',label:'资金流向',api:'/api/fund_flow_job_status',trigger:'/api/trigger_fund_flow_job',log:'资金流向',group:'fetch',
   dims:function(d){var s=d.success||0,f=d.failed||0,sk=d.skipped||0,t=d.total||0;return[
     _dim('资金流向',s,t,f,sk?'跳过'+sk:'')
   ]}},
  {id:'news',label:'资讯数据',api:'/api/news_job_status',trigger:'/api/trigger_news_job',log:'资讯数据',group:'fetch',
   dims:function(d){
     var ls=[];var tc=d.type_counts||{};
     ls.push(_dim('新闻抓取',d.done_stocks,d.total_stocks,d.failed_stocks));
     var tl={news:'公司新闻',notice:'公司公告',industry:'行业资讯',report:'研究报告',event:'重要事件',ranking:'行业排名',forecast:'业绩预告'};
     for(var k in tl){ls.push(_dimCnt(tl[k],tc[k]||0))}
     var bo=d.big_order_status||'';
     if(bo==='done')ls.push('✅ 大单追踪 '+(d.big_order_count||0)+'条');
     else if(bo==='skipped')ls.push('✅ 大单追踪 已存在');
     else if(bo==='failed')ls.push('❌ 大单追踪 失败');
     else if(bo==='fetching')ls.push('🔄 大单追踪...');else if(bo)ls.push('⏳ 大单追踪');else ls.push('⏳ 大单追踪');
     var cs=d.content_summary;
     if(cs&&cs.total>0){var pend=(cs.pending||0)+(cs.fetching||0);var done=cs.done||0;
       ls.push((pend>0?'🔄':'✅')+' 正文抓取 '+Math.round(done/cs.total*100)+'% '+done+'/'+cs.total+(pend>0?' 待抓'+pend:''))}
     else{ls.push('⏳ 正文抓取')}return ls}},
  {id:'concept_strength',label:'概念强弱势',api:'/api/concept_strength_job_status',trigger:'/api/trigger_concept_strength_job',log:'概念强弱势',group:'compute',
   dims:function(d){return[
     _dim('板块K线',d.board_kline_success,d.board_kline_total,d.board_kline_failed,d.board_kline_skipped?'跳过'+d.board_kline_skipped:''),
     _dim('板块强弱',d.board_market_success,d.board_market_total,d.board_market_failed),
     _dim('个股归属',d.stock_board_success,d.stock_board_total,d.stock_board_failed)
   ]}},
  {id:'weekly_pred',label:'周预测',api:'/api/weekly_prediction_job_status',trigger:'/api/trigger_weekly_prediction_job',log:'周预测',group:'compute',
   dims:function(d){var ls=[];
     if(d.predict_total>0)ls.push(_dim('预测',d.predict_done,d.predict_total,0,'涨'+d.predict_up+' 跌'+d.predict_down));
     if(d.backtest_accuracy)ls.push('📊 回测准确率 '+d.backtest_accuracy+'%');
     if(d.stage)ls.push('📋 阶段: '+(d.stage==='loading_data'?'加载数据':d.stage==='predicting'?'预测中':d.stage==='backtesting'?'回测中':d.stage==='writing_db'?'写入DB':d.stage));
     return ls}},
  {id:'db_check',label:'数据异常检测',api:'/api/db_check_job_status',trigger:'/api/trigger_db_check_job',log:'数据异常检测',group:'validate',
   dims:function(d){
     var ls=[];var ph=d.phase||'';
     var dims=[['kline','K线检测',d.check_checked,d.check_total],['fund_flow','资金流向校验',d.ff_checked,d.ff_total],
       ['board_kline','板块K线校验',d.board_checked,d.board_total],['order_book','盘口数据校验',d.ob_checked,d.ob_total],
       ['time_data','分时数据校验',d.td_checked,d.td_total]];
     var found=false;
     for(var i=0;i<dims.length;i++){var dk=dims[i][0],dn=dims[i][1],dd=dims[i][2]||0,dt=dims[i][3]||0;
       if(dk===ph&&d.running){found=true;var p=dt>0?Math.round(dd/dt*100):0;ls.push('🔄 '+dn+' '+p+'% '+dd+'/'+dt)}
       else if(dt>0&&dd>=dt)ls.push('✅ '+dn+' '+dd+'/'+dt);
       else if(!found)ls.push('⏳ '+dn);
       else ls.push('⏳ '+dn)}
     if(d.check_anomalies>0)ls.push('⚠️ 异常'+(d.check_anomalies||0)+' 修复'+(d.check_repaired||0));
     return ls}},
  {id:'cross_val',label:'数据交叉验证',api:'/api/cross_validation_job_status',trigger:'/api/trigger_cross_validation_job',log:'数据交叉验证',group:'validate',
   dims:function(d){
     var ls=[];var res=d.results||{};var stg=d.stage||'';var cd=d.current_done||0;var ct=d.current_total||0;
     var cats=[['kline','日K线'],['order_book','盘口数据'],['time_data','分时数据'],['price','最高最低价'],['finance','财报数据'],['fund_flow','资金流向']];
     var found=false;
     for(var i=0;i<cats.length;i++){var ck=cats[i][0],cn=cats[i][1],cr=res[ck];
       if(cr)ls.push('✅ '+cn+' '+cr.match_rate.toFixed(1)+'% ('+cr.match+'/'+cr.total+')');
       else if(ck===stg&&d.running){found=true;var p=ct>0?Math.round(cd/ct*100):0;ls.push('🔄 '+cn+' '+p+'% '+cd+'/'+ct)}
       else ls.push('⏳ '+cn)}
     return ls}}
];
function _dim(name,ok,total,fail,extra){
  if(!total&&!ok)return '⏳ '+name;
  var ic=fail>0?'⚠️':'✅';var s=ic+' '+name+' '+ok+'/'+total;
  if(fail>0)s+=' 失败'+fail;if(extra)s+='  '+extra;return s}
function _dimCnt(name,cnt){return (cnt>0?'✅':'⏳')+' '+name+(cnt>0?' '+cnt+'条':'')}

var _groupLabels={fetch:'📥 数据拉取',compute:'🧮 计算预测',validate:'🔍 数据校验'};
var _groupOrder=['fetch','compute','validate'];
function initBanners(){
  var g=document.getElementById('schedGrid'),h='';
  _groupOrder.forEach(function(gk){
    h+='<div style="margin-bottom:12px">';
    h+='<div style="font-size:11px;font-weight:700;color:#667eea;padding:4px 4px 6px">'+_groupLabels[gk]+'</div>';
    h+='<div class="job-grid">';
    _jobs.forEach(function(j){
      if(j.group!==gk)return;
      h+='<div class="job-wrap" id="b_'+j.id+'">';
      h+='<div class="job-row">';
      h+='<span class="job-icon" id="i_'+j.id+'">&#x23F3;</span>';
      h+='<span class="job-text" id="t_'+j.id+'">'+j.label+' &#x52A0;&#x8F7D;&#x4E2D;<span class="job-dots"></span></span>';
      h+='<div class="job-actions">';
      h+='<span class="job-elapsed" id="e_'+j.id+'"></span>';
      h+='<button onclick="triggerJob(\''+j.id+'\')">&#x25B6;</button>';
      h+='<a href="/scheduler_logs?job_name='+encodeURIComponent(j.log)+'">&#x1F4CB;</a>';
      h+='</div></div>';
      h+='<div class="job-detail" id="d_'+j.id+'"></div>';
      h+='<div class="job-progress-bar"><div class="job-progress-fill" id="p_'+j.id+'" style="width:0%"></div></div>';
      h+='</div>';
    });
    h+='</div></div>';
  });
  g.innerHTML=h;
}
function setBR(el,r){if(r)el.classList.add('banner-running');else el.classList.remove('banner-running')}
function updProg(pid,eid,done,total,st){
  var pct=total>0?Math.round(done/total*100):0;
  var el=document.getElementById(pid);if(el)el.style.width=pct+'%';
  if(st){var s=Math.round((Date.now()-new Date(st).getTime())/1000),m=Math.floor(s/60);
  var ee=document.getElementById(eid);if(ee)ee.textContent=m+':'+(s%60<10?'0':'')+(s%60)}
}
async function triggerJob(id){
  var j=_jobs.find(function(x){return x.id===id});if(!j)return;
  try{var r=await fetch(j.trigger,{method:'POST'});var d=await r.json();
  if(d.success)pollJob(j);else alert(d.message||'触发失败')}catch(e){alert('请求失败')}
}
async function pollJob(j){
  try{
    var r=await fetch(j.api),d=(await r.json()).data;if(!d)return;
    var b=document.getElementById('b_'+j.id),ic=document.getElementById('i_'+j.id),tx=document.getElementById('t_'+j.id);
    setBR(b,d.running);
    var det=document.getElementById('d_'+j.id);
    var dims=j.dims?j.dims(d):[];
    if(d.error&&!d.running){
      ic.textContent='❌';tx.textContent=j.label+' 异常: '+(d.error||'').substring(0,50);b.style.background='rgba(217,83,79,0.1)';
      if(det)det.style.display='none';
    }else if(d.running){
      var tot=d.categories_total||d.total_stocks||d.total||d.predict_total||0;
      var dn=d.categories_done||d.done_stocks||d.done||d.predict_done||0;
      var pct=tot>0?Math.round(dn/tot*100):0;
      ic.textContent='🔄';var msg=j.label+' '+pct+'%  '+dn+'/'+tot;
      if(d.current_category)msg=j.label+' · '+d.current_category+(tot>0?' '+pct+'%':'');
      tx.textContent=msg;
      if(det){if(dims.length>0){det.innerHTML=dims.join('<br>');det.style.display='block'}else det.style.display='none'}
      updProg('p_'+j.id,'e_'+j.id,dn,tot,d.start_time);
    }else if(d.last_run_time){
      var today=new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Shanghai'});
      var rd=(d.last_run_time||'').substring(0,10);
      var isT=rd===today||d.last_run_date===today;
      if(isT&&d.last_success){
        ic.textContent='✅';tx.textContent=d.last_run_time.substring(5)+' '+j.label+' 完成';b.style.background='rgba(92,184,92,0.08)';
      }else if(isT){
        ic.textContent='⚠️';tx.textContent=d.last_run_time.substring(5)+' '+j.label+' 部分失败';b.style.background='rgba(240,173,78,0.08)';
      }else{
        ic.textContent='⏳';tx.textContent=j.label+' 等待调度  上次:'+d.last_run_time.substring(5);b.style.background='';
      }
      if(det){if(dims.length>0){det.innerHTML=dims.join('<br>');det.style.display='block'}else det.style.display='none'}
    }else{
      ic.textContent='⏳';tx.textContent=j.label+' 等待调度';b.style.background='';
      if(det)det.style.display='none';
    }
  }catch(e){}
}
function pollAll(){_jobs.forEach(function(j){pollJob(j)})}
initBanners();pollAll();setInterval(pollAll,8000);

</script>
</body>
</html>
