<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>批量分析 - AI Stock Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8ecf4 0%, #d5dbe8 25%, #c9d6f0 50%, #ddd5ee 75%, #e8ecf4 100%);
            background-attachment: fixed;
            padding: 20px;
            min-height: 100vh;
            color: #1d1d1f;
        }
        .header {
            background: rgba(102, 126, 234, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: white;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .header h1 {
            font-size: 16px;
            margin: 0;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            transition: grid-template-columns 0.3s;
        }
        .container.sidebar-collapsed {
            grid-template-columns: 0px 1fr;
            gap: 0;
        }
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
            transition: opacity 0.3s;
            min-width: 0;
        }
        .container.sidebar-collapsed .left-column {
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-toggle {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            width: 20px;
            height: 60px;
            background: rgba(102, 126, 234, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            transition: left 0.3s, width 0.15s;
            border: 1px solid rgba(255,255,255,0.2);
            border-left: none;
        }
        .sidebar-toggle:hover {
            width: 24px;
            background: rgba(102, 126, 234, 0.85);
        }
        .panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .stock-list {
            max-height: 125px;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.45);
        }
        .stock-item {
            padding: 4px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            transition: background 0.15s;
        }
        .stock-item:hover { background: rgba(102, 126, 234, 0.08); }
        .stock-item input[type="checkbox"] { cursor: pointer; }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            margin: 5px 2px 0 0;
            font-size: 11px;
            transition: all 0.15s;
        }
        .btn-primary { background: rgba(102, 126, 234, 0.85); }
        .btn-primary:hover { background: rgba(102, 126, 234, 1); }
        .btn-success { background: rgba(76, 175, 80, 0.85); }
        .btn-success:hover { background: rgba(76, 175, 80, 1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, rgba(102,126,234,0.9) 0%, rgba(118,75,162,0.9) 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .batch-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .panel.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 998;
            border-radius: 0;
            overflow-y: auto;
            max-height: none;
        }
        .panel.fullscreen .batch-list,
        .panel.fullscreen > div[style*="max-height"] {
            max-height: calc(100vh - 80px) !important;
        }
        .panel.fullscreen #stockResultTable {
            min-width: unset;
            width: 100%;
            table-layout: fixed;
        }
        .panel.fullscreen #stockResultTable th,
        .panel.fullscreen #stockResultTable td {
            min-width: unset;
            max-width: unset;
        }
        .panel.fullscreen #stockResultTable th:first-child,
        .panel.fullscreen #stockResultTable td:first-child {
            min-width: 20px;
            width: 36px;
        }
        .fullscreen-btn {
            padding: 5px 10px;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin: 5px 2px 0 0;
            transition: all 0.15s;
        }
        .fullscreen-btn:hover { background: rgba(102, 126, 234, 1); }
        .batch-item {
            padding: 6px;
            margin: 4px 0;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.35);
            transition: all 0.15s;
        }
        .batch-item:hover { border-color: rgba(102, 126, 234, 0.3); background: rgba(102, 126, 234, 0.06); }
        .batch-item.active { border-color: rgba(102, 126, 234, 0.4); background: rgba(102, 126, 234, 0.08); }
        .stock-result-list {
            max-height: 600px;
            overflow-y: auto;
        }
        .stock-result-item {
            padding: 5px;
            margin: 3px 0;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }
        .stock-result-item:hover { background: rgba(102, 126, 234, 0.06); }
        .score { font-weight: 600; color: #667eea; }

        /* 批次股票表格美化 */
        #stockResultTable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        #stockResultTable thead tr {
            background: linear-gradient(135deg, rgba(102,126,234,0.12) 0%, rgba(118,75,162,0.08) 100%);
        }
        #stockResultTable thead th {
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #48484a;
            border-bottom: 2px solid rgba(102,126,234,0.2);
            letter-spacing: 0.3px;
        }
        .stock-group-row td {
            border-top: 1px solid rgba(102,126,234,0.12);
        }
        .stock-group-row:first-child td {
            border-top: none;
        }
        .stock-name-cell {
            padding: 8px 6px;
            position: sticky;
            left: 36px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5;
            vertical-align: top;
            max-width: 72px;
        }
        .stock-check-cell {
            padding: 8px 4px;
            text-align: center;
            position: sticky;
            left: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5;
            vertical-align: top;
            width: 36px;
        }
        .stock-name-cell .sname {
            font-weight: 700;
            font-size: 13px;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .stock-name-cell .scode {
            font-size: 10px;
            color: #667eea;
            font-weight: 500;
            white-space: nowrap;
            margin-top: 1px;
        }
        .stock-name-cell .stime {
            font-size: 9px;
            color: #aeaeb2;
            white-space: nowrap;
            margin-top: 2px;
        }
        .stock-name-cell .sbtn {
            margin-top: 4px;
            padding: 3px 8px;
            background: linear-gradient(135deg, rgba(96,125,139,0.7), rgba(96,125,139,0.9));
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .stock-name-cell .sbtn:hover {
            background: linear-gradient(135deg, rgba(96,125,139,0.9), rgba(96,125,139,1));
            transform: translateY(-1px);
        }
        .data-row td {
            padding: 0;
        }
        .data-section {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 0;
            font-size: 11px;
        }
        .data-section-label {
            font-weight: 600;
            color: #636366;
            white-space: nowrap;
            margin-right: 10px;
            font-size: 11px;
            min-width: 70px;
        }
        .data-section-items {
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: wrap;
        }
        .data-metric {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 68px;
            padding: 3px 8px;
            border-right: 1px solid rgba(0,0,0,0.05);
        }
        .data-metric:last-child { border-right: none; }
        .data-metric .dm-label {
            font-size: 9px;
            color: #8e8e93;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .data-metric .dm-value {
            font-weight: 600;
            color: #1d1d1f;
            font-size: 12px;
            margin-top: 1px;
        }
        .data-metric .dm-value.positive { color: #e53935; }
        .data-metric .dm-value.negative { color: #2e7d32; }
        .data-metric .dm-value.empty { color: #c7c7cc; font-weight: 400; }
        .data-metric .dm-actions {
            display: flex;
            gap: 3px;
            margin-top: 2px;
        }
        .dim-btn {
            padding: 2px 7px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.12s;
        }
        .dim-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .dim-btn.primary { background: #667eea; }
        .dim-btn.danger { background: #ff6b6b; }
        .dim-btn.success { background: #4caf50; }
        .row-change { background: rgba(255,248,225,0.5); }
        .row-kline { background: rgba(237,233,254,0.45); }
        .row-canslim { background: rgba(232,240,254,0.45); }
        .row-canslim .data-metric { min-width: 80px; padding: 5px 10px; }
        .row-canslim .data-section-items { flex-wrap: nowrap; }
        .row-canslim .dm-label { font-size: 13px; font-weight: 600; }
        .row-canslim .dm-value { font-size: 20px; }
        .row-canslim .dim-btn, .row-kline .dim-btn { padding: 4px 10px; font-size: 11px; }
        .sort-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 8px 0;
            align-items: center;
        }
        .sort-bar-label {
            font-size: 11px;
            color: #636366;
            font-weight: 600;
            margin-right: 4px;
        }
        .sort-btn {
            padding: 3px 10px;
            border: 1px solid rgba(102,126,234,0.25);
            border-radius: 6px;
            background: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            color: #48484a;
            transition: all 0.15s;
            user-select: none;
        }
        .sort-btn:hover { border-color: rgba(102,126,234,0.5); background: rgba(102,126,234,0.06); }
        .sort-btn.active { border-color: rgba(102,126,234,0.6); background: rgba(102,126,234,0.12); color: #667eea; font-weight: 600; }
        .sort-btn .sort-arrow { margin-left: 3px; font-size: 10px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 16px;
            padding: 30px;
            max-width: 90%;
            width: 1400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12), 0 0 1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }
        .prompt-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .prompt-section {
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
        }
        .prompt-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #667eea;
        }
        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .result-section {
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.4);
        }
        .result-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #667eea;
        }
        .close-btn {
            position: sticky;
            top: 0;
            float: right;
            margin-left: auto;
            width: 30px;
            height: 30px;
            border: none;
            background: rgba(255, 59, 48, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.15s;
        }
        .close-btn:hover {
            background: rgba(255, 59, 48, 1);
        }
        .markdown-body { line-height: 1.6; font-size: 14px; }
        .markdown-body h2 { color: #667eea; margin-top: 20px; }
        .progress-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .progress-modal.show { display: flex; }
        .progress-modal-content {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 16px;
            padding: 30px;
            width: 500px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12), 0 0 1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .progress-modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        .progress-modal-bar {
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            overflow: visible;
            margin-bottom: 15px;
            position: relative;
        }
        .progress-modal-fill {
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
            transition: width 0.3s;
            border-radius: 12px;
        }
        .progress-modal-text {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .progress-modal-info {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        .overlay-disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 批量股票分析</h1>
    </div>

    <div class="container" id="mainContainer">
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="折叠/展开侧栏">◀</button>
        <div class="left-column" id="leftColumn">
            <div class="panel">
                <h2 style="font-size: 14px;">待分析股票列表</h2>
                <div style="margin: 4px 0 0 0; position: relative;">
                    <input type="text" id="stockSearch" placeholder="搜索或批量输入股票（逗号/空格分隔，回车选中）..." style="width: 100%; padding: 6px 28px 6px 8px; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; font-size: 13px; margin-bottom: 2px; box-sizing: border-box; background: rgba(255,255,255,0.5);" oninput="filterStocks()" onkeydown="handleStockSearchEnter(event)" onpaste="handleStockPaste(event)">
                    <span onclick="document.getElementById('stockSearch').value='';filterStocks()" style="position: absolute; right: 8px; top: 6px; cursor: pointer; color: #aaa; font-size: 14px; line-height: 1;">&times;</span>
                </div>
                <div style="margin: 2px 0; display: flex; align-items: center; gap: 2px;">
                    <button class="btn btn-primary" onclick="selectAll()">全选</button>
                    <button class="btn btn-primary" onclick="deselectAll()">取消全选</button>
                </div>
                <div style="margin: 2px 0; display: flex; align-items: center; gap: 2px; flex-wrap: nowrap;">
                    <button class="btn btn-success" onclick="startBatchAnalysis()" id="startBtn">K线初筛 (<span id="selectedCount">0</span>)</button>
                    <button class="btn" style="background:#e67e22;" onclick="openPrescreening()">涨跌初筛(<span id="prescreeningCount">0</span>)</button>
                    <button class="btn" style="background:#5c6bc0;" onclick="startCanslimPrescreening()">CAN SLIM初筛(<span id="canslimCount">0</span>)</button>
                    <span id="progressSection" style="display: none; margin-left: 8px; padding: 5px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #ddd; border-radius: 4px; font-size: 11px; font-weight: 600; vertical-align: top; margin-top: 5px;">
                        <span id="progressText" style="color: #fff;">0/0</span>
                    </span>
                </div>
                
                <div class="stock-list" id="stockList" style="margin-top: 8px;">
                    <p style="text-align: center; color: #999;">加载中...</p>
                </div>
            </div>

            <div class="panel">
                <h2 style="font-size: 14px; display: flex; justify-content: space-between; align-items: center;">
                    <span>批次记录</span>
                    <button onclick="clearHistory()" style="padding: 4px 12px; background: rgba(255,59,48,0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px;">清空历史</button>
                </h2>
                <div class="batch-list" id="batchList">
                    <p style="text-align: center; color: #999;">加载中...</p>
                </div>
            </div>
        </div>

        <div class="panel" style="overflow-x: auto;">
            <h2 style="font-size: 14px; display: flex; justify-content: space-between; align-items: center;">
                <span>批次股票列表</span>
                <div style="display:flex;gap:6px;align-items:center;">
                    <button id="addStockToBatchBtn" class="btn btn-primary" disabled onclick="openAddStockPanel()" style="position:relative;">+ 添加股票</button>
                    <button id="batchPrescreeningBtn" class="btn" style="background:#e67e22;" disabled onclick="batchPrescreeningUpdate()">涨跌初筛 (<span id="batchPrescreeningCount">0</span>)</button>
                    <button id="batchKlineBtn" class="btn btn-success" disabled onclick="batchKlineUpdate()">K线初筛 (<span id="batchKlineCount">0</span>)</button>
                    <button id="batchCanslimBtn" class="btn" style="background:#5c6bc0;" disabled onclick="batchCanslimPrescreening()">CAN SLIM初筛 (<span id="batchCanslimCount">0</span>)</button>
                    <button id="batchActionsBar" class="btn btn-success" disabled onclick="batchDeepAnalysis()">CAN SLIM深度分析 (<span id="batchSelectedCount">0</span>)</button>
                    <button class="fullscreen-btn" onclick="toggleFullscreen(this.closest('.panel'))">⛶ 全屏</button>
                </div>
            </h2>
            <div class="sort-bar" id="sortBar" style="display:none;">
                <span class="sort-bar-label">排序：</span>
                <button class="sort-btn" onclick="toggleSort('change_pct')">涨跌幅<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('kline_total_score')">K线分<span class="sort-arrow"></span></button>
                <span class="sort-bar-label" style="margin-left:6px;">CAN SLIM：</span>
                <button class="sort-btn" onclick="toggleSort('c_score')">C<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('a_score')">A<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('n_score')">N<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('s_score')">S<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('l_score')">L<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('i_score')">I<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('m_score')">M<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="toggleSort('canslim_total')">综合<span class="sort-arrow"></span></button>
                <button class="sort-btn" onclick="clearSort()" style="color:#ff6b6b;border-color:rgba(255,107,107,0.3);">✕ 重置</button>
            </div>
            <div style="overflow-x: auto; max-height: 600px;">
                <table id="stockResultTable" style="min-width: 900px; display: none; font-size: 11px;">
                    <thead>
                        <tr>
                            <th style="text-align:center;position:sticky;left:0;background:rgba(245,245,250,0.9);z-index:10;width:36px;">
                                <input type="checkbox" id="selectAllStocks" onchange="toggleSelectAllStocks()" style="cursor:pointer;">
                            </th>
                            <th style="text-align:left;position:sticky;left:36px;background:rgba(245,245,250,0.9);z-index:10;width:90px;">股票信息</th>
                            <th style="text-align:left;">数据详情</th>
                        </tr>
                    </thead>
                    <tbody id="stockResultList"></tbody>
                </table>
            </div>
            <div id="stockResultEmpty" style="text-align: center; color: #999; padding: 20px;">请选择批次查看</div>
        </div>
    </div>

    <!-- 股票初筛弹窗 -->
    <div class="modal" id="prescreeningModal" onclick="if(event.target.id==='prescreeningModal')closePrescreening()">
        <div class="modal-content" onclick="event.stopPropagation()" style="width:900px;max-width:95%;">
            <button class="close-btn" onclick="closePrescreening()">×</button>
            <h2 style="margin-bottom:12px;font-size:15px;">📊 涨跌初筛 - 120天最高点涨跌幅排名</h2>
            <div id="prescreeningLoading" style="text-align:center;padding:30px;color:#999;">加载中，请稍候...</div>
        </div>
    </div>

    <div class="modal" id="historyModal" onclick="if(event.target.id==='historyModal')document.getElementById('historyModal').classList.remove('show')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="document.getElementById('historyModal').classList.remove('show')">×</button>
            <h2 id="historyModalTitle"></h2>
            <div id="historyModalContent"></div>
        </div>
    </div>

    <div class="modal" id="detailModal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h2 id="modalTitle"></h2>
            <div class="markdown-body" id="modalContent"></div>
        </div>
    </div>

    <!-- 添加股票到批次弹窗 -->
    <div class="modal" id="addStockModal" onclick="if(event.target.id==='addStockModal')closeAddStockPanel()">
        <div class="modal-content" onclick="event.stopPropagation()" style="width:500px;max-width:95%;padding:20px;">
            <button class="close-btn" onclick="closeAddStockPanel()">×</button>
            <h2 style="font-size:15px;margin-bottom:12px;">添加股票到当前批次</h2>
            <div style="position:relative;">
                <input type="text" id="addStockSearch" placeholder="搜索股票名称或代码（逗号/空格分隔，回车添加）..." style="width:100%;padding:8px 28px 8px 10px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-size:13px;box-sizing:border-box;background:rgba(255,255,255,0.6);" oninput="filterAddStockList()" onkeydown="handleAddStockEnter(event)">
                <span onclick="document.getElementById('addStockSearch').value='';filterAddStockList()" style="position:absolute;right:8px;top:8px;cursor:pointer;color:#aaa;font-size:14px;line-height:1;">&times;</span>
            </div>
            <div style="margin:8px 0;display:flex;gap:6px;align-items:center;">
                <button class="btn btn-primary" onclick="addStockSelectAll()">全选</button>
                <button class="btn btn-primary" onclick="addStockDeselectAll()">取消全选</button>
                <button class="btn btn-success" onclick="confirmAddStocks()">确认添加 (<span id="addStockSelectedCount">0</span>)</button>
            </div>
            <div id="addStockList" style="max-height:350px;overflow-y:auto;border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:8px;background:rgba(255,255,255,0.45);"></div>
        </div>
    </div>

    <div class="progress-modal" id="progressModal">
        <div class="progress-modal-content">
            <div class="progress-modal-title" id="progressModalTitle">正在执行K线批量分析...</div>
            <div class="progress-modal-bar">
                <div class="progress-modal-fill" id="progressModalFill" style="width: 0%"></div>
                <div class="progress-modal-text">
                    <span id="progressModalText">0/0</span>
                </div>
            </div>
            <div class="progress-modal-info" id="progressModalInfo">准备开始...</div>
            <div id="deepAnalysisStockList" style="display:none; margin-top:12px; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        marked.use({ breaks: true });
        let stockList = [];
        let selectedStocks = new Set();
        let selectedStockKeys = new Set(); // 存储选中的股票key
        let currentBatchId = null;
        let batchSelectedStockIds = new Set(); // CAN SLIM深度分析选中的股票ID

        function formatLocalTime(utcStr) {
            if (!utcStr) return '-';
            const s = utcStr.trim();
            // datetime.now().isoformat() 格式含T且含微秒，是本地时间，直接截取显示
            if (s.includes('T') && s.includes('.')) return s.slice(0, 16).replace('T', ' ');
            // MySQL CURRENT_TIMESTAMP 格式: "2024-01-01 12:00:00" (UTC)
            const d = new Date(s.replace(' ', 'T') + (s.includes('+') || s.endsWith('Z') ? '' : 'Z'));
            if (isNaN(d)) return s.slice(0, 16).replace('T', ' ');
            return d.getFullYear() + '-' +
                String(d.getMonth()+1).padStart(2,'0') + '-' +
                String(d.getDate()).padStart(2,'0') + ' ' +
                String(d.getHours()).padStart(2,'0') + ':' +
                String(d.getMinutes()).padStart(2,'0');
        }

        async function loadStockList() {
            try {
                const response = await fetch('/api/stock_list');
                const data = await response.json();
                if (data.success) {
                    stockList = data.data;
                    renderStockList();
                }
            } catch (error) {
                console.error('加载股票列表失败:', error);
            }
        }

        function renderStockList() {
            const container = document.getElementById('stockList');
            const searchTerm = document.getElementById('stockSearch').value.toLowerCase();
            
            const filteredStocks = stockList.filter(stock => 
                stock.name.toLowerCase().includes(searchTerm) || 
                stock.code.toLowerCase().includes(searchTerm)
            );
            
            // 按选中状态排序：选中的在前
            const sortedStocks = filteredStocks.sort((a, b) => {
                const aKey = `${a.name} (${a.code})`;
                const bKey = `${b.name} (${b.code})`;
                const aSelected = selectedStockKeys.has(aKey);
                const bSelected = selectedStockKeys.has(bKey);
                if (aSelected && !bSelected) return -1;
                if (!aSelected && bSelected) return 1;
                return 0;
            });
            
            if (sortedStocks.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">没有找到匹配的股票</p>';
                return;
            }
            
            container.innerHTML = sortedStocks.map((stock) => {
                const originalIndex = stockList.indexOf(stock);
                const stockKey = `${stock.name} (${stock.code})`;
                const isChecked = selectedStockKeys.has(stockKey);
                return `
                <div class="stock-item">
                    <input type="checkbox" id="stock_${originalIndex}" ${isChecked ? 'checked' : ''} onchange="updateSelection()">
                    <label for="stock_${originalIndex}" style="cursor: pointer; flex: 1;">
                        ${stock.name} (${stock.code}) - 打分：${stock.score}
                    </label>
                </div>
                `;
            }).join('');
        }

        function filterStocks() {
            renderStockList();
        }

        function fuzzyMatchStock(term) {
            const t = term.trim().toLowerCase();
            if (!t) return null;
            // 精确匹配优先
            let match = stockList.find(s => s.name.toLowerCase() === t || s.code.toLowerCase() === t);
            if (match) return match;
            // 包含匹配
            const contains = stockList.filter(s => s.name.toLowerCase().includes(t) || s.code.toLowerCase().includes(t));
            if (contains.length === 1) return contains[0];
            if (contains.length > 1) {
                // 优先名称以该词开头
                const startsWith = contains.find(s => s.name.toLowerCase().startsWith(t));
                return startsWith || contains[0];
            }
            return null;
        }

        function selectStockTerms(terms) {
            const notFound = [];
            terms.forEach(term => {
                const match = fuzzyMatchStock(term);
                if (match) {
                    const stockKey = `${match.name} (${match.code})`;
                    selectedStockKeys.add(stockKey);
                    selectedStocks.add(stockKey);
                } else {
                    notFound.push(term);
                }
            });
            document.getElementById('selectedCount').textContent = selectedStocks.size;
            document.getElementById('prescreeningCount').textContent = selectedStocks.size;
            document.getElementById('canslimCount').textContent = selectedStocks.size;
            document.getElementById('stockSearch').value = '';
            renderStockList();
            if (notFound.length) alert(`以下股票未找到：\n${notFound.join('、')}`);
        }

        function handleStockSearchEnter(event) {
            if (event.key !== 'Enter') return;
            const raw = document.getElementById('stockSearch').value.trim();
            if (!raw) return;
            const terms = raw.split(/[,，、;;。\s]+/).filter(Boolean);
            if (terms.length === 1) {
                // 单个词：仍支持实时搜索过滤，回车选中
                selectStockTerms(terms);
            } else {
                selectStockTerms(terms);
            }
        }

        function handleStockPaste(event) {
            const text = (event.clipboardData || window.clipboardData).getData('text');
            if (!text) return;
            const terms = text.split(/[,，、;;。\s]+/).filter(Boolean);
            if (terms.length <= 1) return;
            event.preventDefault();
            document.getElementById('stockSearch').value = terms.join('，');
        }

        function updateSelection() {
            stockList.forEach((stock, index) => {
                const checkbox = document.getElementById(`stock_${index}`);
                if (checkbox) {
                    const stockKey = `${stock.name} (${stock.code})`;
                    if (checkbox.checked) {
                        selectedStockKeys.add(stockKey);
                    } else {
                        selectedStockKeys.delete(stockKey);
                    }
                }
            });
            selectedStocks.clear();
            selectedStockKeys.forEach(key => selectedStocks.add(key));
            document.getElementById('selectedCount').textContent = selectedStocks.size;
            document.getElementById('prescreeningCount').textContent = selectedStocks.size;
            document.getElementById('canslimCount').textContent = selectedStocks.size;
            document.getElementById('stockSearch').value = '';
            renderStockList();
        }

        function selectAll() {
            stockList.forEach((stock, index) => {
                const stockKey = `${stock.name} (${stock.code})`;
                selectedStockKeys.add(stockKey);
            });
            renderStockList();
            updateSelection();
        }

        function deselectAll() {
            selectedStockKeys.clear();
            renderStockList();
            updateSelection();
        }

        async function startBatchAnalysis() {
            if (selectedStocks.size === 0) {
                alert('请至少选择一只股票');
                return;
            }

            // 显示进度弹框并禁用界面
            showProgressModal();
            disableUI();

            try {
                // 创建批次
                const response = await fetch('/api/batch_analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_codes: Array.from(selectedStocks) })
                });
                const data = await response.json();
                
                if (data.success) {
                    const batchId = data.data.batch_id;
                    
                    // 执行批量分析
                    await executeBatchAnalysis(batchId, false);
                    
                    // 刷新批次列表
                    loadBatchList();
                }
            } catch (error) {
                alert('批量分析失败: ' + error.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        async function executeBatchAnalysis(batchId, useDeepThinking = false) {
            return new Promise((resolve, reject) => {
                const url = `/api/batch_execute/${batchId}${useDeepThinking ? '?deep_thinking=true' : ''}`;
                const eventSource = new EventSource(url);
                
                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.stage === 'start') {
                            updateProgressModal(data.completed, data.total, '开始分析...');
                        } else if (data.stage === 'progress') {
                            const info = data.error 
                                ? `❌ ${data.stock_name} 分析失败` 
                                : `✅ ${data.stock_name} 完成 (得分: ${data.score})`;
                            updateProgressModal(data.completed, data.total, info);
                        } else if (data.stage === 'done') {
                            eventSource.close();
                            updateProgressModal(data.completed || 100, data.total || 100, '✅ 全部完成！');
                            resolve();
                        } else if (data.stage === 'error') {
                            eventSource.close();
                            updateProgressModal(0, 100, '❌ 执行失败: ' + data.message);
                            reject(new Error(data.message));
                        }
                    } catch (e) {
                        console.error('解析事件失败:', e);
                    }
                };
                
                eventSource.onerror = () => {
                    eventSource.close();
                    reject(new Error('连接失败'));
                };
            });
        }

        async function loadBatchList() {
            try {
                const response = await fetch('/api/batches');
                const data = await response.json();
                if (data.success) {
                    renderBatchList(data.data);
                }
            } catch (error) {
                console.error('加载批次列表失败:', error);
            }
        }

        function renderBatchList(batches) {
            const container = document.getElementById('batchList');
            if (batches.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">暂无批次记录</p>';
                return;
            }
            container.innerHTML = batches.map(batch => `
                <div class="batch-item ${batch.id === currentBatchId ? 'active' : ''}" onclick="loadBatchStocks(${batch.id})">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="font-weight: 600; font-size: 12px;">${batch.is_pinned ? '📌 ' : ''}${batch.batch_name}</div>
                        <div style="display:flex;gap:4px;flex-shrink:0;">
                            <button onclick="event.stopPropagation(); pinBatch(${batch.id})" title="${batch.is_pinned ? '取消置顶' : '置顶'}" style="padding: 2px 6px; background: ${batch.is_pinned ? 'rgba(255,152,0,0.8)' : 'rgba(142,142,147,0.6)'}; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 10px;">${batch.is_pinned ? '取消置顶' : '置顶'}</button>
                            <button onclick="event.stopPropagation(); renameBatch(${batch.id}, '${batch.batch_name.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" style="padding: 2px 6px; background: rgba(102,126,234,0.8); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 10px;">重命名</button>
                            <button onclick="event.stopPropagation(); deleteBatch(${batch.id})" style="padding: 2px 6px; background: rgba(255,59,48,0.75); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 10px;">删除</button>
                        </div>
                    </div>
                    <div style="font-size: 11px; color: #86868b; margin-top: 2px;">
                        总数: ${batch.total_count} | 成功: ${batch.success_count} | 失败: ${batch.completed_count - batch.success_count} | 
                        状态: ${batch.status === 'completed' ? '✅ 已完成' : '⏳ 进行中'} | 
                        ${formatLocalTime(batch.created_at)}
                        ${batch.status !== 'completed' && batch.completed_count < batch.total_count ? '<button onclick="event.stopPropagation(); continueBatch(' + batch.id + ')" style="margin-left: 10px; padding: 2px 8px; background: rgba(76,175,80,0.8); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 10px;">继续分析</button>' : ''}
                    </div>
                </div>
            `).join('');
        }

        async function renameBatch(batchId, currentName) {
            const newName = prompt('请输入新的批次名称（批次编号不可修改）：', currentName);
            if (!newName || newName.trim() === currentName) return;
            try {
                const resp = await fetch(`/api/batch/${batchId}/rename`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName.trim() })
                });
                const data = await resp.json();
                if (resp.status === 409) { alert('批次名称已存在，请使用其他名称'); return; }
                if (!data.success) { alert('重命名失败'); return; }
                loadBatchList();
            } catch (e) { alert('重命名失败: ' + e.message); }
        }

        async function pinBatch(batchId) {
            try {
                const resp = await fetch(`/api/batch/${batchId}/pin`, { method: 'PATCH' });
                const data = await resp.json();
                if (data.success) loadBatchList();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        async function loadBatchStocks(batchId) {
            currentBatchId = batchId;
            document.getElementById('addStockToBatchBtn').disabled = false;
            renderBatchList(await (await fetch('/api/batches')).json().then(d => d.data));
            
            try {
                const response = await fetch(`/api/batch/${batchId}/stocks`);
                const data = await response.json();
                if (data.success) {
                    renderBatchStocks(data.data);
                }
            } catch (error) {
                console.error('加载批次股票失败:', error);
            }
        }

        function renderBatchStocks(stocks) {
            const table = document.getElementById('stockResultTable');
            const tbody = document.getElementById('stockResultList');
            const empty = document.getElementById('stockResultEmpty');
            const sortBar = document.getElementById('sortBar');
            
            if (stocks.length === 0) {
                table.style.display = 'none';
                empty.style.display = 'block';
                empty.textContent = '暂无股票记录';
                sortBar.style.display = 'none';
                currentBatchStocks = [];
                return;
            }
            
            table.style.display = 'table';
            empty.style.display = 'none';
            sortBar.style.display = 'flex';
            
            currentBatchStocks = stocks;
            
            // 如果有排序状态，应用排序
            if (currentSortField && currentSortOrder) {
                let sorted = [...stocks];
                sorted.sort((a, b) => {
                    const va = getSortValue(a, currentSortField);
                    const vb = getSortValue(b, currentSortField);
                    return currentSortOrder === 'asc' ? va - vb : vb - va;
                });
                renderBatchStocksInner(sorted);
            } else {
                renderBatchStocksInner(stocks);
            }
        }

        function renderBatchStocksInner(stocks) {
            const tbody = document.getElementById('stockResultList');
            
            window.stockPrompts = {};
            
            const truncate = (text, len = 50) => {
                if (!text) return '-';
                return text.length > len ? text.substring(0, len) + '...' : text;
            };
            
            tbody.innerHTML = stocks.map((stock, idx) => {
                const stockKey = `stock_${idx}`;
                window.stockPrompts[stockKey] = { name: stock.stock_name, stock_id: stock.id, data_issues: stock.data_issues || '' };

                const dbtn = (label, onclick, cls) => `<button class="dim-btn ${cls}" onclick="${onclick}">${label}</button>`;
                const dimCell = (key, label) => {
                    const score = stock[`${key}_score`];
                    const deep = stock[`${key}_deep_score`];
                    const hasPrescreening = key === 'c' || key === 'a';
                    if (!score && !deep) return `<div class="data-metric">
                        <span class="dm-label">${label}</span>
                        <span class="dm-value empty">-</span>
                    </div>`;
                    return `<div class="data-metric">
                        <span class="dm-label">${label}: ${score||''}${deep ? `<span style="color:#ff6b6b">${score ? '/' : ''}${deep}</span>` : ''}</span>
                        <div class="dm-actions" style="flex-wrap:wrap;">
                            ${hasPrescreening && score ? dbtn('初筛', `showPrompt('${stockKey}','${key}','${label}')`, 'primary') : ''}
                            ${hasPrescreening && score ? dbtn('初筛词', `showPrompt('${stockKey}','${key}_score_prompt','${label}')`, 'success') : ''}
                            ${deep ? '<div style="width:100%"></div>' : ''}
                            ${deep ? dbtn('深度', `showPrompt('${stockKey}','${key}_deep','${label}')`, 'danger') : ''}
                            ${deep ? dbtn('深度词', `showPrompt('${stockKey}','${key}_deep_score_prompt','${label}')`, 'success') : ''}
                        </div>
                    </div>`;
                };

                const nameCell = (rowspan) => `<td class="stock-name-cell" rowspan="${rowspan}">
                    <div class="sname">${stock.stock_name.replace(/ *\(.*\)$/, '')}</div>
                    <div class="scode">${(stockList.find(s => s.name === stock.stock_name.replace(/ *\(.*\)$/, '')) || {}).code || stock.stock_code}</div>
                    <div class="stime">${formatLocalTime(stock.completed_at || stock.created_at)}</div>
                    <button class="sbtn" onclick="showHistory('${stock.stock_name}')">CAN SLIM历史</button>
                </td>`;
                const checkCell = (rowspan) => `<td class="stock-check-cell" rowspan="${rowspan}">
                    <input type="checkbox" class="stock-checkbox" data-stock-id="${stock.id}" onchange="updateBatchSelection()" style="cursor:pointer;">
                </td>`;

                const klineMetric = (label, scoreVal, resultKey, promptKey) => {
                    if (!scoreVal) return `<div class="data-metric">
                        <span class="dm-label">${label}</span>
                        <span class="dm-value empty">-</span>
                    </div>`;
                    return `<div class="data-metric" style="min-width:100px;">
                        <span class="dm-label">${label}</span>
                        <span class="dm-value" style="color:#667eea;">${scoreVal}</span>
                        <div class="dm-actions">
                            ${dbtn('结果', `showPrompt('${stockKey}','${resultKey}','K线(${label})')`, 'primary')}
                            ${dbtn('提示词', `showPrompt('${stockKey}','${promptKey}','K线(${label})')`, 'success')}
                        </div>
                    </div>`;
                };

                const changePctClass = stock.change_pct == null ? 'empty' : stock.change_pct >= 0 ? 'positive' : 'negative';
                const changePctVal = stock.change_pct != null ? stock.change_pct + '%' : '-';

                const row1 = `<tr class="stock-group-row row-change">
                    ${checkCell(3)}
                    ${nameCell(3)}
                    <td class="data-row"><div class="data-section">
                        <span class="data-section-label">📈 涨跌幅</span>
                        <div class="data-section-items">
                            <div class="data-metric"><span class="dm-label">120天最高距今涨跌幅</span><span class="dm-value ${changePctClass}">${changePctVal}</span></div>

        async function showPrompt(stockKey, dimKey, dimName, overrideType) {
            const promptData = window.stockPrompts[stockKey];
            if (!promptData) return;
            
            let prompt = promptData[dimKey + (overrideType || '')];
            
            // 所有提示词和回复内容按需从后端获取
            if (prompt === undefined) {
                let type, dim;
                if (overrideType) {
                    type = overrideType; dim = dimKey;
                } else if (dimKey.endsWith('_deep_score_prompt')) { type = 'deep'; dim = dimKey.replace('_deep_score_prompt', ''); }
                else if (dimKey.endsWith('_score_prompt')) { type = 'score'; dim = dimKey.replace('_score_prompt', ''); }
                else if (dimKey.endsWith('_deep')) { type = 'deep_prompt'; dim = dimKey.replace('_deep', ''); }
                else if (dimKey === 'kline_hold') { type = 'prompt'; dim = 'kline_hold'; }
                else { type = 'prompt'; dim = dimKey; }
                try {
                    const resp = await fetch(`/api/batch/stock/${promptData.stock_id}/prompt?dim=${dim}&type=${type}`);
                    const result = await resp.json();
                    prompt = result.data;
                    promptData[dimKey + (overrideType || '')] = prompt; // 缓存
                } catch (e) {
                    alert('获取内容失败: ' + e.message);
                    return;
                }
            }
            
            if (!prompt) return;
            
            document.getElementById('modalTitle').innerHTML = `
                ${promptData.name} - ${dimName}维度打分详情
                <button onclick="copyPromptContent()" style="margin-left: 20px; padding: 8px 16px; background: rgba(76,175,80,0.85); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px;">📋 复制内容</button>
            `;
            
            // 存储当前提示词内容供复制使用
            window.currentPromptContent = prompt;
            
            let content = '';
            const cleanPrompt = prompt.trim();
            
            // 判断是否为JSON格式
            if (cleanPrompt.startsWith('{') || cleanPrompt.startsWith('```json')) {
                let jsonStr = cleanPrompt;
                if (cleanPrompt.startsWith('```')) {
                    jsonStr = cleanPrompt.replace(/^```(?:json)?\s*\n/, '').replace(/\n```\s*$/, '').trim();
                }
                
                try {
                    const jsonData = JSON.parse(jsonStr);
                    const mdContent = jsonData.content || jsonData.summary || jsonData.analysis || '';
                    const dataIssues = jsonData.data_issues || '';
                    if (mdContent) {
                        const formattedJson = JSON.stringify({...jsonData, content: undefined, summary: undefined, analysis: undefined, data_issues: undefined}, null, 2).replace(/,?\s*"(content|summary|analysis|data_issues)":\s*null/g, '');
                        content = `<pre style="background: rgba(0,0,0,0.04); padding: 10px; border-radius: 10px; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; margin-bottom:12px;">${formattedJson}</pre>`
                                + `<div class="markdown-body">${marked.parse(mdContent)}</div>`;
                        if (dataIssues && dataIssues !== '无') {
                            content += `<div style="margin-top:16px; border:1px solid rgba(255,152,0,0.3); border-radius:12px; padding:15px; background:rgba(255,248,225,0.5);">
                                <h4 style="margin:0 0 10px 0; color:#e65100; font-size:14px;">⚠️ 数据质量反馈</h4>
                                <div class="markdown-body">${marked.parse(dataIssues)}</div>
                            </div>`;
                        }
                    } else {
                        const formattedJson = JSON.stringify(jsonData, null, 2);
                        content = `<pre style="background: rgba(0,0,0,0.04); padding: 15px; border-radius: 10px; overflow-x: auto; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;">${formattedJson}</pre>`;
                    }
                } catch (e) {
                    content = `<pre style="white-space: pre-wrap; word-wrap: break-word; font-size: 12px; line-height: 1.6;">${prompt}</pre>`;
                }
            } else {
                // 文本格式显示
                content = `<div class="markdown-body">${marked.parse(cleanPrompt)}</div>`;
            }
            
            // 追加数据质量反馈（仅K线结果弹窗底部）
            if ((dimKey === 'kline' || dimKey === 'kline_hold') && !overrideType) {
                const issuesText = promptData.data_issues;
                if (issuesText && issuesText !== '无') {
                    content += `<div style="margin-top:16px; border:1px solid rgba(255,152,0,0.3); border-radius:12px; padding:15px; background:rgba(255,248,225,0.5);">
                        <h4 style="margin:0 0 10px 0; color:#e65100; font-size:14px;">⚠️ 数据质量反馈</h4>
                        <div class="markdown-body">${marked.parse(issuesText)}</div>
                    </div>`;
                }
            }

            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('detailModal').classList.add('show');
        }
