<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>批量分析 - AI Stock Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes bannerPulse {
            0%, 100% { background: rgba(240,173,78,0.18); }
            50% { background: rgba(240,173,78,0.38); }
        }
        @keyframes iconSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes progressStripe {
            0% { background-position: 0 0; }
            100% { background-position: 30px 0; }
        }
        @keyframes dotBlink {
            0%, 20% { opacity: 0; }
            40% { opacity: 1; }
        }
        .banner-running {
            animation: bannerPulse 2s ease-in-out infinite;
            border: 1px solid rgba(240,173,78,0.4) !important;
        }
        .banner-running .job-icon {
            display: inline-block;
            animation: iconSpin 1.2s linear infinite;
        }
        .job-progress-bar {
            display: none;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            overflow: hidden;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .banner-running .job-progress-bar {
            display: block;
        }
        .job-progress-fill {
            height: 100%;
            border-radius: 2px;
            background: repeating-linear-gradient(
                -45deg,
                rgba(255,255,255,0.7),
                rgba(255,255,255,0.7) 4px,
                rgba(255,255,255,0.4) 4px,
                rgba(255,255,255,0.4) 8px
            );
            background-size: 30px 30px;
            animation: progressStripe 0.8s linear infinite;
            transition: width 0.5s ease;
        }
        .job-elapsed {
            display: none;
            font-size: 9px;
            opacity: 0.7;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .banner-running .job-elapsed {
            display: inline;
        }
        .job-dots::after {
            content: '';
            display: inline;
        }
        .banner-running .job-dots::after {
            content: '...';
            animation: dotBlink 1.5s steps(1) infinite;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8ecf4 0%, #d5dbe8 25%, #c9d6f0 50%, #ddd5ee 75%, #e8ecf4 100%);
            background-attachment: fixed;
            padding: 0;
            min-height: 100vh;
            color: #1d1d1f;
        }
        .header {
            background: rgba(102, 126, 234, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: white;
            padding: 10px 16px;
            border-radius: 0;
            margin-bottom: 0;
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .header h1 {
            font-size: 14px;
            margin: 0;
            font-weight: 600;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 8px;
            transition: grid-template-columns 0.3s;
            min-height: calc(100vh - 42px);
        }
        .container.sidebar-collapsed {
            grid-template-columns: 0px 1fr;
            gap: 0;
        }
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            transition: opacity 0.3s;
            min-width: 0;
        }
        .container.sidebar-collapsed .left-column {
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-toggle {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            width: 20px;
            height: 60px;
            background: rgba(102, 126, 234, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            transition: left 0.3s, width 0.15s;
            border: 1px solid rgba(255,255,255,0.2);
            border-left: none;
        }
        .sidebar-toggle:hover {
            width: 24px;
            background: rgba(102, 126, 234, 0.85);
        }
        .panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .stock-list {
            max-height: 125px;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.45);
        }
        .stock-item {
            padding: 4px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            transition: background 0.15s;
        }
        .stock-item:hover { background: rgba(102, 126, 234, 0.08); }
        .stock-item input[type="checkbox"] { cursor: pointer; }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            margin: 5px 2px 0 0;
            font-size: 11px;
            transition: all 0.15s;
        }
        .btn-primary { background: rgba(102, 126, 234, 0.85); }
        .btn-primary:hover { background: rgba(102, 126, 234, 1); }
        .btn-success { background: rgba(76, 175, 80, 0.85); }
        .btn-success:hover { background: rgba(76, 175, 80, 1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, rgba(102,126,234,0.9) 0%, rgba(118,75,162,0.9) 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .batch-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .panel.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 998;
            border-radius: 0;
            overflow-y: auto;
            max-height: none;
        }
        .panel.fullscreen .batch-list,
        .panel.fullscreen > div[style*="max-height"] {
            max-height: calc(100vh - 80px) !important;
        }
        .panel.fullscreen #stockResultTable {
            min-width: unset;
            width: 100%;
            table-layout: fixed;
        }
        .panel.fullscreen #stockResultTable th,
        .panel.fullscreen #stockResultTable td {
            min-width: unset;
            max-width: unset;
        }
        .panel.fullscreen #stockResultTable th:first-child,
        .panel.fullscreen #stockResultTable td:first-child {
            min-width: 20px;
            width: 36px;
        }
        .fullscreen-btn {
            padding: 5px 10px;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin: 5px 2px 0 0;
            transition: all 0.15s;
        }
        .fullscreen-btn:hover { background: rgba(102, 126, 234, 1); }
        .batch-item {
            padding: 6px;
            margin: 4px 0;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.35);
            transition: all 0.15s;
        }
        .batch-item:hover { border-color: rgba(102, 126, 234, 0.3); background: rgba(102, 126, 234, 0.06); }
        .batch-item.active { border-color: rgba(102, 126, 234, 0.4); background: rgba(102, 126, 234, 0.08); }
        .stock-result-list {
            max-height: 600px;
            overflow-y: auto;
        }
        .stock-result-item {
            padding: 5px;
            margin: 3px 0;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }
        .stock-result-item:hover { background: rgba(102, 126, 234, 0.06); }
        .score { font-weight: 600; color: #667eea; }

        /* 批次股票表格美化 */
        #stockResultTable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        #stockResultTable thead tr {
            background: linear-gradient(135deg, rgba(102,126,234,0.12) 0%, rgba(118,75,162,0.08) 100%);
        }
        #stockResultTable thead th {
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #48484a;
            border-bottom: 2px solid rgba(102,126,234,0.2);
            letter-spacing: 0.3px;
        }
        .stock-group-row td {
            border-top: 1px solid rgba(102,126,234,0.12);
        }
        .stock-group-row:first-child td {
            border-top: none;
        }
        .stock-name-cell {
            padding: 8px 6px;
            position: sticky;
            left: 36px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5;
            vertical-align: top;
            max-width: 90px;
        }
        .stock-check-cell {
            padding: 8px 4px;
            text-align: center;
            position: sticky;
            left: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5;
            vertical-align: top;
            width: 36px;
        }
        .stock-name-cell .sname {
            font-weight: 700;
            font-size: 13px;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .stock-name-cell .scode {
            font-size: 10px;
            color: #667eea;
            font-weight: 500;
            white-space: nowrap;
            margin-top: 1px;
        }
        .stock-name-cell .stime {
            font-size: 9px;
            color: #aeaeb2;
            white-space: nowrap;
            margin-top: 2px;
        }
        .stock-name-cell .sbtn {
            margin-top: 4px;
            padding: 4px 0;
            background: linear-gradient(135deg, rgba(96,125,139,0.7), rgba(96,125,139,0.9));
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.15s;
            display: block;
            width: 100%;
            text-align: center;
            line-height: 1.4;
        }
        .stock-name-cell .sbtn:hover {
            background: linear-gradient(135deg, rgba(96,125,139,0.9), rgba(96,125,139,1));
            transform: translateY(-1px);
        }
        .data-row td {
            padding: 0;
        }
        .data-section {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 0;
            font-size: 11px;
        }
        .data-section-label {
            font-weight: 600;
            color: #636366;
            white-space: nowrap;
            margin-right: 10px;
            font-size: 11px;
            min-width: 70px;
        }
        .data-section-items {
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: wrap;
        }
        .data-metric {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 68px;
            padding: 3px 8px;
            border-right: 1px solid rgba(0,0,0,0.05);
        }
        .data-metric:last-child { border-right: none; }
        .data-metric .dm-label {
            font-size: 9px;
            color: #8e8e93;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .data-metric .dm-value {
            font-weight: 600;
            color: #1d1d1f;
            font-size: 12px;
            margin-top: 1px;
        }
        .data-metric .dm-value.positive { color: #e53935; }
        .data-metric .dm-value.negative { color: #2e7d32; }
        .data-metric .dm-value.empty { color: #c7c7cc; font-weight: 400; }
        .data-metric .dm-actions {
            display: flex;
            gap: 3px;
            margin-top: 2px;
        }
        .dim-btn {
            padding: 2px 7px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.12s;
        }
        .dim-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .dim-btn.primary { background: #667eea; }
        .dim-btn.danger { background: #ff6b6b; }
        .dim-btn.success { background: #4caf50; }
        .row-change { background: rgba(255,248,225,0.5); }
        .row-kline { background: rgba(237,233,254,0.45); }
        .row-canslim { background: rgba(232,240,254,0.45); }
        .row-canslim .data-metric { min-width: 80px; padding: 5px 10px; }
        .row-canslim .data-section-items { flex-wrap: nowrap; }
        .row-canslim .dm-label { font-size: 13px; font-weight: 600; }
        .row-canslim .dm-value { font-size: 20px; }
        .row-canslim .dim-btn, .row-kline .dim-btn { padding: 4px 10px; font-size: 11px; }
        .sort-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 8px 0;
            align-items: center;
        }
        .sort-bar-label {
            font-size: 11px;
            color: #636366;
            font-weight: 600;
            margin-right: 4px;
        }
        .sort-btn {
            padding: 3px 10px;
            border: 1px solid rgba(102,126,234,0.25);
            border-radius: 6px;
            background: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            color: #48484a;
            transition: all 0.15s;
            user-select: none;
        }
        .sort-btn:hover { border-color: rgba(102,126,234,0.5); background: rgba(102,126,234,0.06); }
        .sort-btn.active { border-color: rgba(102,126,234,0.6); background: rgba(102,126,234,0.12); color: #667eea; font-weight: 600; }
        .sort-btn .sort-arrow { margin-left: 3px; font-size: 10px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 16px;
            padding: 30px;
            max-width: 90%;
            width: 1400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12), 0 0 1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }
        .prompt-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .prompt-section {
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
        }
        .prompt-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #667eea;
        }
        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .result-section {
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.4);
        }
        .result-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #667eea;
        }
        .close-btn {
            position: sticky;
            top: 0;
            float: right;
            margin-left: auto;
            width: 30px;
            height: 30px;
            border: none;
            background: rgba(255, 59, 48, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.15s;
        }
        .close-btn:hover {
            background: rgba(255, 59, 48, 1);
        }
        .markdown-body { line-height: 1.6; font-size: 14px; }
        .markdown-body h2 { color: #667eea; margin-top: 20px; }
        .progress-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .progress-modal.show { display: flex; }
        .progress-modal-content {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 16px;
            padding: 30px;
            width: 500px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12), 0 0 1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .progress-modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        .progress-modal-bar {
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            overflow: visible;
            margin-bottom: 15px;
            position: relative;
        }
        .progress-modal-fill {
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
            transition: width 0.3s;
            border-radius: 12px;
        }
        .progress-modal-text {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .progress-modal-info {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        .overlay-disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header" style="display: grid; grid-template-columns: auto 1fr 1fr; grid-template-rows: auto auto auto; gap: 4px 8px; align-items: center;">
        <h1 style="grid-row: 1 / 4;">📊 批量股票分析</h1>
        <div id="klineJobBanner" style="
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            position: relative;
        ">
            <span id="klineJobIcon" class="job-icon" style="font-size: 12px; flex-shrink: 0;">⏳</span>
            <span id="klineJobText" style="overflow: hidden; text-overflow: ellipsis;">日线数据状态加载中<span class="job-dots"></span></span>
            <span id="klineJobElapsed" class="job-elapsed"></span>
            <button onclick="triggerJob('kline')" style="flex-shrink:0;margin-left:auto;padding:2px 6px;background:rgba(255,255,255,0.3);border:none;border-radius:4px;color:white;cursor:pointer;font-size:10px;" title="手动执行">▶</button>
            <a href="/scheduler_logs?job_name=日线数据" style="flex-shrink:0;padding:2px 6px;background:rgba(255,255,255,0.3);border-radius:4px;color:white;font-size:10px;text-decoration:none;" title="执行记录">📋</a>
            <div class="job-progress-bar"><div id="klineJobProgress" class="job-progress-fill" style="width:0%"></div></div>
        </div>
        <div id="priceJobBanner" style="
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            position: relative;
        ">
            <span id="priceJobIcon" class="job-icon" style="font-size: 12px; flex-shrink: 0;">⏳</span>

    <script>
        marked.use({ breaks: true });
        let stockList = [];
        let selectedStocks = new Set();
        let selectedStockKeys = new Set(); // 存储选中的股票key
        let currentBatchId = null;
        let batchSelectedStockIds = new Set(); // CAN SLIM深度分析选中的股票ID

        function formatLocalTime(utcStr) {
            if (!utcStr) return '-';
            const s = utcStr.trim();
            // datetime.now().isoformat() 格式含T且含微秒，是本地时间，直接截取显示
            if (s.includes('T') && s.includes('.')) return s.slice(0, 16).replace('T', ' ');
            // MySQL CURRENT_TIMESTAMP 格式: "2024-01-01 12:00:00" (UTC)
            const d = new Date(s.replace(' ', 'T') + (s.includes('+') || s.endsWith('Z') ? '' : 'Z'));
            if (isNaN(d)) return s.slice(0, 16).replace('T', ' ');
            return d.getFullYear() + '-' +
                String(d.getMonth()+1).padStart(2,'0') + '-' +
                String(d.getDate()).padStart(2,'0') + ' ' +
                String(d.getHours()).padStart(2,'0') + ':' +
                String(d.getMinutes()).padStart(2,'0');
        }

        async function loadStockList() {
            try {
                const response = await fetch('/api/stock_list');
                const data = await response.json();
                if (data.success) {
                    stockList = data.data;
                    renderStockList();
                }
            } catch (error) {
                console.error('加载股票列表失败:', error);
            }
        }

        function renderStockList() {
            const container = document.getElementById('stockList');
            const searchTerm = document.getElementById('stockSearch').value.toLowerCase();
            
            const filteredStocks = stockList.filter(stock => 
                stock.name.toLowerCase().includes(searchTerm) || 
                stock.code.toLowerCase().includes(searchTerm)
            );
            
            // 按选中状态排序：选中的在前
            const sortedStocks = filteredStocks.sort((a, b) => {
                const aKey = `${a.name} (${a.code})`;
                const bKey = `${b.name} (${b.code})`;
                const aSelected = selectedStockKeys.has(aKey);
                const bSelected = selectedStockKeys.has(bKey);
                if (aSelected && !bSelected) return -1;
                if (!aSelected && bSelected) return 1;
                return 0;
            });
            
            if (sortedStocks.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">没有找到匹配的股票</p>';
                return;
            }
            
            container.innerHTML = sortedStocks.map((stock) => {
                const originalIndex = stockList.indexOf(stock);
                const stockKey = `${stock.name} (${stock.code})`;
                const isChecked = selectedStockKeys.has(stockKey);
                return `
                <div class="stock-item">
                    <input type="checkbox" id="stock_${originalIndex}" ${isChecked ? 'checked' : ''} onchange="updateSelection()">
                    <label for="stock_${originalIndex}" style="cursor: pointer; flex: 1;">
                        ${stock.name} (${stock.code}) - 打分：${stock.score}
                    </label>
                </div>
                `;
            }).join('');
        }

        function filterStocks() {
            renderStockList();
        }

        function fuzzyMatchStock(term) {
            const t = term.trim().toLowerCase();
            if (!t) return null;
            // 精确匹配优先
            let match = stockList.find(s => s.name.toLowerCase() === t || s.code.toLowerCase() === t);
            if (match) return match;
            // 包含匹配
            const contains = stockList.filter(s => s.name.toLowerCase().includes(t) || s.code.toLowerCase().includes(t));
            if (contains.length === 1) return contains[0];
            if (contains.length > 1) {
                // 优先名称以该词开头
                const startsWith = contains.find(s => s.name.toLowerCase().startsWith(t));
                return startsWith || contains[0];
            }
            return null;
        }

        function selectStockTerms(terms) {
            const notFound = [];
            terms.forEach(term => {
                const match = fuzzyMatchStock(term);
                if (match) {
                    const stockKey = `${match.name} (${match.code})`;
                    selectedStockKeys.add(stockKey);
                    selectedStocks.add(stockKey);
                } else {
                    notFound.push(term);
                }
            });
            document.getElementById('selectedCount').textContent = selectedStocks.size;
            document.getElementById('prescreeningCount').textContent = selectedStocks.size;
            document.getElementById('canslimCount').textContent = selectedStocks.size;
            document.getElementById('stockSearch').value = '';
            renderStockList();
            if (notFound.length) alert(`以下股票未找到：\n${notFound.join('、')}`);
        }

        function handleStockSearchEnter(event) {
            if (event.key !== 'Enter') return;
            const raw = document.getElementById('stockSearch').value.trim();
            if (!raw) return;
            const terms = raw.split(/[,，、;;。\s]+/).filter(Boolean);
            if (terms.length === 1) {
                // 单个词：仍支持实时搜索过滤，回车选中
                selectStockTerms(terms);
            } else {
                selectStockTerms(terms);
            }
        }

        function handleStockPaste(event) {
            const text = (event.clipboardData || window.clipboardData).getData('text');
            if (!text) return;
            const terms = text.split(/[,，、;;。\s]+/).filter(Boolean);
            if (terms.length <= 1) return;
            event.preventDefault();
            document.getElementById('stockSearch').value = terms.join('，');
        }

        function updateSelection() {
            stockList.forEach((stock, index) => {
                const checkbox = document.getElementById(`stock_${index}`);
                if (checkbox) {
                    const stockKey = `${stock.name} (${stock.code})`;
                    if (checkbox.checked) {
                        selectedStockKeys.add(stockKey);
                    } else {
                        selectedStockKeys.delete(stockKey);
                    }
                }
            });
            selectedStocks.clear();
            selectedStockKeys.forEach(key => selectedStocks.add(key));
            document.getElementById('selectedCount').textContent = selectedStocks.size;
            document.getElementById('prescreeningCount').textContent = selectedStocks.size;
            document.getElementById('canslimCount').textContent = selectedStocks.size;
            document.getElementById('stockSearch').value = '';
            renderStockList();
        }

        function selectAll() {
            stockList.forEach((stock, index) => {
                const stockKey = `${stock.name} (${stock.code})`;
                selectedStockKeys.add(stockKey);
            });
            renderStockList();
            updateSelection();
        }

        function deselectAll() {
            selectedStockKeys.clear();
            renderStockList();
            updateSelection();
        }

        async function startBatchAnalysis() {
            if (selectedStocks.size === 0) {
                alert('请至少选择一只股票');
                return;
            }

            // 显示进度弹框并禁用界面
            showProgressModal();
            disableUI();

            try {
                // 创建批次
                const response = await fetch('/api/batch_analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_codes: Array.from(selectedStocks) })
                });
                const data = await response.json();
                
                if (data.success) {
                    const batchId = data.data.batch_id;
                    
                    // 执行批量分析
                    await executeBatchAnalysis(batchId, false);
                    
                    // 刷新批次列表
                    loadBatchList();
                }
            } catch (error) {
                alert('批量分析失败: ' + error.message);
            } finally {
                hideProgressModal();
                enableUI();
            }
        }

        async function executeBatchAnalysis(batchId, useDeepThinking = false) {
            return new Promise((resolve, reject) => {
                const url = `/api/batch_execute/${batchId}${useDeepThinking ? '?deep_thinking=true' : ''}`;
                const eventSource = new EventSource(url);
                
                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.stage === 'start') {
                            updateProgressModal(data.completed, data.total, '开始分析...');
                        } else if (data.stage === 'progress') {
                            const info = data.error 
                                ? `❌ ${data.stock_name} 分析失败` 
                                : `✅ ${data.stock_name} 完成 (得分: ${data.score})`;
                            updateProgressModal(data.completed, data.total, info);
                        } else if (data.stage === 'done') {
                            eventSource.close();
                            updateProgressModal(data.completed || 100, data.total || 100, '✅ 全部完成！');
                            resolve();
                        } else if (data.stage === 'error') {
                            eventSource.close();
                            updateProgressModal(0, 100, '❌ 执行失败: ' + data.message);
                            reject(new Error(data.message));
                        }
                    } catch (e) {
                        console.error('解析事件失败:', e);
                    }
                };
                
                eventSource.onerror = () => {
                    eventSource.close();
                    reject(new Error('连接失败'));
                };
            });
        }

        async function loadBatchList() {

        async function renameBatch(batchId, currentName) {
            const newName = prompt('请输入新的批次名称（批次编号不可修改）：', currentName);
            if (!newName || newName.trim() === currentName) return;
            try {
                const resp = await fetch(`/api/batch/${batchId}/rename`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName.trim() })
                });
                const data = await resp.json();
                if (resp.status === 409) { alert('批次名称已存在，请使用其他名称'); return; }
                if (!data.success) { alert('重命名失败'); return; }
                loadBatchList();
            } catch (e) { alert('重命名失败: ' + e.message); }
        }

        async function pinBatch(batchId) {
            try {
                const resp = await fetch(`/api/batch/${batchId}/pin`, { method: 'PATCH' });
                const data = await resp.json();
                if (data.success) loadBatchList();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        async function toggleContinuousAnalysis(batchId) {
            try {
                const resp = await fetch(`/api/batch/${batchId}/continuous_analysis`, { method: 'PATCH' });
                const data = await resp.json();
                if (data.success) loadBatchList();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        async function loadBatchStocks(batchId) {
            currentBatchId = batchId;
            document.getElementById('addStockToBatchBtn').disabled = false;
            const batchesData = await (await fetch('/api/batches')).json().then(d => d.data);
            renderBatchList(batchesData);
            // 更新标题中的批次名称和更新时间
            const currentBatch = batchesData.find(b => b.id === batchId);
            const label = document.getElementById('batchNameLabel');
            if (currentBatch) {
                const updatedAt = currentBatch.last_updated_at ? `\n更新: ${formatLocalTime(currentBatch.last_updated_at)}` : '';
                label.innerText = `${currentBatch.batch_name}${updatedAt}`;
            } else {
                label.textContent = '';
            }
            
            try {
                const [stocksResp, finGrowthResp] = await Promise.all([
                    fetch(`/api/batch/${batchId}/stocks`),
                    fetch(`/api/batch/${batchId}/finance_growth`).catch(() => null)
                ]);
                const data = await stocksResp.json();
                let finGrowthData = {};
                if (finGrowthResp && finGrowthResp.ok) {
                    const fg = await finGrowthResp.json();
                    if (fg.success) finGrowthData = fg.data;
                }
                if (data.success) {
                    // 将财报增长数据注入到每只股票
                    for (const stock of data.data) {
                        const name = (stock.stock_name || '').replace(/ *\(.*\)$/, '');
                        stock.finance_growth = finGrowthData[name] || [];
                    }
                    renderBatchStocks(data.data);
                }
            } catch (error) {
                console.error('加载批次股票失败:', error);
            }
        }

        async function showFinanceData(stockCode, stockName) {
            document.getElementById('financeModalTitle').textContent = `📋 ${stockName}（${stockCode}）- 财报数据`;
            document.getElementById('financeModalContent').innerHTML = '<p style="text-align:center;color:#999;padding:30px;">加载中...</p>';
            document.getElementById('financeModal').classList.add('show');
            try {
                const resp = await fetch(`/api/stock/finance/${encodeURIComponent(stockCode)}`);
                const data = await resp.json();
                if (!data.success || !data.data || data.data.length === 0) {
                    document.getElementById('financeModalContent').innerHTML = '<p style="text-align:center;color:#999;padding:30px;">暂无财报数据</p>';
                    return;
                }
                const records = data.data;

                // 解析带中文单位的数值（如 "46.17亿"、"3618.73万"），统一转为元
                const parseCnNum = (v) => {
                    if (v == null || v === '' || v === 'None') return null;
                    const s = String(v).replace(/,/g, '').trim();
                    const m = s.match(/^([+-]?\d+(?:\.\d+)?)\s*(亿|万)?$/);
                    if (!m) { const n = parseFloat(s); return isNaN(n) ? null : n; }
                    let num = parseFloat(m[1]);
                    if (m[2] === '亿') num *= 1e8;
                    else if (m[2] === '万') num *= 1e4;
                    return num;
                };

                // 计算环比：用单季度值，(当期单季-上期单季)/|上期单季|*100，records已按时间倒序
                const calcQoQ = (records, fieldName) => {
                    const result = new Array(records.length).fill(null);
                    for (let i = 0; i < records.length - 1; i++) {
                        const curr = parseCnNum(records[i][fieldName]);
                        const prev = parseCnNum(records[i + 1][fieldName]);
                        if (curr != null && prev != null && prev !== 0) {
                            result[i] = ((curr - prev) / Math.abs(prev)) * 100;
                        }
                    }
                    return result;
                };

                const revenueQoQ = calcQoQ(records, '单季度营业收入(元)');
                const profitQoQ = calcQoQ(records, '单季扣非净利润(元)');

                // 解析普通数值
                const parseNum = (v) => {
                    if (v == null || v === '' || v === 'None') return null;
                    const n = parseFloat(String(v).replace(/,/g, ''));
                    return isNaN(n) ? null : n;
                };

                // 关键增长指标
                const growthCols = [
                    { label: '营收同比', getVal: (r) => parseNum(r['营业总收入同比增长(%)']) },
                    { label: '营收环比', getVal: (r, i) => {
                        const v = parseNum(r['营业总收入环比增长(%)']);
                        return v != null ? v : revenueQoQ[i];
                    }},
                    { label: '扣非同比', getVal: (r) => parseNum(r['扣非净利润同比增长(%)']) },
                    { label: '扣非环比', getVal: (r, i) => {
                        const v = parseNum(r['扣非净利润环比增长(%)']);
                        return v != null ? v : profitQoQ[i];
                    }},
                ];

                // 要隐藏的原始增长字段（已在前面展示）
                const hiddenKeys = new Set([
                    '营业总收入同比增长(%)', '营业总收入环比增长(%)',
                    '扣非净利润同比增长(%)', '扣非净利润环比增长(%)',
                ]);
                const metaKeys = new Set(['报告期', '报告日期']);
                const otherKeys = [];
                records.forEach(r => {
                    Object.keys(r).forEach(k => {
                        if (!metaKeys.has(k) && !hiddenKeys.has(k) && !otherKeys.includes(k)) otherKeys.push(k);
                    });
                });

                const fmtGrowth = (num) => {
                    if (num == null) return '<span style="color:#c7c7cc;">-</span>';
                    const icon = num > 0 ? '▲' : num < 0 ? '▼' : '—';
                    const bg = num > 0 ? 'rgba(229,57,53,0.12)' : num < 0 ? 'rgba(46,125,50,0.12)' : 'rgba(0,0,0,0.04)';
                    const fg = num > 0 ? '#e53935' : num < 0 ? '#2e7d32' : '#8e8e93';
                    const border = num > 0 ? 'rgba(229,57,53,0.3)' : num < 0 ? 'rgba(46,125,50,0.3)' : 'rgba(0,0,0,0.1)';
                    return `<span style="display:inline-block;padding:2px 8px;border-radius:4px;background:${bg};color:${fg};font-weight:700;font-size:12px;border:1px solid ${border};white-space:nowrap;">${icon} ${num.toFixed(2)}%</span>`;
                };

                let html = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
                html += '<thead><tr style="background:rgba(102,126,234,0.1);">';

        async function batchDeepAnalysis() {
            if (batchSelectedStockIds.size === 0) {
                alert('请至少选择一只股票');
                return;
            }

            const useDeepThinking = confirm('是否使用深度思考模式？\n\n点击"确定"使用深度思考模式（更准确但更慢）\n点击"取消"使用普通模式');

            showProgressModal('正在执行CAN SLIM深度分析...');
            disableUI();
            document.getElementById('deepAnalysisStockList').style.display = 'block';

            const stockIds = Array.from(batchSelectedStockIds);
            const total = stockIds.length;

            try {
                const url = `/api/stock/deep_analysis${useDeepThinking ? '?deep_thinking=true' : ''}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(stockIds)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, {stream: true});
                    const lines = buf.split('\n\n');
                    buf = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const evt = JSON.parse(line.slice(6));
                        updateProgressModal(evt.completed_dims, evt.total_dims,
                            `正在分析... ${evt.completed_stocks}/${evt.total_stocks}个股票（${evt.completed_dims}/${evt.total_dims}个维度）`);

                        // 更新股票列表
                        const listEl = document.getElementById('deepAnalysisStockList');
                        const allDims = ['C','A','N','S','L','I','M','overall'];
                        const dimLabel = {C:'季度盈利',A:'年度盈利',N:'新高点',S:'供需',L:'领军股',I:'机构',M:'市场',overall:'整体分析'};
                        listEl.innerHTML = (evt.stocks || []).map(s => {
                            const dimHtml = allDims.map(d => {
                                const st = s.dims[d];
                                const icon = st === 'done' ? '✅' : st === 'running' ? '🔄' : st === 'error' ? '❌' : '⏳';
                                return `<span style="margin:0 3px;font-size:11px;" title="${dimLabel[d]}">${icon}${d === 'overall' ? '整体' : d}</span>`;
                            }).join('');
                            return `<div style="padding:4px 0;border-bottom:1px solid #eee;font-size:12px;">
                                <b>${s.stock_name}</b> ${dimHtml}
                            </div>`;
                        }).join('');

                        if (evt.stage === 'done') break;
                    }
                }

                batchSelectedStockIds.clear();
                document.querySelectorAll('.stock-checkbox').forEach(cb => cb.checked = false);
                document.getElementById('selectAllStocks').checked = false;
                updateBatchSelection();
                if (currentBatchId) await loadBatchStocks(currentBatchId);
            } catch (error) {
                alert('CAN SLIM深度分析失败: ' + error.message);
            } finally {
                document.getElementById('deepAnalysisStockList').style.display = 'none';
                hideProgressModal();
                enableUI();
            }
        }

                return;

            showProgressModal('正在执行K线分析更新...');

                                updateProgressModal(data.completed, data.total, '开始K线分析...');

        async function showHistory(stockName) {
            document.getElementById('historyModalTitle').textContent = stockName + ' - 深度分析历史记录';
            document.getElementById('historyModalTitle').innerHTML = `${stockName} - 深度分析历史记录 <button onclick="clearHistory_dim('${stockName}')" style="margin-left:12px;padding:3px 10px;background:#f44;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">清空记录</button>`;
            document.getElementById('historyModalContent').innerHTML = '加载中...';
            document.getElementById('historyModal').classList.add('show');
            try {
                const resp = await fetch(`/api/stock/history/${encodeURIComponent(stockName)}`);
                const data = await resp.json();
                if (!data.success || data.data.length === 0) {
                    document.getElementById('historyModalContent').innerHTML = '<p style="color:#999;text-align:center;">暂无历史记录</p>';
                    return;
                }
                // 按 execution_id 分组
                const groups = {};
                const groupOrder = [];
                data.data.forEach(r => {
                    const key = r.execution_id || `${r.batch_id}_${r.created_at}`;
                    if (!groups[key]) {
                        groups[key] = { execution_id: key, batch_id: r.batch_id, is_deep_thinking: r.is_deep_thinking, created_at: r.created_at, overall_grade: r.overall_grade, dims: [] };
                        groupOrder.push(key);
                    } else if (r.created_at && r.created_at < groups[key].created_at) {
                        groups[key].created_at = r.created_at;
                    }
                    if (r.overall_grade && !groups[key].overall_grade) groups[key].overall_grade = r.overall_grade;
                    groups[key].dims.push(r);
                });
                groupOrder.sort((a, b) => (groups[b].created_at || '').localeCompare(groups[a].created_at || ''));

        async function executeCanslimPrescreening(batchId) {
            return new Promise((resolve, reject) => {
                const url = `/api/batch_canslim_prescreening/${batchId}`;
                const eventSource = new EventSource(url);
                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.stage === 'start') {
                            updateProgressModal(data.completed, data.total, '开始CAN SLIM初筛...');
                        } else if (data.stage === 'progress') {
                            const info = data.error
                                ? `❌ ${data.stock_name} 失败`
                                : `✅ ${data.stock_name} 完成 (${data.score})`;
                            updateProgressModal(data.completed, data.total, info);
                        } else if (data.stage === 'done') {
                            eventSource.close();
                            updateProgressModal(data.completed, data.total, '✅ CAN SLIM初筛全部完成');
                            resolve();
                        } else if (data.stage === 'error') {
                            eventSource.close();
                            updateProgressModal(0, 100, '❌ 执行失败: ' + data.message);
                            reject(new Error(data.message));
                        }
                    } catch (e) { console.error('解析事件失败:', e); }
                };
                eventSource.onerror = () => { eventSource.close(); reject(new Error('连接失败')); };
            });
        }

        function getCanslimTotal(stock) {
            let sum = 0;
            ['c','a','n','s','l','i','m'].forEach(k => {
                const v = parseFloat(stock[`${k}_score`]);
                if (!isNaN(v)) sum += v;
                const dv = parseFloat(stock[`${k}_deep_score`]);
                if (!isNaN(dv)) sum += dv;
            });
            return sum;
        }

        const GRADE_SCORE_MAP = {
            '积极买入': 95, '逢低建仓': 75, '持股待涨': 60,
            '逢高减仓': 40, '清仓离场': 20, '保持观望': 50
        };

        function getScoreColor(score) {
            if (score == null) return '#c7c7cc';
            if (score >= 70) return '#e53935';
            if (score >= 55) return '#ff9800';
            if (score >= 40) return '#48484a';
            return '#2e7d32';
        }

        function getSortValue(stock, field) {
            if (field === 'canslim_total') return getCanslimTotal(stock);
            if (field === 'kline_total_score') {
                const val = stock.kline_total_score;
                return (val != null && val !== '') ? Number(val) : -Infinity;
            }
            const val = stock[field];
            if (val == null || val === '' || val === '-') return -Infinity;
            if (field === 'kline_score' || field === 'kline_hold_score') {
                const trimmed = String(val).trim();
                return GRADE_SCORE_MAP[trimmed] ?? -Infinity;
            }
            const num = parseFloat(val);
            return isNaN(num) ? -Infinity : num;
        }

        // 格式化已用时间
        function formatElapsed(startTimeISO) {
            if (!startTimeISO) return '';
            const start = new Date(startTimeISO);
            const now = new Date();
            const diff = Math.floor((now - start) / 1000);
            if (diff < 0) return '';
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;
            if (h > 0) return h + '时' + m + '分';
            if (m > 0) return m + '分' + s + '秒';
            return s + '秒';
        }

        // 更新进度条和已用时间
        function updateJobProgress(progressId, elapsedId, done, total, startTime) {
            const bar = document.getElementById(progressId);
            const elapsed = document.getElementById(elapsedId);
            if (bar) {
                const pct = total > 0 ? Math.round((done / total) * 100) : 0;
                bar.style.width = (total > 0 ? pct : 100) + '%';
            }
            if (elapsed && startTime) {
                elapsed.textContent = '⏱' + formatElapsed(startTime);
            }
        }

        // ─── 日线数据拉取状态轮询 ───
        async function pollKlineJobStatus() {
            try {
                const resp = await fetch('/api/kline_job_status');
                const json = await resp.json();
                if (!json.success) return;
                const d = json.data;
                const banner = document.getElementById('klineJobBanner');
                const icon = document.getElementById('klineJobIcon');
                const text = document.getElementById('klineJobText');
                setBannerRunning(banner, d.running);

                if (d.error && !d.running) {
                    icon.textContent = '❌';
                    text.textContent = '日线数据执行异常: ' + d.error;
                    banner.style.background = 'rgba(217,83,79,0.25)';
                } else if (d.running) {
                    const kTotal = d.kline_total || 0;
                    const kDone = (d.kline_success || 0) + (d.kline_failed || 0);
                    const kFail = d.kline_failed || 0;
                    const fTotal = d.finance_total || 0;
                    const fDone = (d.finance_success || 0) + (d.finance_failed || 0);
                    const fFail = d.finance_failed || 0;
                    const totalAll = kTotal + fTotal;
                    const doneAll = kDone + fDone;
                    const failAll = kFail + fFail;
                    const remaining = totalAll - doneAll;
                    const pct = totalAll > 0 ? Math.round((doneAll / totalAll) * 100) : 0;
                    icon.textContent = '🔄';
                    let msg = '日线数据拉取中';
                    if (totalAll > 0) {
                        msg += '  ' + pct + '%  ' + doneAll + '/' + totalAll;
                        if (remaining > 0) msg += '  剩余' + remaining;
                        if (failAll > 0) msg += '  失败' + failAll;
                    }
                    text.textContent = msg;
                    updateJobProgress('klineJobProgress', 'klineJobElapsed', doneAll, totalAll, d.start_time);
                } else if (d.last_run_time) {
                    const today = new Date().toLocaleDateString('sv-SE', {timeZone: 'Asia/Shanghai'});
                    const isToday = d.last_run_date === today;
                    if (isToday) {
                        const kTotal = d.kline_total || 0;
                        const kSuccess = d.kline_success || 0;
                        const kFail = d.kline_failed || 0;
                        const fTotal = d.finance_total || 0;
                        const fSuccess = d.finance_success || 0;
                        const fFail = d.finance_failed || 0;
                        const totalFail = kFail + fFail;
                        let detail = d.last_run_time + ' 拉取完成';
                        detail += '  K线 ' + kSuccess + '/' + kTotal;
                        if (kFail > 0) detail += '(失败' + kFail + ')';
                        detail += '  财报 ' + fSuccess + '/' + fTotal;
                        if (fFail > 0) detail += '(失败' + fFail + ')';
                        if (totalFail === 0) {
                            icon.textContent = '✅';
                            text.textContent = detail;
                            banner.style.background = 'rgba(92,184,92,0.25)';
                        } else {
                            icon.textContent = '⚠️';
                            text.textContent = detail;
                            banner.style.background = 'rgba(217,83,79,0.25)';
                        }
                    } else {
                        icon.textContent = '⏳';
                        text.textContent = '日线数据等待调度中（每个交易日15:05自动执行）  上次执行: ' + d.last_run_time;
                        banner.style.background = 'rgba(255,255,255,0.2)';
                    }
                } else {
                    icon.textContent = '⏳';

        // 自适应轮询：运行中3秒，空闲10秒
        let _anyJobRunning = false;
        async function pollAllJobStatus() {
            const results = await Promise.allSettled([
                pollKlineJobStatus(),

                pollScoreJobStatus(),

                pollDbCheckJobStatus()
            ]);
            // 检测是否有任务在运行
            const banners = ['klineJobBanner','priceJobBanner','scoreJobBanner','klineScoreJobBanner','dbCheckJobBanner'];
            _anyJobRunning = banners.some(id => document.getElementById(id)?.classList.contains('banner-running'));
            // 动态调整轮询间隔
            clearTimeout(_pollTimer);
            _pollTimer = setTimeout(pollAllJobStatus, _anyJobRunning ? 3000 : 10000);

        // ─── 数据异常检测状态轮询 ───
        async function pollDbCheckJobStatus() {
            try {
                const resp = await fetch('/api/db_check_job_status');
                const json = await resp.json();
                if (!json.success) return;
                const d = json.data;
                const banner = document.getElementById('dbCheckJobBanner');
                const icon = document.getElementById('dbCheckJobIcon');
                const text = document.getElementById('dbCheckJobText');
                setBannerRunning(banner, d.running);

                if (d.error && !d.running) {
                    icon.textContent = '❌';
                    text.textContent = '数据异常检测执行异常: ' + d.error;
                    banner.style.background = 'rgba(217,83,79,0.25)';
                } else if (d.running) {
                    const sTotal = d.check_total || 0;
                    const checked = d.check_checked || 0;
                    const anomalies = d.check_anomalies || 0;
                    const repaired = d.check_repaired || 0;
                    const pct = sTotal > 0 ? Math.round((checked / sTotal) * 100) : 0;
                    icon.textContent = '🔄';
                    let msg = '数据异常检测中';
                    if (sTotal > 0) {
                        msg += '  ' + pct + '%  ' + checked + '/' + sTotal;
                        if (anomalies > 0) msg += '  异常' + anomalies;
                        if (repaired > 0) msg += '  修复' + repaired;
                    }
                    text.textContent = msg;
                    updateJobProgress('dbCheckJobProgress', 'dbCheckJobElapsed', checked, sTotal, d.start_time);
                } else if (d.last_run_time) {
                    const today = new Date().toLocaleDateString('sv-SE', {timeZone: 'Asia/Shanghai'});
                    const isToday = d.last_run_date === today;
                    const anomalies = d.check_anomalies || 0;
                    const repaired = d.check_repaired || 0;
                    if (isToday) {
                        if (anomalies === 0) {
                            icon.textContent = '✅';
                            text.textContent = d.last_run_time + ' 数据异常自动检测完成（无异常）';
                            banner.style.background = 'rgba(92,184,92,0.25)';
                        } else {
                            icon.textContent = anomalies === repaired ? '✅' : '⚠️';
                            text.textContent = d.last_run_time + ' 数据异常自动检测完成（异常' + anomalies + ' 修复' + repaired + '）';
                            banner.style.background = anomalies === repaired ? 'rgba(92,184,92,0.25)' : 'rgba(217,83,79,0.25)';
                        }
                    } else {
                        icon.textContent = '⏳';
                        text.textContent = '数据异常检测等待日线完成后自动执行  上次执行: ' + d.last_run_time;
                        banner.style.background = 'rgba(255,255,255,0.2)';
                    }

                    icon.textContent = '⏳';
                    text.textContent = '数据异常检测等待日线完成后自动执行';
                    banner.style.background = 'rgba(255,255,255,0.2)';
                }
            } catch (e) {
                // 静默失败
            }
        }
