<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念板块个股强弱势分析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a 0%,#0d1b2a 100%);padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.header h1{font-size:18px;font-weight:600;color:#fff}
.header a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px}
.header a:hover{color:#fff}
.container{display:flex;height:calc(100vh - 57px)}
.board-panel{width:300px;min-width:260px;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;background:rgba(255,255,255,0.02)}
.search-box{padding:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.search-box input{width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none}
.search-box input:focus{border-color:#667eea}
.board-list{flex:1;overflow-y:auto;padding:6px}
.board-item{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;gap:10px;margin-bottom:2px}
.board-item:hover{background:rgba(102,126,234,0.1)}
.board-item.active{background:rgba(102,126,234,0.2);border:1px solid rgba(102,126,234,0.3)}
.board-item .name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-item .count{font-size:12px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:10px;white-space:nowrap}
/* 右侧分析面板 */
.analysis-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar h2{font-size:16px;font-weight:600;color:#fff}
.toolbar .badge{font-size:12px;color:#667eea;background:rgba(102,126,234,0.15);padding:3px 10px;border-radius:10px}
.toolbar select,.toolbar input[type=text]{padding:6px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.06);color:#e0e6ed;font-size:13px;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:#667eea}
.toolbar .spacer{flex:1}
.toolbar .filter-group{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.6)}
/* 统计摘要 */
.summary-bar{padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;gap:20px;flex-wrap:wrap}
.summary-item{font-size:13px;color:rgba(255,255,255,0.6)}
.summary-item span{color:#fff;font-weight:600;margin-left:4px}
.summary-item .up{color:#f75555}
.summary-item .down{color:#4ecdc4}
/* 表格 */
.table-wrap{flex:1;overflow:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
th{position:sticky;top:0;background:#1a2a3a;padding:10px 12px;text-align:left;font-weight:600;color:rgba(255,255,255,0.7);border-bottom:2px solid rgba(255,255,255,0.1);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#fff}
th.sorted-asc::after{content:" ▲";font-size:10px}
th.sorted-desc::after{content:" ▼";font-size:10px}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap}
tr:hover{background:rgba(102,126,234,0.08)}
.up{color:#f75555}
.down{color:#4ecdc4}
.tag-strong{background:rgba(247,85,85,0.15);color:#f75555;padding:2px 8px;border-radius:4px;font-size:12px}
.tag-neutral{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);padding:2px 8px;border-radius:4px;font-size:12px}
.tag-weak{background:rgba(78,205,196,0.15);color:#4ecdc4;padding:2px 8px;border-radius:4px;font-size:12px}
.score-bar{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-left:6px;min-width:2px;max-width:80px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,0.3);font-size:14px;gap:8px}
.empty-state .icon{font-size:48px;opacity:0.3}
/* 详情弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:#1a2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;width:800px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.modal-head h3{font-size:15px;color:#fff;flex:1}
.modal-head .close-btn{width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-head .close-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.chart-container{width:100%;height:300px;position:relative}
.chart-container canvas{width:100%!important;height:100%!important}
.detail-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:16px}
.detail-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px}
.detail-stat .label{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:4px}
.detail-stat .value{font-size:16px;font-weight:600}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
</style>
</head>
<body>
<div class="header">
    <a href="/">← 首页</a>
    <a href="/concept_board">板块浏览</a>
    <h1>📊 概念板块个股强弱势分析</h1>
</div>
<div class="container">
    <div class="board-panel">
        <div class="search-box">
            <input type="text" id="boardSearch" placeholder="搜索概念板块..." autocomplete="off">
        </div>
        <div class="board-list" id="boardList"></div>
    </div>
    <div class="analysis-panel">
        <div class="toolbar" id="toolbar" style="display:none">
            <h2 id="boardTitle"></h2>
            <span class="badge" id="boardBadge"></span>
            <div class="spacer"></div>
            <div class="filter-group">
                <label>周期</label>
                <select id="daysSelect">
                    <option value="20">20日</option>
                    <option value="40">40日</option>
                    <option value="60" selected>60日</option>
                    <option value="120">120日</option>
                </select>
            </div>
            <div class="filter-group">
                <label>筛选</label>
                <select id="levelFilter">
                    <option value="">全部</option>
                    <option value="强势">强势</option>
                    <option value="中性">中性</option>
                    <option value="弱势">弱势</option>
                </select>
            </div>
            <div class="filter-group">
                <input type="text" id="stockSearch" placeholder="搜索股票..." style="width:140px">
            </div>
        </div>
        <div class="summary-bar" id="summaryBar" style="display:none"></div>
        <div class="table-wrap" id="tableWrap">
            <div class="empty-state"><div class="icon">📊</div><div>请从左侧选择一个概念板块开始分析</div></div>
        </div>
    </div>
</div>
<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-head">
            <h3 id="modalTitle">个股超额收益详情</h3>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>
<script>
let allBoards=[], currentBoard=null, analysisData=null, sortCol='strength_score', sortDir='desc';

async function loadBoards(){
    try{
        const r=await fetch('/api/concept_board/list');
        const j=await r.json();
        if(j.success) {allBoards=j.data; renderBoards(allBoards);}
    }catch(e){console.error(e)}
}

function renderBoards(boards){
    const w=document.getElementById('boardList');
    w.innerHTML='';
    boards.forEach(b=>{
        const d=document.createElement('div');
        d.className='board-item'+(currentBoard&&currentBoard.board_code===b.board_code?' active':'');
        d.innerHTML='<span class="name">'+esc(b.board_name)+'</span><span class="count">'+(b.stock_count||0)+'只</span>';
        d.onclick=()=>selectBoard(b);
        w.appendChild(d);
    });
}

async function selectBoard(board){
    currentBoard=board;
    renderBoards(allBoards.filter(b=>matchBoard(b)));
    document.getElementById('toolbar').style.display='flex';
    document.getElementById('boardTitle').textContent=board.board_name;
    document.getElementById('boardBadge').textContent=board.board_code;
    await loadAnalysis();
}

async function loadAnalysis(){
    if(!currentBoard) return;
    const days=document.getElementById('daysSelect').value;
    document.getElementById('tableWrap').innerHTML='<div class="empty-state">分析中，请稍候...</div>';
    document.getElementById('summaryBar').style.display='none';
    try{
        const r=await fetch(`/api/concept_board/strength?board_code=${currentBoard.board_code}&days=${days}`);
        const j=await r.json();
        if(!j.success){document.getElementById('tableWrap').innerHTML='<div class="empty-state">'+esc(j.error||'分析失败')+'</div>';return;}
        analysisData=j;
        renderSummary(j);
        renderTable(j.stocks);
    }catch(e){
        document.getElementById('tableWrap').innerHTML='<div class="empty-state">请求失败</div>';
    }
}

function renderSummary(data){
    const bar=document.getElementById('summaryBar');
    bar.style.display='flex';
    const bp=data.board_performance;
    const strong=data.stocks.filter(s=>s.strength_level==='强势').length;
    const weak=data.stocks.filter(s=>s.strength_level==='弱势').length;
    const neutral=data.stocks.length-strong-weak;
    bar.innerHTML=
        `<span class="summary-item">分析区间<span>${data.period.start_date} ~ ${data.period.end_date}</span></span>`+
        `<span class="summary-item">交易日<span>${data.period.trade_days}天</span></span>`+
        `<span class="summary-item">板块涨幅<span class="${bp.total_return>=0?'up':'down'}">${bp.total_return>=0?'+':''}${bp.total_return}%</span></span>`+
        `<span class="summary-item">成分股<span>${data.total}只</span></span>`+
        `<span class="summary-item">强势<span class="up">${strong}</span></span>`+
        `<span class="summary-item">中性<span>${neutral}</span></span>`+
        `<span class="summary-item">弱势<span class="down">${weak}</span></span>`;
}

function renderTable(stocks){
    const levelF=document.getElementById('levelFilter').value;
    const kw=document.getElementById('stockSearch').value.trim().toLowerCase();
    let filtered=stocks;
    if(levelF) filtered=filtered.filter(s=>s.strength_level===levelF);
    if(kw) filtered=filtered.filter(s=>s.stock_code.includes(kw)||s.stock_name.toLowerCase().includes(kw));

    // sort
    filtered.sort((a,b)=>{
        let va=a[sortCol],vb=b[sortCol];
        if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
        return sortDir==='asc'?(va-vb):(vb-va);
    });

    const wrap=document.getElementById('tableWrap');
    if(!filtered.length){wrap.innerHTML='<div class="empty-state">无匹配数据</div>';return;}

    const cols=[
        {key:'rank',label:'#',w:'50px'},
        {key:'stock_code',label:'代码',w:'80px'},
        {key:'stock_name',label:'名称',w:'90px'},
        {key:'strength_level',label:'强弱',w:'70px'},
        {key:'strength_score',label:'综合评分',w:'120px'},
        {key:'total_return',label:'区间涨幅%',w:'100px'},
        {key:'excess_5d',label:'5日超额%',w:'90px'},
        {key:'excess_20d',label:'20日超额%',w:'100px'},
        {key:'excess_total',label:'总超额%',w:'100px'},
        {key:'win_rate',label:'胜率',w:'70px'},
    ];

    let html='<table><thead><tr>';
    cols.forEach(c=>{
        let cls='';
        if(c.key===sortCol) cls=sortDir==='asc'?'sorted-asc':'sorted-desc';
        html+=`<th class="${cls}" style="width:${c.w}" onclick="doSort('${c.key}')">${c.label}</th>`;
    });
    html+='</tr></thead><tbody>';

    filtered.forEach(s=>{
        const levelCls=s.strength_level==='强势'?'tag-strong':s.strength_level==='弱势'?'tag-weak':'tag-neutral';
        const retCls=s.total_return>=0?'up':'down';
        const e5Cls=s.excess_5d>=0?'up':'down';
        const e20Cls=s.excess_20d>=0?'up':'down';
        const etCls=s.excess_total>=0?'up':'down';
        const scoreCls=s.strength_score>=0?'up':'down';
        const barW=Math.min(Math.abs(s.strength_score)*2,80);
        const barColor=s.strength_score>=0?'rgba(247,85,85,0.5)':'rgba(78,205,196,0.5)';
        html+=`<tr onclick="showDetail('${s.stock_code}','${esc(s.stock_name)}')" style="cursor:pointer">`+
            `<td>${s.rank}</td>`+
            `<td style="font-family:monospace;color:#667eea">${s.stock_code}</td>`+
            `<td>${esc(s.stock_name)}</td>`+
            `<td><span class="${levelCls}">${s.strength_level}</span></td>`+
            `<td class="${scoreCls}">${s.strength_score>0?'+':''}${s.strength_score}<span class="score-bar" style="width:${barW}px;background:${barColor}"></span></td>`+
            `<td class="${retCls}">${s.total_return>0?'+':''}${s.total_return}%</td>`+
            `<td class="${e5Cls}">${s.excess_5d>0?'+':''}${s.excess_5d}%</td>`+
            `<td class="${e20Cls}">${s.excess_20d>0?'+':''}${s.excess_20d}%</td>`+
            `<td class="${etCls}">${s.excess_total>0?'+':''}${s.excess_total}%</td>`+
            `<td>${(s.win_rate*100).toFixed(1)}%</td>`+
            `</tr>`;
    });
    html+='</tbody></table>';
    wrap.innerHTML=html;
}

function doSort(col){
    if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
    else{sortCol=col;sortDir='desc';}
    if(analysisData) renderTable(analysisData.stocks);
}

async function showDetail(code,name){
    document.getElementById('modalTitle').textContent=code+' '+name+' 超额收益详情';
    document.getElementById('modalBody').innerHTML='<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4)">加载中...</div>';
    document.getElementById('modalOverlay').classList.add('visible');
    try{
        const days=document.getElementById('daysSelect').value;
        const r=await fetch(`/api/concept_board/strength/detail?board_code=${currentBoard.board_code}&stock_code=${code}&days=${days}`);
        const j=await r.json();
        if(!j.success){document.getElementById('modalBody').innerHTML='<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4)">'+esc(j.error||'加载失败')+'</div>';return;}
        renderDetail(j);
    }catch(e){
        document.getElementById('modalBody').innerHTML='<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4)">请求失败</div>';
    }
}

function renderDetail(data){
    const s=data.stock;
    const body=document.getElementById('modalBody');

    // 统计卡片
    let html='<div class="detail-stats">';
    const items=[
        {label:'综合评分',value:s.strength_score,cls:s.strength_score>=0?'up':'down'},
        {label:'强弱分类',value:s.strength_level,cls:s.strength_level==='强势'?'up':s.strength_level==='弱势'?'down':''},
        {label:'区间涨幅',value:(s.total_return>0?'+':'')+s.total_return+'%',cls:s.total_return>=0?'up':'down'},
        {label:'5日超额',value:(s.excess_5d>0?'+':'')+s.excess_5d+'%',cls:s.excess_5d>=0?'up':'down'},
        {label:'20日超额',value:(s.excess_20d>0?'+':'')+s.excess_20d+'%',cls:s.excess_20d>=0?'up':'down'},
        {label:'总超额收益',value:(s.excess_total>0?'+':'')+s.excess_total+'%',cls:s.excess_total>=0?'up':'down'},
        {label:'跑赢天数占比',value:(s.win_rate*100).toFixed(1)+'%',cls:s.win_rate>=0.5?'up':'down'},
        {label:'有效交易日',value:s.trade_days+'天',cls:''},
    ];
    items.forEach(it=>{
        html+=`<div class="detail-stat"><div class="label">${it.label}</div><div class="value ${it.cls}">${it.value}</div></div>`;
    });
    html+='</div>';

    // 超额收益走势图（纯 CSS 柱状图）
    const daily=s.daily_excess||[];
    if(daily.length){
        html+='<div style="margin-top:20px"><div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:8px">每日超额收益走势（个股 - 板块）</div>';
        html+='<div style="display:flex;align-items:end;gap:1px;height:120px;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px;overflow-x:auto">';
        const maxAbs=Math.max(...daily.map(d=>Math.abs(d.excess)),1);
        daily.forEach(d=>{
            const h=Math.max(Math.abs(d.excess)/maxAbs*50,1);
            const color=d.excess>=0?'rgba(247,85,85,0.6)':'rgba(78,205,196,0.6)';
            const title=`${d.date}\n个股: ${d.stock}%\n板块: ${d.board}%\n超额: ${d.excess>0?'+':''}${d.excess}%`;
            html+=`<div title="${title}" style="flex:1;min-width:3px;max-width:8px;height:${h}px;background:${color};border-radius:1px;align-self:${d.excess>=0?'flex-end':'flex-start'}"></div>`;
        });
        html+='</div>';

        // 累计超额收益曲线
        let cumExcess=0;
        const cumData=daily.map(d=>{cumExcess+=d.excess;return{date:d.date,cum:cumExcess};});
        const maxCum=Math.max(...cumData.map(d=>Math.abs(d.cum)),1);
        html+='<div style="font-size:13px;color:rgba(255,255,255,0.6);margin:12px 0 8px">累计超额收益走势</div>';
        html+='<div style="position:relative;height:100px;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px">';
        // zero line
        html+='<div style="position:absolute;left:8px;right:8px;top:50%;border-top:1px dashed rgba(255,255,255,0.1)"></div>';
        // SVG path
        const svgW=cumData.length*4;
        html+=`<svg viewBox="0 0 ${svgW} 84" preserveAspectRatio="none" style="width:100%;height:100%">`;
        let path='M';
        cumData.forEach((d,i)=>{
            const x=i*(svgW/(cumData.length-1||1));
            const y=42-d.cum/maxCum*40;
            path+=(i===0?'':' L')+`${x.toFixed(1)},${y.toFixed(1)}`;
        });
        const lineColor=cumData[cumData.length-1].cum>=0?'#f75555':'#4ecdc4';
        html+=`<path d="${path}" fill="none" stroke="${lineColor}" stroke-width="1.5"/>`;
        html+='</svg></div>';
        html+='</div>';
    }

    body.innerHTML=html;
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('visible');}
document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)closeModal();};

function matchBoard(b){
    const kw=document.getElementById('boardSearch').value.trim().toLowerCase();
    if(!kw) return true;
    return b.board_name.toLowerCase().includes(kw)||b.board_code.includes(kw);
}

let _bt;
document.getElementById('boardSearch').addEventListener('input',function(){
    clearTimeout(_bt);_bt=setTimeout(()=>{renderBoards(allBoards.filter(b=>matchBoard(b)));},200);
});
document.getElementById('daysSelect').addEventListener('change',loadAnalysis);
document.getElementById('levelFilter').addEventListener('change',()=>{if(analysisData)renderTable(analysisData.stocks);});
let _st;
document.getElementById('stockSearch').addEventListener('input',function(){
    clearTimeout(_st);_st=setTimeout(()=>{if(analysisData)renderTable(analysisData.stocks);},200);
});

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

loadBoards();
</script>
</body>
</html>
